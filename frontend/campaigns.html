<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Campaigns — Honourix</title>
  <link rel="stylesheet" href="dashboard.css"/>
  <link rel="stylesheet" href="dashboard-patch.css"/>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    .camp-table { width:100%; border-collapse:collapse; font-size:13.5px; }
    .camp-table th {
      text-align:left; padding:11px 16px;
      color:var(--text-3); font-weight:600; font-size:12px;
      border-bottom:1px solid var(--border); background:var(--surface-2,var(--surface));
      white-space:nowrap;
    }
    .camp-table td { padding:13px 16px; border-bottom:1px solid var(--border); vertical-align:middle; }
    .camp-table tbody tr:last-child td { border-bottom:none; }
    .camp-table tbody tr:hover td { background:rgba(255,255,255,0.02); }
    .camp-type-badge {
      display:inline-flex; align-items:center; gap:5px;
      font-size:11px; font-weight:600; padding:3px 8px; border-radius:99px;
    }
    .type-cert     { background:rgba(168,85,247,.12); color:#a855f7; }
    .type-mail     { background:rgba(0,212,255,.10);  color:var(--cyan); }
    .type-combined { background:rgba(251,191,36,.12); color:#f59e0b; }
    .camp-count { font-size:13px; color:var(--text); font-weight:600; }
    .camp-count small { font-weight:400; color:var(--text-3); }
    .open-sheet-btn {
      display:inline-flex; align-items:center; gap:5px;
      font-size:12px; color:var(--cyan); font-weight:500;
      padding:4px 10px; border-radius:6px;
      border:1px solid rgba(0,212,255,.25); background:rgba(0,212,255,.06);
      text-decoration:none; transition:background .15s;
    }
    .open-sheet-btn:hover { background:rgba(0,212,255,.14); }
    .success-rate { font-size:13px; font-weight:700; }
    .camp-empty {
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      padding:64px 32px; text-align:center; gap:12px;
    }
  </style>
</head>
<body>
<div class="app-layout">
  <div id="sidebarMount"></div>
  <div class="main-area">
    
    <div class="page-content">
      <div class="page-title">Campaign History</div>
      <div class="page-subtitle">All certificate and email campaigns run from your account.</div>

      <!-- Filter + search bar -->
      <div style="display:flex;gap:12px;margin-bottom:24px;align-items:center;flex-wrap:wrap">
        <div class="tab-bar" style="width:auto">
          <button class="tab-btn active" id="filterAll"   onclick="setFilter('all')">All</button>
          <button class="tab-btn"        id="filterCert"  onclick="setFilter('cert')">Certificates</button>
          <button class="tab-btn"        id="filterMail"  onclick="setFilter('mail')">Emails</button>
          <button class="tab-btn"        id="filterCombo" onclick="setFilter('combined')">Combined</button>
          <button class="btn btn-secondary btn-sm" onclick="exportCSV()">
          <i data-lucide="download"></i> Export CSV
        </button>
        </div>
        <div class="input-wrap" style="flex:1;min-width:200px">
          <i data-lucide="search" class="input-icon"></i>
          <input class="form-input with-icon" id="campSearch" placeholder="Search campaigns…" oninput="renderTable()"/>
        </div>
      </div>

      <!-- Stats row -->
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px" id="campStats"></div>

      <!-- Table card -->
      <div class="card" style="padding:0;overflow:hidden">
        <!-- Loading state -->
        <div id="campLoading" style="padding:48px;text-align:center;color:var(--text-3);font-size:14px">
          <i data-lucide="loader" style="width:20px;height:20px;animation:spin 1s linear infinite;margin-bottom:10px;display:block;margin-inline:auto"></i>
          Loading campaigns…
        </div>

        <!-- Table -->
        <div id="campTableWrap" style="display:none;overflow-x:auto">
          <table class="camp-table">
            <thead>
              <tr>
                <th style="width:44px">#</th>
                <th>Campaign Name</th>
                <th>Type</th>
                <th>Date &amp; Time</th>
                <th>Sent / Total</th>
                <th>Backup Sheet</th>
              </tr>
            </thead>
            <tbody id="campTbody"></tbody>
          </table>
        </div>

        <!-- Empty state -->
        <div id="campEmpty" style="display:none">
          <div class="camp-empty">
            <div style="width:52px;height:52px;border-radius:14px;background:rgba(0,212,255,.08);border:1px solid rgba(0,212,255,.15);display:flex;align-items:center;justify-content:center">
              <i data-lucide="folder-open" style="width:22px;height:22px;color:var(--cyan)"></i>
            </div>
            <div style="font-size:15px;font-weight:600;color:var(--text)">No campaigns yet</div>
            <div style="font-size:13px;color:var(--text-3)">Run your first campaign from the Certificate Generator or Bulk Mail Sender.</div>
            <div style="display:flex;gap:12px;justify-content:center;margin-top:8px">
              <a href="cert-tool.html"   class="btn btn-primary btn-sm"><i data-lucide="file-badge"></i> Generate Certificates</a>
              <a href="mail-tool.html"   class="btn btn-secondary btn-sm"><i data-lucide="mail"></i> Send Emails</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="dashboard.js"></script>
<script>
// @ts-nocheck
let allCampaigns = [];
let activeFilter = 'all';

document.addEventListener('DOMContentLoaded', () => {
  requireAuth();
  document.getElementById('sidebarMount').outerHTML = renderSidebar('campaigns.html');
  initSidebar();
  lucide.createIcons();
  loadCampaigns();
});

async function loadCampaigns() {
  try {
    const data = await apiFetch('/api/campaigns');
    allCampaigns = data?.campaigns || [];
    renderStats();
    renderTable();
  } catch (e) {
    document.getElementById('campLoading').innerHTML =
      '<div style="color:var(--red);font-size:13px">Could not load campaigns: ' + e.message + '</div>';
  }
}

/* ── Stats row ──────────────────────────────────────── */
function renderStats() {
  const total  = allCampaigns.length;
  const certs  = allCampaigns.filter(c => c.type === 'cert').length;
  const mails  = allCampaigns.filter(c => c.type === 'mail').length;
  const combos = allCampaigns.filter(c => c.type === 'combined').length;
  const stats  = [
    { label:'Total Campaigns',    value:total,  icon:'folder',    color:'cyan'   },
    { label:'Certificate Runs',   value:certs,  icon:'file-badge',color:'purple' },
    { label:'Email Campaigns',    value:mails,  icon:'mail',      color:'green'  },
    { label:'Combined Pipelines', value:combos, icon:'zap',       color:'gold'   },
  ];
  document.getElementById('campStats').innerHTML = stats.map(s =>
    '<div class="card card-sm">' +
      '<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">' +
        '<i data-lucide="' + s.icon + '" style="width:15px;height:15px;color:var(--' + s.color + ')"></i>' +
        '<span style="font-size:12px;color:var(--text-2)">' + s.label + '</span>' +
      '</div>' +
      '<div style="font-size:26px;font-weight:800;color:var(--text)">' + s.value + '</div>' +
    '</div>'
  ).join('');
  lucide.createIcons();
}

/* ── Filter ─────────────────────────────────────────── */
function setFilter(type) {
  activeFilter = type;
  ['All','Cert','Mail','Combo'].forEach((t, i) => {
    const keys = ['all','cert','mail','combined'];
    const el   = document.getElementById('filter' + t);
    if (el) el.className = 'tab-btn' + (keys[i] === type ? ' active' : '');
  });
  renderTable();
}

/* ── Table renderer ─────────────────────────────────── */
function renderTable() {
  const q = (document.getElementById('campSearch').value || '').toLowerCase();
  const list = allCampaigns
    .filter(c => activeFilter === 'all' || c.type === activeFilter)
    .filter(c => !q || (c.name || '').toLowerCase().includes(q));

  document.getElementById('campLoading').style.display    = 'none';
  document.getElementById('campTableWrap').style.display  = list.length ? 'block' : 'none';
  document.getElementById('campEmpty').style.display      = list.length ? 'none'  : 'block';
  if (!list.length) { lucide.createIcons(); return; }

  const typeMap = {
    cert:     { label:'Certificates', cls:'type-cert',     icon:'file-badge' },
    mail:     { label:'Bulk Mail',    cls:'type-mail',     icon:'mail'       },
    combined: { label:'Combined',     cls:'type-combined', icon:'zap'        },
  };

  document.getElementById('campTbody').innerHTML = list.map((c, i) => {
    const t   = typeMap[c.type] || typeMap.cert;
    const dt  = c.created_at
      ? new Date(c.created_at).toLocaleString('en-IN', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit', hour12:true })
      : '—';
    const pct = c.total_count > 0 ? Math.round((c.sent_count || 0) / c.total_count * 100) : 0;
    const pctColor = pct >= 90 ? 'var(--green)' : pct >= 50 ? 'var(--gold, #f59e0b)' : 'var(--red)';

    // Last column: backup sheet for cert/combined, success rate for mail
    let actionCol = '';
    if (c.type === 'mail') {
      actionCol = `<span class="success-rate" style="color:${pctColor}">${pct}% success</span>`;
    } else if (c.backup_sheet_link) {
      actionCol = `<a href="${c.backup_sheet_link}" target="_blank" class="open-sheet-btn">
        <i data-lucide="table-2" style="width:13px;height:13px"></i> Open Sheet
      </a>`;
    } else {
      actionCol = '<span style="color:var(--text-3);font-size:12px">—</span>';
    }

    return `<tr>
      <td style="color:var(--text-3);font-weight:600">${i + 1}</td>
      <td style="font-weight:600;color:var(--text);max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${c.name || 'Untitled'}</td>
      <td><span class="camp-type-badge ${t.cls}"><i data-lucide="${t.icon}" style="width:11px;height:11px"></i>${t.label}</span></td>
      <td style="color:var(--text-2);white-space:nowrap">${dt}</td>
      <td><span class="camp-count">${c.sent_count || 0} <small>/ ${c.total_count || 0}</small></span></td>
      <td>${actionCol}</td>
    </tr>`;
  }).join('');
  lucide.createIcons();
}

/* ── CSV export ─────────────────────────────────────── */
function exportCSV() {
  const rows = allCampaigns.map(c => ({
    'Campaign Name': c.name || '',
    'Type':          c.type || '',
    'Date':          c.created_at ? new Date(c.created_at).toLocaleString('en-IN') : '',
    'Sent':          c.sent_count  || 0,
    'Total':         c.total_count || 0,
    'Status':        c.status      || '',
    'Backup Sheet':  c.backup_sheet_link || '',
  }));
  downloadCSV(rows, 'Honourix-campaigns-' + Date.now() + '.csv');
}
</script>
</body>
</html>
