<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Database — GalSol</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Syne:wght@600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="dashboard.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <style>
    /* ── Page-specific ───────────────────────────────────────── */

    /* Hero stats bar */
    .db-hero {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 28px;
    }

    .db-hero-card {
      background: rgba(255, 255, 255, 0.035);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.09);
      border-radius: 16px;
      padding: 20px 22px;
      position: relative;
      overflow: hidden;
      transition: all 0.22s var(--ease);
    }

    .db-hero-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.04) 0%, transparent 60%);
      pointer-events: none;
    }

    .db-hero-card:hover {
      border-color: rgba(255, 255, 255, 0.16);
      transform: translateY(-1px);
    }

    .db-hero-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
    }

    .db-hero-num {
      font-family: var(--font);
      font-size: 36px;
      font-weight: 700;
      color: var(--text);
      line-height: 1;
      letter-spacing: -1px;
      margin-bottom: 4px;
    }

    .db-hero-sub {
      font-size: 12.5px;
      color: var(--text-3);
    }

    .db-hero-icon {
      position: absolute;
      right: 18px;
      top: 50%;
      transform: translateY(-50%);
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0.6;
    }

    .db-hero-icon svg {
      width: 18px;
      height: 18px;
    }

    .db-hero-icon.cyan {
      background: var(--cyan-dim);
      color: var(--cyan);
    }

    .db-hero-icon.purple {
      background: var(--purple-dim);
      color: #a78bfa;
    }

    .db-hero-icon.green {
      background: var(--green-dim);
      color: var(--green);
    }

    .db-hero-icon.gold {
      background: var(--gold-dim);
      color: var(--gold);
    }

    /* Top bar */
    .db-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 22px;
      gap: 14px;
      flex-wrap: wrap;
    }

    .db-search-wrap {
      position: relative;
    }

    .db-search {
      width: 260px;
      padding: 9px 14px 9px 36px;
      background: var(--glass);
      border: 1px solid var(--glass-border-2);
      border-radius: 10px;
      color: var(--text);
      font-size: 13.5px;
      font-family: var(--font);
      outline: none;
      transition: var(--transition);
    }

    .db-search:focus {
      border-color: rgba(0, 212, 255, 0.4);
      box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.07);
    }

    .db-search::placeholder {
      color: var(--text-3);
    }

    .db-search-icon {
      position: absolute;
      left: 11px;
      top: 50%;
      transform: translateY(-50%);
      width: 14px;
      height: 14px;
      color: var(--text-3);
      pointer-events: none;
    }

    .db-filter {
      display: flex;
      gap: 4px;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 10px;
      padding: 4px;
    }

    .db-filter-btn {
      padding: 6px 13px;
      border-radius: 7px;
      font-size: 12.5px;
      font-weight: 500;
      color: var(--text-3);
      transition: var(--transition);
      cursor: pointer;
      background: none;
      border: none;
      font-family: var(--font);
    }

    .db-filter-btn:hover {
      color: var(--text);
    }

    .db-filter-btn.active {
      background: var(--grad-primary);
      color: #fff;
      font-weight: 600;
    }

    /* Forms grid */
    .db-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 18px;
    }

    /* Form card */
    .db-card {
      background: rgba(255, 255, 255, 0.035);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.09);
      border-radius: 18px;
      padding: 22px 22px 18px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      transition: all 0.22s var(--ease);
      position: relative;
      overflow: hidden;
    }

    .db-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.04) 0%, transparent 60%);
      pointer-events: none;
      border-radius: inherit;
    }

    .db-card:hover {
      border-color: rgba(255, 255, 255, 0.16);
      transform: translateY(-2px);
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.35);
    }

    .db-card.no-data {
      opacity: 0.6;
    }

    .db-card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }

    .db-card-icon {
      width: 42px;
      height: 42px;
      border-radius: 11px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .db-card-icon svg {
      width: 19px;
      height: 19px;
    }

    .db-card-icon.cyan {
      background: var(--cyan-dim);
      color: var(--cyan);
    }

    .db-card-icon.purple {
      background: var(--purple-dim);
      color: #a78bfa;
    }

    .db-card-icon.green {
      background: var(--green-dim);
      color: var(--green);
    }

    .db-card-icon.gold {
      background: var(--gold-dim);
      color: var(--gold);
    }

    .db-status-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border-radius: 99px;
      font-size: 11.5px;
      font-weight: 600;
      flex-shrink: 0;
    }

    .db-status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }

    .db-status-badge.published {
      background: var(--green-dim);
      color: var(--green);
      border: 1px solid rgba(16, 185, 129, 0.2);
    }

    .db-status-badge.published .db-status-dot {
      background: var(--green);
      animation: pulseDot 1.5s ease infinite;
    }

    .db-status-badge.draft {
      background: var(--glass);
      color: var(--text-3);
      border: 1px solid var(--glass-border);
    }

    .db-status-badge.draft .db-status-dot {
      background: var(--text-3);
    }

    .db-status-badge.closed {
      background: var(--red-dim);
      color: var(--red);
      border: 1px solid rgba(244, 63, 94, 0.2);
    }

    .db-status-badge.closed .db-status-dot {
      background: var(--red);
    }

    .db-card-name {
      font-family: var(--font-display);
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }


    /* Big response count */
    .db-response-block {
      display: flex;
      align-items: baseline;
      gap: 6px;
    }

    .db-response-num {
      font-family: var(--font);
      font-size: 42px;
      font-weight: 700;
      letter-spacing: -1.5px;
      line-height: 1;
      color: var(--text);
    }

    .db-response-label {
      font-size: 14px;
      color: var(--text-3);
      font-weight: 500;
    }

    /* Zero state inside card */
    .db-zero {
      font-size: 13px;
      color: var(--text-3);
      font-style: italic;
    }

    .db-card-meta {
      display: flex;
      align-items: center;
      gap: 14px;
      font-size: 12px;
      color: var(--text-3);
    }

    .db-card-meta-item {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .db-card-meta-item svg {
      width: 12px;
      height: 12px;
    }

    /* Card footer */
    .db-card-footer {
      display: flex;
      align-items: center;
      gap: 8px;
      padding-top: 14px;
      border-top: 1px solid rgba(255, 255, 255, 0.07);
    }

    .db-view-btn {
      display: flex;
      align-items: center;
      gap: 7px;
      flex: 1;
      padding: 10px 16px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 700;
      background: var(--grad-primary);
      color: #fff;
      border: none;
      cursor: pointer;
      font-family: var(--font);
      box-shadow: 0 4px 16px rgba(0, 212, 255, 0.15);
      transition: var(--transition);
      justify-content: center;
    }

    .db-view-btn:hover {
      box-shadow: 0 6px 24px rgba(0, 212, 255, 0.3);
    }

    .db-view-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .db-view-btn svg {
      width: 14px;
      height: 14px;
    }

    .db-sheet-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      padding: 10px 13px;
      border-radius: 10px;
      font-size: 12.5px;
      font-weight: 600;
      background: var(--glass);
      border: 1px solid var(--glass-border-2);
      color: var(--text-2);
      cursor: pointer;
      font-family: var(--font);
      transition: var(--transition);
      text-decoration: none;
      flex-shrink: 0;
    }

    .db-sheet-btn:hover {
      color: var(--green);
      border-color: rgba(16, 185, 129, 0.3);
      background: var(--green-dim);
    }

    .db-sheet-btn svg {
      width: 13px;
      height: 13px;
    }

    /* Empty state */
    .db-empty {
      grid-column: 1/-1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 72px 24px;
      text-align: center;
    }

    .db-empty-icon {
      width: 72px;
      height: 72px;
      border-radius: 20px;
      background: var(--cyan-dim);
      border: 1px solid rgba(0, 212, 255, 0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
    }

    .db-empty-icon svg {
      width: 32px;
      height: 32px;
      color: var(--cyan);
    }

    .db-empty h3 {
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 8px;
    }

    .db-empty p {
      font-size: 14.5px;
      color: var(--text-2);
      max-width: 340px;
      line-height: 1.6;
    }

    /* Loading skeleton */
    .db-skel {
      animation: dbPulse 1.4s ease infinite;
    }

    @keyframes dbPulse {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: 0.4
      }
    }

    .db-skel-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 18px;
      padding: 22px;
      height: 200px;
    }

    /* Color accent glow on hover */
    .db-card:hover::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: var(--grad-primary);
      opacity: 0.5;
    }

    @keyframes pulseDot {

      0%,
      100% {
        opacity: 1;
        box-shadow: 0 0 6px currentColor;
      }

      50% {
        opacity: .5;
        box-shadow: 0 0 2px currentColor;
      }
    }

    @media (max-width: 900px) {
      .db-hero {
        grid-template-columns: 1fr 1fr;
      }

      .db-search {
        width: 100%;
      }
    }

    @media (max-width: 600px) {
      .db-hero {
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .db-hero-num {
        font-size: 28px;
      }
    }
  </style>
</head>

<body>
  <script>(function () { if (window.innerWidth < 768) { document.body.innerHTML = '<div style="position:fixed;inset:0;background:#0f0f1a;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;text-align:center;z-index:99999"><div style="font-size:48px;margin-bottom:24px">🖥️</div><h2 style="color:#ffffff;font-size:22px;font-weight:700;margin-bottom:12px">Desktop Only</h2><p style="color:#a0a0b0;font-size:15px;max-width:280px;line-height:1.6">This tool is designed for desktop use.<br>Please open it on a laptop or desktop computer.</p><p style="color:#606070;font-size:13px;margin-top:24px">GalSol Platform</p></div>'; } })();</script>
  <div class="app-layout">
    <div id="sidebarMount"></div>

    <div class="main-area">

      <main class="page-content fade-in">
        <div style="margin-bottom:24px">
          <h1 class="page-title">Database</h1>
          <p class="page-subtitle">View submissions, analyse responses, and export data from your forms.</p>
        </div>

        <!-- Hero Stats -->
        <div class="db-hero" id="dbHero">
          <div class="db-hero-card db-skel" style="height:100px"></div>
          <div class="db-hero-card db-skel" style="height:100px"></div>
          <div class="db-hero-card db-skel" style="height:100px"></div>
          <div class="db-hero-card db-skel" style="height:100px"></div>
        </div>

        <!-- Top bar -->
        <div class="db-topbar">
          <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
            <div class="db-search-wrap">
              <svg class="db-search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8" />
                <line x1="21" y1="21" x2="16.65" y2="16.65" />
              </svg>
              <input class="db-search" id="dbSearch" type="text" placeholder="Search forms…" oninput="renderGrid()" />
            </div>
            <div class="db-filter">
              <button class="db-filter-btn active" onclick="setFilter(this,'all')">All</button>
              <button class="db-filter-btn" onclick="setFilter(this,'has-data')">Has Data</button>
              <button class="db-filter-btn" onclick="setFilter(this,'published')">Published</button>
              <button class="db-filter-btn" onclick="setFilter(this,'closed')">Closed</button>
            </div>
          </div>

          <button class="btn btn-secondary btn-sm" onclick="loadForms(true)" id="refreshBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:13px;height:13px">
              <polyline points="23 4 23 10 17 10" />
              <polyline points="1 20 1 14 7 14" />
              <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15" />
            </svg>
            Refresh
          </button>

        </div>

        <!-- Grid -->
        <div class="db-grid" id="dbGrid">
          <div class="db-skel-card db-skel"></div>
          <div class="db-skel-card db-skel"></div>
          <div class="db-skel-card db-skel"></div>
        </div>
      </main>
    </div>
  </div>

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script src="dashboard.js"></script>
  <script>
    /* ── Boot ─────────────────────────────────────────────────────── */
    requireAuth();
    document.getElementById('sidebarMount').innerHTML = '';
    const _sidebarEl = document.createElement('div');
    _sidebarEl.innerHTML = renderSidebar('gs-database.html');
    document.getElementById('sidebarMount').replaceWith(_sidebarEl.firstElementChild);
    initSidebar();

    let _forms = [];
    let _filter = 'all';

    /* ── Load forms ──────────────────────────────────────────────── */
    async function loadForms(forceRefresh = false) {
      const refreshBtn = document.getElementById('refreshBtn');
      if (refreshBtn) { refreshBtn.disabled = true; refreshBtn.querySelector('svg')?.classList.add('spinning'); }

      try {
        const res = await fetch(`${API}/api/gsdb/summary`, {
          headers: { 'Authorization': 'Bearer ' + getToken() },
        });
        if (!res.ok) throw new Error((await res.json()).error || res.status);
        const data = await res.json();
        _forms = data.forms || [];
        renderHero();
        renderGrid();
        const lastUpdatedEl = document.getElementById('dbLastUpdated');
        if (lastUpdatedEl) {
          lastUpdatedEl.textContent = 'Updated just now';
        }
      } catch (e) {
        toast('Could not load forms: ' + e.message, 'error');
      } finally {
        if (refreshBtn) { refreshBtn.disabled = false; refreshBtn.querySelector('svg')?.classList.remove('spinning'); }
      }
    }

    /* ── Hero stats ─────────────────────────────────────────────── */
    function renderHero() {
      const total = _forms.reduce((s, f) => s + (f.submissionCount || 0), 0);
      const published = _forms.filter(f => f.status === 'published').length;
      const withData = _forms.filter(f => f.submissionCount > 0).length;
      const topForm = [..._forms].sort((a, b) => b.submissionCount - a.submissionCount)[0];
      const mostActive = topForm?.submissionCount > 0 ? topForm.name : '—';

      document.getElementById('dbHero').innerHTML = `
    <div class="db-hero-card">
      <div class="db-hero-label">Total Responses</div>
      <div class="db-hero-num">${fmtNum(total)}</div>
      <div class="db-hero-sub">Across all forms</div>
      <div class="db-hero-icon cyan"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg></div>
    </div>
    <div class="db-hero-card">
      <div class="db-hero-label">Live Forms</div>
      <div class="db-hero-num">${published}</div>
      <div class="db-hero-sub">Currently published</div>
      <div class="db-hero-icon green"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>
    </div>
    <div class="db-hero-card">
      <div class="db-hero-label">Forms with Data</div>
      <div class="db-hero-num">${withData}</div>
      <div class="db-hero-sub">Have at least 1 response</div>
      <div class="db-hero-icon purple"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/></svg></div>
    </div>
    <div class="db-hero-card">
      <div class="db-hero-label">Most Active Form</div>
      <div class="db-hero-num" style="font-size:18px;letter-spacing:-0.5px;line-height:1.3;margin-top:4px">${escHtml(mostActive.length > 22 ? mostActive.slice(0, 22) + '…' : mostActive)}</div>
      <div class="db-hero-sub">${topForm?.submissionCount || 0} responses</div>
      <div class="db-hero-icon gold"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></div>
    </div>`;
    }

    /* ── Render grid ─────────────────────────────────────────────── */
    const ICON_MAP = { blank: 'file-plus', event_registration: 'calendar', workshop: 'book-open', feedback: 'message-square', rsvp: 'check-circle' };
    const COLOR_MAP = { blank: 'cyan', event_registration: 'purple', workshop: 'green', feedback: 'gold', rsvp: 'green' };
    const STATUS_LABELS = { draft: 'Draft', published: 'Published', closed: 'Closed' };

    function renderGrid() {
      const query = (document.getElementById('dbSearch')?.value || '').toLowerCase().trim();
      const forms = _forms.filter(f => {
        if (query && !f.name.toLowerCase().includes(query)) return false;
        if (_filter === 'has-data') return f.submissionCount > 0;
        if (_filter === 'published') return f.status === 'published';
        if (_filter === 'closed') return f.status === 'closed';
        return true;
      });

      const grid = document.getElementById('dbGrid');
      if (!forms.length) {
        grid.innerHTML = `
      <div class="db-empty">
        <div class="db-empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg></div>
        <h3>${_forms.length === 0 ? 'No forms yet' : 'No forms match your filter'}</h3>
        <p>${_forms.length === 0
            ? 'Create a form in GS Forms and publish it to start collecting responses.'
            : 'Try a different filter or search term.'}</p>
        ${_forms.length === 0 ? `<a href="gs-forms.html" class="btn btn-primary" style="margin-top:16px">Go to GS Forms →</a>` : ''}
      </div>`;
        return;
      }

      grid.innerHTML = forms.map(f => formCard(f)).join('');
      lucide.createIcons();
    }

    function formCard(f) {
      const tpl = 'blank';
      const icon = 'file-text';
      const color = f.status === 'published' ? 'cyan' : f.status === 'closed' ? 'purple' : 'gold';
      const count = f.submissionCount || 0;
      const hasData = f.hasSheet && count > 0;
      const noSheet = !f.hasSheet;
      const updated = f.updatedAt ? timeAgo(f.updatedAt) : '—';

      return `
  <div class="db-card${noSheet ? ' no-data' : ''}">
    <div class="db-card-top">
      <div class="db-card-icon ${color}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      </div>
      <div class="db-status-badge ${f.status}">
        <div class="db-status-dot"></div>
        ${STATUS_LABELS[f.status] || f.status}
      </div>
    </div>

    <div class="db-card-name">${escHtml(f.name)}</div>

    <div class="db-response-block">
      ${hasData
          ? `<div class="db-response-num">${fmtBig(count)}</div>
           <div class="db-response-label">response${count !== 1 ? 's' : ''}</div>`
          : noSheet
            ? `<div class="db-zero">Not published yet — no data sheet created</div>`
            : `<div class="db-zero">No responses yet</div>`}
    </div>

    <div class="db-card-meta">
      <div class="db-card-meta-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/></svg>
        ${f.fieldCount} field${f.fieldCount !== 1 ? 's' : ''}
      </div>
      <div class="db-card-meta-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        ${updated}
      </div>
    </div>

    <div class="db-card-footer">
      <button class="db-view-btn" onclick="viewData('${f.id}')" ${noSheet ? 'disabled title="Publish this form first"' : ''}>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        View Data
      </button>
      ${f.hasSheet ? `
      <a class="db-sheet-btn" href="https://docs.google.com/spreadsheets/d/${f.sheetId}" target="_blank" title="Open in Google Sheets">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        Sheet
      </a>` : ''}
    </div>
  </div>`;
    }

    function viewData(formId) {
      window.location.href = `gs-database-view.html?form=${formId}`;
    }

    function setFilter(btn, filter) {
      _filter = filter;
      document.querySelectorAll('.db-filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderGrid();
    }

    /* ── Helpers ─────────────────────────────────────────────────── */
    function escHtml(s) { return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

    function fmtNum(n) {
      if (n >= 1000) return (n / 1000).toFixed(1).replace(/\.0$/, '') + 'k';
      return String(n);
    }

    function fmtBig(n) {
      if (n >= 10000) return (n / 1000).toFixed(1).replace(/\.0$/, '') + 'k';
      return n.toLocaleString();
    }

    function timeAgo(iso) {
      const diff = Date.now() - new Date(iso).getTime();
      const m = Math.floor(diff / 60000);
      const h = Math.floor(m / 60);
      const d = Math.floor(h / 24);
      if (d > 30) return new Date(iso).toLocaleDateString('en-IN', { day: 'numeric', month: 'short' });
      if (d > 0) return `${d}d ago`;
      if (h > 0) return `${h}h ago`;
      if (m > 0) return `${m}m ago`;
      return 'Just now';
    }

    /* ── Boot ─────────────────────────────────────────────────────── */
    document.addEventListener("DOMContentLoaded", () => {
      loadForms();
      lucide.createIcons();
    });
  </script>
  <style>
    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .spinning {
      animation: spin 0.8s linear infinite;
    }
  </style>
</body>

</html>
