<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loading… — GS Forms</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Syne:wght@700;800&display=swap"
    rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    /* ════════════════════════════════════════════════════════════════
     GS Forms — Public View  (self-contained, no dashboard deps)
  ════════════════════════════════════════════════════════════════ */
    :root {
      --bg: #04080f;
      --surface: rgba(10, 18, 35, 0.80);
      --glass: rgba(255, 255, 255, 0.04);
      --glass-b: rgba(255, 255, 255, 0.09);
      --glass-b2: rgba(255, 255, 255, 0.14);
      --text: #eef4ff;
      --text-2: #98b0cc;
      --text-3: #546a85;
      --red: #f43f5e;
      --red-dim: rgba(244, 63, 94, 0.12);
      --font: 'Plus Jakarta Sans', sans-serif;
      --font-display: 'Syne', sans-serif;
      --accent: #00d4ff;
      --accent-dim: rgba(0, 212, 255, 0.10);
      --accent-grad: linear-gradient(135deg, #00d4ff, #7c3aed);
      --ease: cubic-bezier(0.16, 1, 0.3, 1);
      --radius: 9px;
      --card-bg: rgba(10, 18, 35, 0.85);
      --header-color: #eef4ff;
      --body-color: #98b0cc;
      --header-size: clamp(22px, 4vw, 28px);
      --body-size: 15px;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ── Custom Scrollbar ───────────────────────────────────────── */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.15);
      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--accent);
    }

    * {
      scrollbar-width: thin;
      scrollbar-color: rgba(255, 255, 255, 0.15) transparent;
    }

    /* Background glow */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background:
        radial-gradient(ellipse 65% 50% at 15% 0%, rgba(0, 212, 255, 0.07) 0%, transparent 55%),
        radial-gradient(ellipse 50% 55% at 88% 90%, rgba(124, 58, 237, 0.09) 0%, transparent 55%);
    }

    /* ── Accent bar at top ──────────────────────────────────────── */
    .gsfv-accent-bar {
      height: 4px;
      width: 100%;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 100;
      background: var(--accent-grad);
      transition: background 0.4s;
    }

    /* ── Page wrap ──────────────────────────────────────────────── */
    .gsfv-page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 56px 16px 80px;
    }

    .gsfv-container {
      width: 100%;
      max-width: 620px;
    }

    /* ── Loading skeleton ───────────────────────────────────────── */
    .gsfv-skeleton {
      animation: skPulse 1.4s ease infinite;
    }

    @keyframes skPulse {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: 0.4
      }
    }

    .gsfv-sk-line {
      height: 14px;
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.08);
      margin-bottom: 12px;
    }

    .gsfv-sk-box {
      height: 48px;
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.06);
      margin-bottom: 18px;
    }

    /* ── Error / Closed state ───────────────────────────────────── */
    .gsfv-error-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 48px 16px;
    }

    .gsfv-error-icon {
      width: 72px;
      height: 72px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 22px;
    }

    .gsfv-error-icon svg {
      width: 32px;
      height: 32px;
    }

    .gsfv-error-icon.not-found {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-3);
    }

    .gsfv-error-icon.closed {
      background: rgba(244, 63, 94, 0.10);
      color: var(--red);
    }

    .gsfv-error-icon.full {
      background: rgba(245, 158, 11, 0.10);
      color: #f59e0b;
    }

    .gsfv-error-title {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 10px;
    }

    .gsfv-error-sub {
      font-size: 14.5px;
      color: var(--text-2);
      line-height: 1.6;
      max-width: 360px;
    }

    .gsfv-error-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 99px;
      margin-bottom: 16px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.3px;
    }

    .gsfv-error-badge.closed {
      background: var(--red-dim);
      color: var(--red);
      border: 1px solid rgba(244, 63, 94, 0.2);
    }

    .gsfv-error-badge.full {
      background: rgba(245, 158, 11, 0.1);
      color: #f59e0b;
      border: 1px solid rgba(245, 158, 11, 0.2);
    }

    /* ── Form header ────────────────────────────────────────────── */
    .gsfv-header {
      background: var(--card-bg);
      border: 1px solid rgba(255, 255, 255, 0.10);
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.30);
      margin-bottom: 12px;
      overflow: hidden;
      position: relative;
    }

    .gsfv-header-content {
      padding: 26px 28px 22px;
    }

    .gsfv-header::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: var(--accent-grad);
      z-index: 2;
    }

    .gsfv-org-badge {
      display: none;
    }

    .gsfv-org-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
    }

    .gsfv-title {
      font-family: var(--font-display);
      font-size: var(--header-size);
      font-weight: 700;
      color: var(--header-color);
      line-height: 1.25;
      margin-bottom: 10px;
    }

    .gsfv-desc {
      font-size: var(--body-size);
      color: var(--body-color);
      line-height: 1.65;
    }

    /* ── Field wrapper ──────────────────────────────────────────── */
    .gsfv-field {
      margin-bottom: 12px;
      animation: fieldIn 0.3s var(--ease) both;
    }

    @keyframes fieldIn {
      from {
        opacity: 0;
        transform: translateY(8px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    .gsfv-label {
      display: flex;
      align-items: baseline;
      gap: 5px;
      font-size: var(--body-size);
      font-weight: 600;
      color: var(--text);
      margin-bottom: 9px;
      line-height: 1.4;
    }

    .gsfv-req {
      color: var(--red);
      font-size: 13px;
      flex-shrink: 0;
    }

    .gsfv-hint {
      font-size: 12.5px;
      color: var(--text-3);
      margin-top: -5px;
      margin-bottom: 9px;
    }

    /* Base input */
    .gsfv-input,
    .gsfv-textarea,
    .gsfv-select {
      width: 100%;
      padding: 12px 14px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.10);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 15px;
      font-family: var(--font);
      outline: none;
      transition: border-color 0.18s;
      -webkit-appearance: none;
      appearance: none;
    }

    .gsfv-input:focus,
    .gsfv-textarea:focus,
    .gsfv-select:focus {
      border-color: var(--accent);
    }

    .gsfv-input[type="date"],
    .gsfv-input[type="time"] {
      color-scheme: dark;
    }

    .gsfv-input[type="number"] {
      -moz-appearance: textfield;
      appearance: textfield;
    }

    .gsfv-input[type="number"]::-webkit-outer-spin-button,
    .gsfv-input[type="number"]::-webkit-inner-spin-button {
      -webkit-appearance: none;
      appearance: none;
    }

    .gsfv-input::placeholder,
    .gsfv-textarea::placeholder {
      color: var(--text-3);
    }

    .gsfv-textarea {
      resize: vertical;
      min-height: 90px;
      line-height: 1.6;
    }

    .gsfv-select {
      cursor: pointer;
      background-image: url("data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 width=%2714%22 height=%2214%22 viewBox=%270 0 24 24%27 fill=%27none%27 stroke=%27%235a7394%27 stroke-width=%272%27%3E%3Cpolyline points=%276 9 12 15 18 9%27/%3E%3C/svg%3E");
      background-repeat: no-repeat;
      background-position: right 13px center;
      padding-right: 40px;
    }

    .gsfv-select option {
      background: #0d1728;
      color: var(--text);
    }

    /* Field error state */
    .gsfv-field.has-error .gsfv-input,
    .gsfv-field.has-error .gsfv-textarea,
    .gsfv-field.has-error .gsfv-select {
      border-color: rgba(244, 63, 94, 0.6);
      box-shadow: 0 0 0 4px rgba(244, 63, 94, 0.08);
    }

    .gsfv-error-msg {
      display: none;
      font-size: 12.5px;
      color: var(--red);
      margin-top: 6px;
      font-weight: 500;
    }

    .gsfv-field.has-error .gsfv-error-msg {
      display: block;
    }

    /* ── Radio / Checkbox cards ─────────────────────────────────── */
    .gsfv-options {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .gsfv-option-label {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 14px;
      border-radius: var(--radius);
      border: 1px solid rgba(255, 255, 255, 0.10);
      background: rgba(255, 255, 255, 0.025);
      cursor: pointer;
      transition: border-color 0.18s, background 0.18s;
      font-size: 14.5px;
      color: var(--text-2);
      user-select: none;
    }

    .gsfv-option-label:hover {
      border-color: var(--glass-b2);
      color: var(--text);
      background: rgba(255, 255, 255, 0.025);
    }

    .gsfv-option-label input {
      display: none;
    }

    .gsfv-option-indicator {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.2);
      flex-shrink: 0;
      transition: all 0.18s;
      position: relative;
    }

    .gsfv-option-indicator.box {
      border-radius: 5px;
    }

    /* Selected state — driven by JS class */
    .gsfv-option-label.selected {
      border-color: var(--accent);
      background: var(--accent-dim);
      color: var(--text);
    }

    .gsfv-option-label.selected .gsfv-option-indicator {
      border-color: var(--accent);
      background: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }

    .gsfv-option-label.selected .gsfv-option-indicator::after {
      content: '✓';
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      color: #000;
    }

    .gsfv-field.has-error .gsfv-options .gsfv-option-label {
      border-color: rgba(244, 63, 94, 0.3);
    }

    /* ── Linear scale — Stars ───────────────────────────────────── */
    .gsfv-stars {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .gsfv-star-btn {
      font-size: 32px;
      background: none;
      border: none;
      outline: none;
      cursor: pointer;
      transition: transform 0.12s, color 0.12s;
      color: rgba(255, 255, 255, 0.18);
      line-height: 1;
      padding: 2px;
    }

    .gsfv-star-btn:hover {
      transform: scale(1.15);
      color: rgba(245, 158, 11, 0.5);
    }

    .gsfv-star-btn.active {
      color: #f59e0b;
    }

    .gsfv-scale-labels {
      display: flex;
      justify-content: space-between;
      font-size: 11.5px;
      color: var(--text-3);
      margin-top: 6px;
    }

    /* ── Linear scale — Numbers ─────────────────────────────────── */
    .gsfv-num-scale {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 4px;
    }

    .gsfv-num-scale-inner {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .gsfv-scale-label {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-3);
    }

    .gsfv-num-btn {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 1px solid var(--glass-b);
      background: transparent;
      font-size: 15px;
      font-weight: 600;
      color: var(--text-3);
      cursor: pointer;
      transition: all 0.15s;
      font-family: var(--font);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .gsfv-num-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-dim);
    }

    .gsfv-num-btn.active {
      background: var(--accent);
      color: #000;
      border-color: var(--accent);
      box-shadow: 0 0 12px var(--accent-dim);
    }

    /* ── File upload ────────────────────────────────────────────── */
    .gsfv-upload-zone {
      border: 2px dashed rgba(255, 255, 255, 0.12);
      border-radius: var(--radius);
      padding: 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.18s, background 0.18s;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .gsfv-upload-zone:hover,
    .gsfv-upload-zone.drag-over {
      border-color: var(--accent);
      background: var(--accent-dim);
    }

    .gsfv-upload-zone[data-uploading] {
      pointer-events: none;
      opacity: 0.7;
    }

    .gsfv-upload-zone input[type="file"] {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      cursor: pointer;
    }

    .gsfv-upload-icon {
      width: 42px;
      height: 42px;
      margin-bottom: 4px;
      color: var(--accent);
      opacity: 0.85;
    }

    .gsfv-upload-text {
      font-size: 15px;
      color: var(--text-2);
    }

    .gsfv-upload-text strong {
      color: var(--accent);
    }

    .gsfv-upload-sub {
      font-size: 13px;
      color: var(--text-3);
      margin-top: 2px;
    }

    .gsfv-upload-preview {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 13px;
      border-radius: 9px;
      margin-top: 10px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--glass-b);
      font-size: 13px;
      color: var(--text-2);
    }

    .gsfv-upload-preview svg {
      width: 15px;
      height: 15px;
      color: var(--accent);
      flex-shrink: 0;
    }

    /* ── Section break ──────────────────────────────────────────── */
    .gsfv-section-break {
      padding: 10px 0 6px;
      margin-bottom: 24px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
    }

    .gsfv-section-title {
      font-family: var(--font-display);
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 5px;
    }

    .gsfv-section-desc {
      font-size: 14px;
      color: var(--text-2);
      line-height: 1.55;
    }

    /* ── Submit button ──────────────────────────────────────────── */
    .gsfv-submit {
      width: 100%;
      padding: 14px;
      border-radius: 11px;
      border: none;
      background: var(--accent-grad);
      color: #fff;
      font-size: 15.5px;
      font-weight: 700;
      font-family: var(--font);
      cursor: pointer;
      box-shadow: 0 4px 18px rgba(0, 212, 255, 0.18);
      transition: box-shadow 0.2s, transform 0.15s, opacity 0.2s;
      margin-top: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .gsfv-submit:hover {
      box-shadow: 0 8px 28px rgba(0, 212, 255, 0.30);
      transform: translateY(-1px);
    }

    .gsfv-submit:active {
      transform: translateY(0);
    }

    .gsfv-submit:disabled {
      opacity: 0.65;
      cursor: not-allowed;
      transform: none;
    }

    .gsfv-submit svg {
      width: 16px;
      height: 16px;
    }

    @keyframes btnSpin {
      to {
        transform: rotate(360deg);
      }
    }

    .gsfv-submit.loading::before {
      content: '';
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, 0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: btnSpin 0.7s linear infinite;
    }

    /* ── Thank you state ────────────────────────────────────────── */
    .gsfv-ty-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 24px 16px;
      animation: tyIn 0.5s var(--ease) both;
    }

    @keyframes tyIn {
      from {
        opacity: 0;
        transform: scale(0.95)
      }

      to {
        opacity: 1;
        transform: scale(1)
      }
    }

    .gsfv-ty-ring {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: linear-gradient(135deg, #10b981, #06b6d4);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 22px;
      box-shadow: 0 0 48px rgba(16, 185, 129, 0.3);
      animation: popIn 0.55s var(--ease) both;
    }

    @keyframes popIn {
      0% {
        transform: scale(0.4);
        opacity: 0
      }

      70% {
        transform: scale(1.1)
      }

      100% {
        transform: scale(1);
        opacity: 1
      }
    }

    .gsfv-ty-ring svg {
      width: 32px;
      height: 32px;
      color: #fff;
    }

    .gsfv-ty-title {
      font-family: var(--font-display);
      font-size: 24px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 10px;
    }

    .gsfv-ty-msg {
      font-size: 15px;
      color: var(--text-2);
      line-height: 1.6;
      max-width: 380px;
      margin-bottom: 28px;
    }

    .gsfv-ty-another {
      padding: 11px 24px;
      border-radius: 10px;
      background: var(--glass);
      border: 1px solid var(--glass-b2);
      color: var(--text-2);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: var(--font);
      transition: all 0.18s;
    }

    .gsfv-ty-another:hover {
      color: var(--text);
      background: rgba(255, 255, 255, 0.07);
    }

    /* ── Footer ─────────────────────────────────────────────────── */
    .gsfv-footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 16px 16px 32px;
      font-size: 12.5px;
      color: var(--text-3);
    }

    .gsfv-footer a {
      color: var(--text-2);
      text-decoration: none;
      font-weight: 600;
    }

    .gsfv-footer a:hover {
      color: var(--text);
    }

    /* ── Conditional field show/hide ───────────────────────────── */
    .gsfv-field {
      transition: opacity 0.28s ease, max-height 0.32s ease, margin-bottom 0.28s ease;
    }

    .gsfv-field.cond-hidden {
      max-height: 0 !important;
      opacity: 0 !important;
      margin-bottom: 0 !important;
      pointer-events: none;
      overflow: hidden;
    }

    .gsfv-field.dd-open {
      position: relative;
      z-index: 100;
    }


    /* ── Multi-page progress bar ────────────────────────────────── */
    .gsfv-progress-wrap {
      margin-bottom: 24px;
      display: none;
    }

    .gsfv-progress-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12.5px;
      color: var(--text-3);
      margin-bottom: 8px;
      font-weight: 500;
    }

    .gsfv-progress-meta strong {
      color: var(--text-2);
    }

    .gsfv-progress-track {
      height: 4px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 99px;
      overflow: hidden;
    }

    .gsfv-progress-fill {
      height: 100%;
      border-radius: 99px;
      background: var(--accent-grad);
      transition: width 0.45s var(--ease);
    }

    /* ── Page section title (for page 2+) ───────────────────────── */
    .gsfv-page-hdr {
      background: var(--card-bg);
      border: 1px solid rgba(255, 255, 255, 0.10);
      border-radius: 14px;
      padding: 18px 20px 14px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.25);
      margin-bottom: 10px;
      display: none;
    }

    .gsfv-page-hdr-title {
      font-family: var(--font-display);
      font-size: clamp(18px, 4vw, 24px);
      font-weight: 700;
      color: var(--text);
      margin-bottom: 7px;
      line-height: 1.3;
    }

    .gsfv-page-hdr-desc {
      font-size: 14.5px;
      color: var(--text-2);
      line-height: 1.6;
    }

    /* ── Nav row: Back + Next/Submit ────────────────────────────── */
    .gsfv-nav-row {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-top: 4px;
    }

    .gsfv-back-btn {
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 14.5px;
      font-weight: 700;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.12);
      color: var(--text-2);
      cursor: pointer;
      font-family: var(--font);
      transition: all 0.18s;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .gsfv-back-btn:hover {
      color: var(--text);
      border-color: rgba(255, 255, 255, 0.22);
    }

    .gsfv-back-btn svg {
      width: 15px;
      height: 15px;
    }

    /* submit button inside nav row */
    .gsfv-nav-row .gsfv-submit {
      margin-top: 0;
      flex: 1;
    }

    /* Page-in animation */
    .gsfv-page-enter {
      animation: pageIn 0.3s var(--ease) both;
    }

    @keyframes pageIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ── Responsive ─────────────────────────────────────────────── */
    @media (max-width: 600px) {
      .gsfv-page {
        padding: 44px 10px 64px;
      }

      .gsfv-title {
        font-size: 22px;
      }

      .gsfv-field-card {
        padding: 18px 18px 14px;
      }

      .gsfv-header {
        padding: 20px 18px 18px;
      }

      .gsfv-num-btn {
        width: 38px;
        height: 38px;
      }
    }

    /* ── Pass Modal ──────────────────────────────────────────────── */
    .gsfv-pass-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.82);
      backdrop-filter: blur(18px);
      z-index: 9000;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .gsfv-pass-overlay.open {
      display: flex;
    }

    .gsfv-pass-modal {
      background: #07111f;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 20px;
      padding: 24px;
      max-width: 520px;
      width: 100%;
      max-height: 92vh;
      overflow-y: auto;
      box-shadow: 0 40px 100px rgba(0, 0, 0, 0.7);
      animation: passModalIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes passModalIn {
      from {
        opacity: 0;
        transform: scale(0.94) translateY(12px);
      }

      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    .gsfv-pass-modal-hdr {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }

    .gsfv-pass-modal-title {
      font-family: var(--font-display);
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
    }

    .gsfv-pass-modal-close {
      width: 34px;
      height: 34px;
      border-radius: 9px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-2);
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .gsfv-pass-canvas-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 16px;
    }

    .gsfv-pass-canvas-wrap canvas {
      border-radius: 12px;
      max-width: 100%;
    }

    .gsfv-pass-actions {
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    .gsfv-pass-btn {
      padding: 11px 22px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      border: none;
      font-family: var(--font);
      transition: all 0.18s;
    }

    .gsfv-pass-btn-dl {
      background: var(--accent-grad);
      color: #fff;
      box-shadow: 0 4px 18px rgba(0, 212, 255, 0.25);
    }

    .gsfv-pass-btn-dl:hover {
      box-shadow: 0 6px 28px rgba(0, 212, 255, 0.4);
    }

    .gsfv-pass-btn-close {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      color: var(--text-2);
    }

    /* ── Field card — standalone floating card per field ──────────── */
    .gsfv-field-card {
      background: var(--card-bg);
      border: 1px solid rgba(255, 255, 255, 0.10);
      border-radius: 14px;
      padding: 22px 24px 18px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.25);
    }

    /* ── Light mode overrides ──────────────────────────────────── */
    body.gsfv-light {
      --bg: #eef2f7;
      --surface: #ffffff;
      --glass: rgba(0, 0, 0, 0.02);
      --glass-b: rgba(0, 0, 0, 0.12);
      --glass-b2: rgba(0, 0, 0, 0.20);
      --text: #111827;
      --text-2: #374151;
      --text-3: #6b7280;
      --red-dim: rgba(244, 63, 94, 0.08);
      --accent-dim: rgba(0, 180, 220, 0.10);
      --card-bg: #ffffff;
      --header-color: #111827;
      --body-color: #374151;
    }

    body.gsfv-light .gsfv-header {
      border-color: rgba(0, 0, 0, 0.08);
      box-shadow: 0 2px 14px rgba(0, 0, 0, 0.07);
    }

    body.gsfv-light ::-webkit-scrollbar-thumb {
      background: rgba(0, 0, 0, 0.15);
    }

    body.gsfv-light * {
      scrollbar-color: rgba(0, 0, 0, 0.15) transparent;
    }

    body.gsfv-light::before {
      display: none;
    }

    /* inputs */
    body.gsfv-light .gsfv-input,
    body.gsfv-light .gsfv-textarea,
    body.gsfv-light .gsfv-select {
      background: #ffffff;
      border-color: rgba(0, 0, 0, 0.12);
      color: #111827;
    }

    body.gsfv-light .gsfv-input:focus,
    body.gsfv-light .gsfv-textarea:focus,
    body.gsfv-light .gsfv-select:focus {
      border-color: var(--accent);
    }

    body.gsfv-light .gsfv-input::placeholder,
    body.gsfv-light .gsfv-textarea::placeholder {
      color: #9ca3af;
    }

    body.gsfv-light .gsfv-select {
      background-color: #ffffff;
      background-image: url("data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 width=%2714%22 height=%2214%22 viewBox=%270 0 24 24%27 fill=%27none%27 stroke=%27%236b7280%27 stroke-width=%272%27%3E%3Cpolyline points=%276 9 12 15 18 9%27/%3E%3C/svg%3E");
    }

    body.gsfv-light .gsfv-select option {
      background: #fff;
      color: #111827;
    }

    /* option / radio / checkbox */
    body.gsfv-light .gsfv-option-label {
      background: rgba(0, 0, 0, 0.02);
      border-color: rgba(0, 0, 0, 0.10);
      color: #374151;
    }

    body.gsfv-light .gsfv-option-label:hover {
      background: #f3f4f6;
      border-color: rgba(0, 0, 0, 0.20);
      color: #111827;
    }

    body.gsfv-light .gsfv-option-label.selected {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: #111827;
    }

    body.gsfv-light .gsfv-option-indicator {
      border-color: rgba(0, 0, 0, 0.25);
    }

    body.gsfv-light .gsfv-option-label.selected .gsfv-option-indicator {
      border-color: var(--accent);
      background: var(--accent);
    }

    /* field card — bg already comes from --card-bg which is #fff in light mode */
    body.gsfv-light .gsfv-field-card {
      border-color: rgba(0, 0, 0, 0.08);
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
    }

    /* star rating */
    body.gsfv-light .gsfv-star-btn {
      color: rgba(0, 0, 0, 0.15);
    }

    /* number scale */
    body.gsfv-light .gsfv-num-btn {
      border-color: rgba(0, 0, 0, 0.15);
      color: #6b7280;
    }

    body.gsfv-light .gsfv-num-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-dim);
    }

    body.gsfv-light .gsfv-num-btn.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    /* upload */
    body.gsfv-light .gsfv-upload-zone {
      border-color: rgba(0, 0, 0, 0.15);
      background: rgba(0, 0, 0, 0.02);
    }

    body.gsfv-light .gsfv-upload-preview {
      background: #f9fafb;
      border-color: rgba(0, 0, 0, 0.10);
      color: #374151;
    }

    /* progress */
    body.gsfv-light .gsfv-progress-track {
      background: rgba(0, 0, 0, 0.08);
    }

    body.gsfv-light .gsfv-progress-meta {
      color: #6b7280;
    }

    /* section break */
    body.gsfv-light .gsfv-section-break {
      border-top-color: rgba(0, 0, 0, 0.12);
    }

    /* back button */
    body.gsfv-light .gsfv-back-btn {
      background: rgba(0, 0, 0, 0.04);
      border-color: rgba(0, 0, 0, 0.12);
      color: var(--text-2);
    }

    body.gsfv-light .gsfv-back-btn:hover {
      color: var(--text);
      border-color: rgba(0, 0, 0, 0.22);
    }

    /* skeleton */
    body.gsfv-light .gsfv-sk-line,
    body.gsfv-light .gsfv-sk-box {
      background: rgba(0, 0, 0, 0.07);
    }

    /* error icon */
    body.gsfv-light .gsfv-error-icon.not-found {
      background: rgba(0, 0, 0, 0.05);
    }

    body.gsfv-light .gsfv-nav-row {
      border-top-color: rgba(0, 0, 0, 0.08);
    }

    body.gsfv-light .gsfv-page-hdr {
      background: #ffffff;
      border-color: rgba(0, 0, 0, 0.08);
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
    }

    body.gsfv-light .gsfv-header::before {
      display: none;
    }

    body.gsfv-light .gsfv-star-btn {
      color: rgba(0, 0, 0, 0.18);
    }

    body.gsfv-light .gsfv-star-btn:hover {
      color: rgba(245, 158, 11, 0.5);
    }

    body.gsfv-light .gsfv-star-btn.active {
      color: #f59e0b;
    }

    /* ── Date / Time calendar + clock icon ────────────────────────── */
    .gsfv-input[type="date"]::-webkit-calendar-picker-indicator,
    .gsfv-input[type="time"]::-webkit-calendar-picker-indicator {
      filter: invert(1) opacity(0.6);
      cursor: pointer;
    }

    body.gsfv-light .gsfv-input[type="date"],
    body.gsfv-light .gsfv-input[type="time"] {
      color-scheme: light;
    }

    body.gsfv-light .gsfv-input[type="date"]::-webkit-calendar-picker-indicator,
    body.gsfv-light .gsfv-input[type="time"]::-webkit-calendar-picker-indicator {
      filter: opacity(0.45);
      cursor: pointer;
    }

    /* ── Custom Dropdown ──────────────────────────────────────────── */
    .gsfv-dd {
      position: relative;
    }

    .gsfv-dd-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 12px 14px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.10);
      border-radius: var(--radius);
      color: var(--text-3);
      font-size: 15px;
      font-family: var(--font);
      cursor: pointer;
      text-align: left;
      transition: border-color 0.18s;
    }

    .gsfv-dd-btn.has-val {
      color: var(--text);
    }

    .gsfv-dd-btn:focus {
      outline: none;
      border-color: var(--accent);
    }

    .gsfv-dd-btn svg {
      flex-shrink: 0;
      width: 14px;
      height: 14px;
      color: var(--text-3);
      transition: transform 0.25s var(--ease);
    }

    .gsfv-dd-btn.open svg {
      transform: rotate(180deg);
    }

    .gsfv-dd-list {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      right: 0;
      background: #0d1728;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 12px;
      overflow: hidden;
      max-height: 0;
      opacity: 0;
      pointer-events: none;
      z-index: 200;
      transition: max-height 0.28s var(--ease), opacity 0.2s;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(255, 255, 255, 0.1) transparent;
    }

    .gsfv-dd-list::-webkit-scrollbar {
      width: 3px;
    }

    .gsfv-dd-list::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.12);
      border-radius: 3px;
    }

    .gsfv-dd-list.open {
      max-height: 230px;
      opacity: 1;
      pointer-events: all;
    }

    .gsfv-dd-item {
      padding: 11px 14px;
      font-size: 14.5px;
      color: var(--text-2);
      cursor: pointer;
      transition: background 0.15s;
    }

    .gsfv-dd-item:hover {
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
    }

    .gsfv-dd-item.selected {
      background: var(--accent-dim);
      color: var(--accent);
      font-weight: 600;
    }

    .gsfv-dd-item.placeholder {
      color: var(--text-3);
      font-style: italic;
    }

    body.gsfv-light .gsfv-dd-btn {
      background: #ffffff;
      border-color: rgba(0, 0, 0, 0.12);
      color: #9ca3af;
    }

    body.gsfv-light .gsfv-dd-btn.has-val {
      color: #111827;
    }

    body.gsfv-light .gsfv-dd-list {
      background: #ffffff;
      border-color: rgba(0, 0, 0, 0.12);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
    }

    body.gsfv-light .gsfv-dd-item {
      color: #374151;
    }

    body.gsfv-light .gsfv-dd-item:hover {
      background: #f9fafb;
      color: #111827;
    }

    body.gsfv-light .gsfv-dd-item.selected {
      background: var(--accent-dim);
      color: var(--accent);
    }

    /* ── Phone + Country Code ─────────────────────────────────────── */
    .gsfv-phone-wrap {
      display: flex;
      gap: 0;
      align-items: stretch;
    }

    .gsfv-cc {
      position: relative;
      flex-shrink: 0;
    }

    .gsfv-cc-btn {
      height: 100%;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 12px 10px 12px 14px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.10);
      border-right: none;
      border-radius: var(--radius) 0 0 var(--radius);
      cursor: pointer;
      font-size: 15px;
      font-family: var(--font);
      color: var(--text);
      white-space: nowrap;
      transition: background 0.15s;
      min-width: 86px;
    }

    .gsfv-cc-btn:focus {
      outline: none;
    }

    .gsfv-cc-btn:hover {
      background: rgba(255, 255, 255, 0.08);
    }

    .gsfv-cc-btn svg {
      width: 10px;
      height: 10px;
      color: var(--text-3);
      flex-shrink: 0;
      transition: transform 0.22s var(--ease);
    }

    .gsfv-cc-btn.open svg {
      transform: rotate(180deg);
    }

    .gsfv-cc-menu {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      width: 280px;
      background: #0d1728;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 12px;
      overflow: hidden;
      max-height: 0;
      opacity: 0;
      pointer-events: none;
      z-index: 300;
      transition: max-height 0.28s var(--ease), opacity 0.2s;
    }

    .gsfv-cc-menu.open {
      max-height: 310px;
      opacity: 1;
      pointer-events: all;
    }

    .gsfv-cc-search-wrap {
      padding: 10px 10px 6px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.07);
    }

    .gsfv-cc-search {
      width: 100%;
      padding: 8px 12px;
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.10);
      border-radius: 8px;
      color: var(--text);
      font-size: 13.5px;
      font-family: var(--font);
      outline: none;
    }

    .gsfv-cc-search::placeholder {
      color: var(--text-3);
    }

    .gsfv-cc-list {
      max-height: 220px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(255, 255, 255, 0.1) transparent;
    }

    .gsfv-cc-list::-webkit-scrollbar {
      width: 3px;
    }

    .gsfv-cc-list::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.12);
      border-radius: 3px;
    }

    .gsfv-cc-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 14px;
      cursor: pointer;
      transition: background 0.14s;
      font-size: 13.5px;
    }

    .gsfv-cc-item:hover {
      background: rgba(255, 255, 255, 0.06);
    }

    .gsfv-cc-item.selected {
      background: var(--accent-dim);
    }

    .gsfv-cc-item-flag {
      width: 20px;
      height: 14px;
      border-radius: 2px;
      object-fit: cover;
      flex-shrink: 0;
      display: block;
    }

    .gsfv-cc-btn-flag {
      width: 20px;
      height: 14px;
      border-radius: 2px;
      object-fit: cover;
      flex-shrink: 0;
      display: block;
    }

    .gsfv-cc-item-name {
      color: var(--text-2);
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .gsfv-cc-item-code {
      color: var(--text-3);
      font-size: 12.5px;
      flex-shrink: 0;
    }

    .gsfv-phone-num {
      flex: 1;
      border-radius: 0 var(--radius) var(--radius) 0 !important;
    }

    body.gsfv-light .gsfv-cc-btn {
      background: #ffffff;
      border-color: rgba(0, 0, 0, 0.12);
      color: #111827;
    }

    body.gsfv-light .gsfv-cc-btn:hover {
      background: #f9fafb;
    }

    body.gsfv-light .gsfv-cc-menu {
      background: #ffffff;
      border-color: rgba(0, 0, 0, 0.12);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
    }

    body.gsfv-light .gsfv-cc-search {
      background: #f9fafb;
      border-color: rgba(0, 0, 0, 0.10);
      color: #111827;
    }

    body.gsfv-light .gsfv-cc-item {
      color: #374151;
    }

    body.gsfv-light .gsfv-cc-item:hover {
      background: #f9fafb;
    }

    body.gsfv-light .gsfv-cc-item-name {
      color: #374151;
    }

    body.gsfv-light .gsfv-cc-item-code {
      color: #6b7280;
    }
  </style>
</head>

<body>

  <!-- Accent bar -->
  <div class="gsfv-accent-bar" id="accentBar"></div>

  <!-- ── Loading State ──────────────────────────────────────────── -->
  <div class="gsfv-page" id="loadingState">
    <div class="gsfv-container gsfv-skeleton">
      <div class="gsfv-sk-line" style="width:60%;height:32px;margin-bottom:16px"></div>
      <div class="gsfv-sk-line" style="width:85%;height:14px;margin-bottom:6px"></div>
      <div class="gsfv-sk-line" style="width:70%;height:14px;margin-bottom:32px"></div>
      <div class="gsfv-sk-box"></div>
      <div class="gsfv-sk-box"></div>
      <div class="gsfv-sk-box" style="height:90px"></div>
      <div class="gsfv-sk-box"></div>
    </div>
  </div>

  <!-- ── Error / Closed State ───────────────────────────────────── -->
  <div class="gsfv-page" id="errorState" style="display:none">
    <div class="gsfv-container">
      <div class="gsfv-error-wrap">
        <div class="gsfv-error-icon" id="errIcon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="12" cy="12" r="10" />
            <line x1="12" y1="8" x2="12" y2="12" />
            <line x1="12" y1="16" x2="12.01" y2="16" />
          </svg>
        </div>
        <div id="errBadge"></div>
        <div class="gsfv-error-title" id="errTitle">Something went wrong</div>
        <div class="gsfv-error-sub" id="errSub">We couldn't load this form.</div>
      </div>
    </div>
  </div>

  <!-- ── Form State ─────────────────────────────────────────────── -->
  <div class="gsfv-page" id="formState" style="display:none">
    <div class="gsfv-container">

      <!-- Progress bar (hidden when single page) -->
      <div class="gsfv-progress-wrap" id="progressWrap">
        <div class="gsfv-progress-meta">
          <span>Step <strong id="pgNum">1</strong> of <strong id="pgTotal">1</strong></span>
          <span id="pgPct">0%</span>
        </div>
        <div class="gsfv-progress-track">
          <div class="gsfv-progress-fill" id="progressFill" style="width:0%"></div>
        </div>
      </div>

      <!-- Form title header (page 1 only) -->
      <div class="gsfv-header" id="formMainHeader">
        <!-- Cover image inside the card -->
        <div id="formCoverImage"
          style="display:none;width:100%;height:160px;background-size:cover;background-position:center;background-repeat:no-repeat;">
        </div>
        <div class="gsfv-header-content">
          <div class="gsfv-org-badge">
            <div class="gsfv-org-dot" id="orgDot"></div>
            <span id="orgBadgeText">GS Forms</span>
          </div>
          <h1 class="gsfv-title" id="formTitle"></h1>
          <p class="gsfv-desc" id="formDesc" style="display:none"></p>

        'application/msword': 'Word', 'application/vnd.openxmlformats-officedocument.wordprocessingml.document': 'Word',

        'application/zip': 'ZIP', 'application/x-zip-compressed': 'ZIP', '.zip': 'ZIP',
        'application/json': 'JSON', '.json': 'JSON', '.xml': 'XML',
      };
      const labels = acc.split(',').map(a => {
        a = a.trim();
        if (map[a]) return map[a];
        if (a.startsWith('.')) return a.slice(1).toUpperCase();
