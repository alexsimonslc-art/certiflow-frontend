    /* ════════════════════════════════════════════════════════════════
      MULTI-PAGE ENGINE
    ════════════════════════════════════════════════════════════════ */
    let _pages = [];   // [{ title, desc, fields[] }]
    let _currentPage = 0;

    /** Split fields into pages at section_break boundaries */
    function buildPages() {
      const fields = formConfig?.config?.fields || [];
      _pages = [];
      let page = { title: null, desc: null, image: null, fields: [] };

      fields.forEach(f => {
        if (f.type === 'section_break') {
          _pages.push(page);
          page = { title: f.label || '', desc: f.description || '', image: f.image || null, fields: [] };
        } else {
          page.fields.push(f);
        }
      });
      _pages.push(page);

      // Drop empty pages (e.g. two consecutive page breaks)
      if (_pages.length > 1) {
        _pages = _pages.filter(p => p.fields.length > 0);
      }
      _currentPage = 0;
    }

    /** Render a specific page */
    function showPage(n) {
      _currentPage = n;
      const page = _pages[n];
      const total = _pages.length;
      const isFirst = n === 0;
      const isLast = n === total - 1;
      const s = formConfig?.config?.settings || {};

      // Progress bar
      const progressWrap = document.getElementById('progressWrap');
      if (total > 1) {
        progressWrap.style.display = '';
        const pct = Math.round(((n + 1) / total) * 100);
        document.getElementById('progressFill').style.width = pct + '%';
        document.getElementById('pgNum').textContent = n + 1;
        document.getElementById('pgTotal').textContent = total;
        document.getElementById('pgPct').textContent = pct + '%';
      } else {
        progressWrap.style.display = 'none';
      }

      // Page 1: show form header; Page 2+: show section title
      document.getElementById('formMainHeader').style.display = isFirst ? '' : 'none';
      const pageHdr = document.getElementById('pageHdr');
      if (!isFirst && (page.title || page.image)) {
        pageHdr.style.display = '';
        document.getElementById('pageHdrTitle').textContent = page.title;
        const descEl = document.getElementById('pageHdrDesc');
        if (page.desc) { descEl.innerHTML = page.desc; descEl.style.display = ''; }
        else descEl.style.display = 'none';

        const imgEl = document.getElementById('pageHdrImage');
        if (page.image) {
          imgEl.style.backgroundImage = `url(${JSON.stringify(page.image)})`;
          imgEl.style.display = 'block';
        } else {
          imgEl.style.display = 'none';
        }
      } else {
        pageHdr.style.display = 'none';
      }

      // Render fields with animation
      const container = document.getElementById('fieldsContainer');
      container.innerHTML = page.fields.map(f => renderField(f)).join('');
      container.classList.remove('gsfv-page-enter');
      void container.offsetWidth; // reflow
      container.classList.add('gsfv-page-enter');
      wireFields(page.fields);
      evaluateConditions();

      // Back button
      const backBtn = document.getElementById('backBtn');
      backBtn.style.display = isFirst ? 'none' : 'flex';

      // Submit/Next button label + action
      const labelEl = document.getElementById('submitLabel');
      const btn = document.getElementById('submitBtn');
      const passLabel = (isLast && s.passEnabled) ? '🎫 ' + (s.submitLabel || 'Submit & Get Pass') : null;
      labelEl.textContent = passLabel || (isLast ? (s.submitLabel || 'Submit') : 'Next →');
      btn.onclick = isLast ? handleSubmit : nextPage;
      // Style change: next vs submit
      btn.style.background = isLast ? 'var(--accent-grad)' : 'var(--accent-grad)';

      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function nextPage() {
      if (!validate()) return;
      if (_currentPage < _pages.length - 1) showPage(_currentPage + 1);
    }

    function prevPage() {
      if (_currentPage > 0) showPage(_currentPage - 1);
    }

    /* ════════════════════════════════════════════════════════════════
       BOOT
    ════════════════════════════════════════════════════════════════ */
    (async function boot() {
      // 1. Extract slug
      formSlug = new URLSearchParams(window.location.search).get('f') || '';
      if (!formSlug) { return showError('not-found', 'No form specified', 'Add ?f=your-form-slug to the URL.'); }

      // 2. Wake the backend silently while user reads the form
      fetch(BACKEND + '/api/ping').catch(() => { });

      // 3. Load form config from Supabase (instant — always on)
      try {
        const { data, error } = await sb
          .from('gs_forms')
          .select('id, name, slug, status, config, submission_count')
          .eq('slug', formSlug)
          .in('status', ['published', 'closed'])
          .single();

        if (error || !data) {
          // 4. Fallback: try backend (in case Supabase hiccup)
          const res = await fetch(`${BACKEND}/api/gsforms/view/${encodeURIComponent(formSlug)}`);
          if (!res.ok) throw new Error('not-found');
          const json = await res.json();
          renderForm(json.form);
        } else {
          renderForm(data);
        }
      } catch (e) {
        showError('not-found', 'Form not found', 'This form doesn\'t exist or the link may be incorrect.');
      }
    })();

    /* ════════════════════════════════════════════════════════════════
       RENDER FORM
    ════════════════════════════════════════════════════════════════ */
    function renderForm(form) {
      formConfig = form;
      const cfg = form.config || {};
      const s = cfg.settings || {};
      const th = cfg.theme || {};
      const fields = cfg.fields || [];

      // Set accent from theme
      accent = ACCENTS[th.color] || ACCENTS.cyan;
      applyAccent(accent);

      // Closed state
      if (form.status === 'closed') {
        return showError('closed',
          'Form closed',
          'This form is no longer accepting responses.',
          'Closed'
        );
      }

      // Max submissions check
      if (s.maxSubmissions && form.submission_count >= s.maxSubmissions) {
        return showError('full',
          'Responses full',
          'This form has reached its maximum number of responses.',
          'Full'
        );
      }

      // Close date check — if closeDate has passed, treat as closed
      if (s.closeDate) {
        const cd = new Date(s.closeDate);
        // Set to end of that day
        cd.setHours(23, 59, 59, 999);
        if (cd < new Date()) {
          return showError('closed',
            'Form closed',
            'This form stopped accepting responses on ' +
            cd.toLocaleDateString('en-IN', { day: 'numeric', month: 'long', year: 'numeric' }) + '.',
            'Closed'
          );
        }
      }

      // Page title + meta
      const title = s.title || form.name || 'Form';
      document.title = `${title} — GS Forms`;

      // Light mode
      if (th.lightMode) document.body.classList.add('gsfv-light');

      // Dynamic font loading and full theme application
      loadCustomFonts(th);
      applyFormTheme(th);

      // Cover image
      if (s.coverImage) {
        const coverEl = document.getElementById('formCoverImage');
        coverEl.style.backgroundImage = `url(${JSON.stringify(s.coverImage)})`;
        coverEl.style.display = '';
      }

      // Header (page 1)
      document.getElementById('formTitle').textContent = title;
      const descEl = document.getElementById('formDesc');
      if (s.description) { descEl.innerHTML = s.description; descEl.style.display = ''; }

      // Allow multiple → show "submit another" after
      if (s.allowMultiple) document.getElementById('tyAnotherBtn').style.display = '';

      // Build pages from section_breaks + show page 1
      buildPages();
      showPage(0);

      // Show form
      document.getElementById('loadingState').style.display = 'none';
      document.getElementById('formState').style.display = '';
    }

    /* ── Apply accent to CSS vars ──────────────────────────────────── */
    function applyAccent(a) {
      const root = document.documentElement;
      root.style.setProperty('--accent', a.solid);
      root.style.setProperty('--accent-dim', a.dim);
      root.style.setProperty('--accent-grad', a.grad);
      document.getElementById('accentBar').style.background = a.grad;
      document.getElementById('orgDot').style.background = a.solid;
    }

    /* ════════════════════════════════════════════════════════════════
       FIELD RENDERING
    ════════════════════════════════════════════════════════════════ */
    function renderField(f) {

      // Section break — no label wrapper
      if (f.type === 'section_break') {
        return `
      <div class="gsfv-section-break">
        ${f.label ? `<div class="gsfv-section-title">${esc(f.label)}</div>` : ''}
        ${f.description ? `<div class="gsfv-section-desc">${esc(f.description)}</div>` : ''}
      </div>`;
      }

      const req = f.required ? `<span class="gsfv-req">*</span>` : '';
      const errMsg = `<div class="gsfv-error-msg" id="err-${f.id}">This field is required.</div>`;
      let input = '';

      switch (f.type) {

        case 'text':
          input = `<input class="gsfv-input" id="fi-${f.id}" type="text"
                      placeholder="${escAttr(f.placeholder || '')}"
                      oninput="fv['${f.id}']=this.value;clearErr('${f.id}')"/>`;
          break;

        case 'email':
          input = `<input class="gsfv-input" id="fi-${f.id}" type="email"
                      placeholder="${escAttr(f.placeholder || 'you@example.com')}"
                      oninput="fv['${f.id}']=this.value;clearErr('${f.id}')"/>`;
          break;

        case 'phone':
          input = `<div class="gsfv-phone-wrap" id="pw-${f.id}">
            <div class="gsfv-cc" id="cc-${f.id}">
              <button type="button" class="gsfv-cc-btn" id="ccb-${f.id}" onclick="toggleCC('${f.id}')">
                <img id="ccflag-${f.id}" src="https://flagcdn.com/w20/in.png" alt="IN" class="gsfv-cc-btn-flag"/>
                <span id="ccdial-${f.id}">+91</span>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
              </button>
              <div class="gsfv-cc-menu" id="ccmenu-${f.id}">
                <div class="gsfv-cc-search-wrap">
                  <input class="gsfv-cc-search" type="text" placeholder="Search country or code…"
                         oninput="filterCC('${f.id}',this.value)" autocomplete="off"/>
                </div>
                <div class="gsfv-cc-list" id="cclist-${f.id}"></div>
              </div>
            </div>
            <input class="gsfv-input gsfv-phone-num" id="fi-${f.id}" type="tel"
                   placeholder="${escAttr(f.placeholder || 'Phone number')}"
                   oninput="updatePhone('${f.id}',this.value)"/>
          </div>`;
          break;

        case 'number':
          input = `<input class="gsfv-input" id="fi-${f.id}" type="number"
                      placeholder="${escAttr(f.placeholder || '0')}"
                      ${f.validation?.min != null ? `min="${f.validation.min}"` : ''}
                      ${f.validation?.max != null ? `max="${f.validation.max}"` : ''}
                      oninput="fv['${f.id}']=this.value;clearErr('${f.id}')"/>`;
          break;

        case 'textarea':
          input = `<textarea class="gsfv-textarea" id="fi-${f.id}"
                         placeholder="${escAttr(f.placeholder || '')}"
                         oninput="fv['${f.id}']=this.value;clearErr('${f.id}')"></textarea>`;
          break;

        case 'date':
          input = `<input class="gsfv-input" id="fi-${f.id}" type="date"
                      onchange="fv['${f.id}']=this.value;clearErr('${f.id}')"/>`;
          break;

        case 'time':
          input = `<input class="gsfv-input" id="fi-${f.id}" type="time"
                      onchange="fv['${f.id}']=this.value;clearErr('${f.id}')"/>`;
          break;

        case 'dropdown': {
          const ddItems = (f.options || []).map(o =>
            `<div class="gsfv-dd-item" data-val="${escAttr(o)}" onclick="pickDD('${f.id}','${escAttr(o)}',this)">${esc(o)}</div>`
          ).join('');
          input = `<div class="gsfv-dd" id="ddc-${f.id}">
            <button type="button" class="gsfv-dd-btn" id="ddb-${f.id}" onclick="toggleDD('${f.id}')">
              <span id="ddv-${f.id}">— Select —</span>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
            </button>
            <div class="gsfv-dd-list" id="ddl-${f.id}">
              <div class="gsfv-dd-item placeholder" data-val="" onclick="pickDD('${f.id}','',this)">— Select —</div>
              ${ddItems}
            </div>
          </div>`;
          break;
        }

        case 'radio':
          input = `<div class="gsfv-options" id="fi-${f.id}">
        ${(f.options || []).map((o, i) => `
          <label class="gsfv-option-label" onclick="pickRadio('${f.id}',${i},${(f.options || []).length})">
            <div class="gsfv-option-indicator"></div>
            <span>${esc(o)}</span>
          </label>`).join('')}
      </div>`;
          break;

        case 'checkbox':
          input = `<div class="gsfv-options" id="fi-${f.id}">
        ${(f.options || []).map((o, i) => `
          <label class="gsfv-option-label" onclick="pickCheckbox('${f.id}',${i})">
            <div class="gsfv-option-indicator box"></div>
            <span>${esc(o)}</span>
          </label>`).join('')}
      </div>`;
          // Init checkbox value as empty array
          formValues[f.id] = [];
          break;

        case 'linear_scale':
          const max = f.max || 5;
          if ((f.style || 'stars') === 'stars') {
            input = `
          <div class="gsfv-stars" id="fi-${f.id}">
            ${Array.from({ length: max }, (_, i) =>
              `<button type="button" class="gsfv-star-btn" data-val="${i + 1}" onclick="pickStar('${f.id}',${i + 1},${max})">★</button>`
            ).join('')}
          </div>
          <div class="gsfv-scale-labels" style="max-width:${max * 46}px">
            <span>${esc(f.minLabel || 'Poor')}</span>
            <span>${esc(f.maxLabel || 'Excellent')}</span>
          </div>`;
          } else {
            input = `
          <div class="gsfv-num-scale" id="fi-${f.id}">
            <span class="gsfv-scale-label min-label">${esc(f.minLabel || 'Poor')}</span>
            <div class="gsfv-num-scale-inner">
              ${Array.from({ length: max }, (_, i) =>
              `<button type="button" class="gsfv-num-btn" data-val="${i + 1}" onclick="pickNum('${f.id}',${i + 1},${max})">${i + 1}</button>`
            ).join('')}
            </div>
            <span class="gsfv-scale-label max-label">${esc(f.maxLabel || 'Excellent')}</span>
          </div>`;
          }
          break;

        case 'file_upload':
          const accept = f.accept && f.accept !== '*' ? f.accept : '';
          input = `
        <div class="gsfv-upload-zone" id="fi-${f.id}"
             ondragover="this.classList.add('drag-over')"
             ondragleave="this.classList.remove('drag-over')"
             ondrop="handleDrop('${f.id}',event)">
          <input type="file" ${accept ? `accept="${escAttr(accept)}"` : ''}
                 onchange="handleFileChange('${f.id}',this)"/>
          <svg class="gsfv-upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="16 16 12 12 8 16"/>
            <line x1="12" y1="12" x2="12" y2="21"/>
            <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/>
          </svg>
          <div class="gsfv-upload-text"><strong>Click to upload</strong> or drag &amp; drop</div>
          <div class="gsfv-upload-sub">${niceAccept(accept)} · Max ${f.maxMB || 10} MB</div>
        </div>
        <div class="gsfv-upload-preview" id="fp-${f.id}" style="display:none">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          <span id="fn-${f.id}">No file</span>
        </div>`;
          break;

        default:
          input = `<input class="gsfv-input" id="fi-${f.id}" type="text"
                      placeholder="${escAttr(f.placeholder || '')}"
                      oninput="fv['${f.id}']=this.value;clearErr('${f.id}')"/>`;
      }

      return `
    <div class="gsfv-field" id="fw-${f.id}" data-field-id="${f.id}">
      <div class="gsfv-field-card">
        <div class="gsfv-label">${esc(f.label || 'Field')} ${req}</div>
        ${input}
        ${errMsg}
      </div>
    </div>`;
    }

    /* ── Wire up field events post-render ──────────────────────────── */
    function wireFields(fields) {
      // Initialize formValues
      fields.forEach(f => {
        if (f.type === 'checkbox' && !(f.id in formValues)) formValues[f.id] = [];
        else if (!(f.id in formValues)) formValues[f.id] = '';
        if (f.type === 'phone') initCC(f.id);
      });
      // Set initial max-height on all fields so cond-hidden animation works
      requestAnimationFrame(() => {
        fields.forEach(f => {
          if (f.type === 'section_break') return;
          const wrap = document.getElementById('fw-' + f.id);
          if (wrap) wrap.style.maxHeight = wrap.scrollHeight + 300 + 'px';
        });
        evaluateConditions();
      });
    }

    /* ════════════════════════════════════════════════════════════════
       INTERACTIVE FIELD HANDLERS
    ════════════════════════════════════════════════════════════════ */

    const fv = new Proxy(formValues, {
      set(target, key, value) {
        target[key] = value;
        evaluateConditions(); // re-evaluate show/hide after every text field change
        return true;
      }
    });
    function pickRadio(fieldId, idx, total) {
      formValues[fieldId] = (formConfig.config.fields.find(f => f.id === fieldId)?.options || [])[idx] || '';
      clearErr(fieldId);
      const container = document.getElementById('fi-' + fieldId);
      if (!container) return;
      container.querySelectorAll('.gsfv-option-label').forEach((el, i) => {
        el.classList.toggle('selected', i === idx);
      });
      evaluateConditions();
    }

    function pickCheckbox(fieldId, idx) {
      const field = formConfig.config.fields.find(f => f.id === fieldId);
      const val = (field?.options || [])[idx] || '';
      if (!Array.isArray(formValues[fieldId])) formValues[fieldId] = [];
      const arr = formValues[fieldId];
      const pos = arr.indexOf(val);
      if (pos > -1) arr.splice(pos, 1);
      else arr.push(val);
      clearErr(fieldId);
      const container = document.getElementById('fi-' + fieldId);
      if (!container) return;
      container.querySelectorAll('.gsfv-option-label').forEach((el, i) => {
        const optVal = (field?.options || [])[i] || '';
        el.classList.toggle('selected', arr.includes(optVal));
      });
      evaluateConditions();
    }

    function pickStar(fieldId, val, max) {
      formValues[fieldId] = val;
      clearErr(fieldId);
      const container = document.getElementById('fi-' + fieldId);
      if (!container) return;
      container.querySelectorAll('.gsfv-star-btn').forEach(btn => {
        btn.classList.toggle('active', +btn.dataset.val <= val);
      });
      evaluateConditions();
    }

    function pickNum(fieldId, val, max) {
      formValues[fieldId] = val;
      clearErr(fieldId);
      const container = document.getElementById('fi-' + fieldId);
      if (!container) return;
      container.querySelectorAll('.gsfv-num-btn').forEach(btn => {
        btn.classList.toggle('active', +btn.dataset.val === val);
      });
      evaluateConditions();
    }

    async function handleFileChange(fieldId, input) {
      const file = input.files?.[0];
      if (!file) return;
      const field = formConfig.config.fields.find(f => f.id === fieldId);
      const maxMB = field?.maxMB || 10;
      if (file.size > maxMB * 1024 * 1024) {
        showFieldError(fieldId, `File too large. Max ${maxMB} MB.`);
        input.value = '';
        return;
      }
      clearErr(fieldId);

      // Show uploading state
      const zone = document.getElementById('fi-' + fieldId);
      const prev = document.getElementById('fp-' + fieldId);
      const nameEl = document.getElementById('fn-' + fieldId);
      if (zone) zone.dataset.uploading = '1';
      if (prev) prev.style.display = '';
      if (nameEl) nameEl.textContent = `Uploading ${file.name}…`;

      try {
        const fd = new FormData();
        fd.append('file', file);
        fd.append('fieldId', fieldId);
        const res = await fetch(`${BACKEND}/api/gsforms/upload/${encodeURIComponent(formSlug)}`, {
          method: 'POST',
          body: fd,
        });
        const json = await res.json();
        if (!res.ok) throw new Error(json.error || 'Upload failed');

        // Store Drive URL so it gets written to the Sheet on submit
        formValues[fieldId] = json.driveUrl || file.name;
        fileObjects[fieldId] = file;
        if (zone) delete zone.dataset.uploading;
        if (nameEl) nameEl.textContent = `${file.name} (${(file.size / 1024 / 1024).toFixed(1)} MB) ✓`;
      } catch (err) {
        formValues[fieldId] = '';
        delete fileObjects[fieldId];
        if (zone) delete zone.dataset.uploading;
        if (prev) prev.style.display = 'none';
        showFieldError(fieldId, err.message || 'File upload failed. Please try again.');
        input.value = '';
      }
    }

    function handleDrop(fieldId, e) {
      e.preventDefault();
      document.getElementById('fi-' + fieldId)?.classList.remove('drag-over');
      const file = e.dataTransfer.files?.[0];
      if (!file) return;
      handleFileChange(fieldId, { files: [file] });
    }

    /* ════════════════════════════════════════════════════════════════
       VALIDATION
    ════════════════════════════════════════════════════════════════ */
    function validate() {
      // Only validate fields on the CURRENT page
      const page = _pages[_currentPage] || { fields: [] };
      const fields = page.fields;
      let valid = true;
      let firstErrId = null;

      fields.forEach(f => {
        if (f.type === 'section_break') return;
        if (!isFieldVisible(f)) return;
        clearErr(f.id);

        const val = formValues[f.id];
        const isEmpty = Array.isArray(val) ? val.length === 0 : !String(val || '').trim();

        if (f.required && isEmpty) {
          showFieldError(f.id, 'This field is required.');
          if (!firstErrId) firstErrId = f.id;
          valid = false;
          return;
        }

        if (!isEmpty) {
          // Email format
          if (f.type === 'email' && val && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val)) {
            showFieldError(f.id, 'Please enter a valid email address.');
            if (!firstErrId) firstErrId = f.id;
            valid = false;
            return;
          }
          // Number range
          if (f.type === 'number' && val !== '') {
            const n = +val;
            if (f.validation?.min != null && n < f.validation.min) {
              showFieldError(f.id, `Minimum value is ${f.validation.min}.`);
              if (!firstErrId) firstErrId = f.id;
              valid = false;
              return;
            }
            if (f.validation?.max != null && n > f.validation.max) {
              showFieldError(f.id, `Maximum value is ${f.validation.max}.`);
              if (!firstErrId) firstErrId = f.id;
              valid = false;
              return;
            }
          }
        }
      });

      if (firstErrId) {
        const el = document.getElementById('fw-' + firstErrId);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }

      return valid;
    }

    function showFieldError(fieldId, msg) {
      const wrap = document.getElementById('fw-' + fieldId);
      const err = document.getElementById('err-' + fieldId);
      if (wrap) wrap.classList.add('has-error');
      if (err) err.textContent = msg;
    }

    function clearErr(fieldId) {
      const wrap = document.getElementById('fw-' + fieldId);
      const err = document.getElementById('err-' + fieldId);
      if (wrap) wrap.classList.remove('has-error');
      if (err) err.textContent = 'This field is required.';
    }

    /* ── Option Caps: fetch live counts and disable full options ── */
    async function applyOptionCaps(slug) {
      try {
        const res = await fetch(`${GSF_PUBLIC}/public/caps?slug=${encodeURIComponent(slug)}`);
        if (!res.ok) return;
        const { optionCounts, fields } = await res.json();
        (fields || []).forEach(field => {
          if (!['radio', 'dropdown'].includes(field.type)) return;
          const caps = field.optionCaps || [];
          if (!caps.some(c => c)) return;
          const counts = optionCounts?.[field.id] || {};
          (field.options || []).forEach((opt, i) => {
            const cap = caps[i]; if (!cap) return;
            const taken = counts[opt] || 0;
            if (taken >= cap) {
              // radio / checkbox option wrappers
              document.querySelectorAll(`[data-option-val="${CSS.escape(opt)}"]`).forEach(el => {
                el.style.opacity = '0.4'; el.style.pointerEvents = 'none';
                const badge = document.createElement('span');
                badge.style.cssText = 'font-size:10px;margin-left:8px;color:var(--red);font-weight:700';
                badge.textContent = 'FULL';
                el.appendChild(badge);
              });
              // dropdown <option>
              document.querySelectorAll(`option[value="${opt}"]`).forEach(el => {
                el.disabled = true; el.textContent += ' (Full)';
              });
            }
          });
        });
      } catch { /* non-critical */ }
    }
    /* ════════════════════════════════════════════════════════════════
       SUBMIT
    ════════════════════════════════════════════════════════════════ */
    async function handleSubmit() {
      if (!validate()) return;

      const btn = document.getElementById('submitBtn');
      const labelEl = document.getElementById('submitLabel');
      btn.disabled = true;
      btn.classList.add('loading');
      labelEl.textContent = '';

      // Build submission payload
      const payload = { data: {} };
      const fields = formConfig?.config?.fields || [];
      fields.forEach(f => {
        if (f.type === 'section_break') return;
        if (!isFieldVisible(f)) return;
        // file_upload fields: formValues[f.id] already holds the Drive URL from the pre-upload step
        payload.data[f.id] = formValues[f.id] ?? '';
      });

      // Add field labels as metadata so Sheet headers are readable
      payload.fieldMeta = {};
      fields.forEach(f => {
        if (f.type !== 'section_break') {
          payload.fieldMeta[f.id] = f.label || f.id;
        }
      });

      try {
        const res = await fetch(`${BACKEND}/api/gsforms/submit/${encodeURIComponent(formSlug)}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          // Handle "form closed" mid-session
          if (res.status === 403) {
            showError('closed', 'Form closed', err.error || 'This form is no longer accepting responses.', 'Closed');
            return;
          }
          // Handle duplicate email
          if (res.status === 409 && err.alreadyRegistered) {
            btn.disabled = false;
            btn.classList.remove('loading');
            labelEl.textContent = formConfig?.config?.settings?.submitLabel || 'Submit';
            document.getElementById('formState').style.display = 'none';
            showError('closed', 'Already Registered', err.error, 'Registered');
            return;
          }
          // Handle option-full (cap reached) — show toast, keep form open
          if (res.status === 409 && err.optionFull) {
            showToast(err.error || 'That option is full.', 'warn');
            btn.disabled = false;
            btn.classList.remove('loading');
            labelEl.textContent = formConfig?.config?.settings?.submitLabel || 'Submit';
            return;
          }
          throw new Error(err.error || 'Submission failed');
        }

        const data = await res.json();

        // Show entry pass modal if backend returned one
        if (data.pass?.enabled) {
          showThankYou(data.message || formConfig?.config?.settings?.successMessage || 'Thank you for your response!');
          showPassModal(data.pass);
        } else {
          showThankYou(data.message || formConfig?.config?.settings?.successMessage || 'Thank you for your response!');
          // Redirect if configured
          const redirectUrl = formConfig?.config?.settings?.redirectUrl;
          if (redirectUrl) {
            setTimeout(() => { window.location.href = redirectUrl; }, 2500);
          }
        }

      } catch (e) {
        btn.disabled = false;
        btn.classList.remove('loading');
        labelEl.textContent = formConfig?.config?.settings?.submitLabel || 'Submit';
        showToast(e.message || 'Something went wrong. Please try again.', 'error');
      }
    }

    /* ── Show thank you ─────────────────────────────────────────────── */
    function showThankYou(message) {
      // Mark as submitted for this browser session (duplicate guard)
      sessionStorage.setItem('gsf_submitted_' + formSlug, '1');
      document.getElementById('formState').style.display = 'none';
      document.getElementById('thankYouState').style.display = '';
      document.getElementById('tyMessage').textContent = message;
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
    /* ── Reset for "submit another" ────────────────────────────────── */
    function resetForm() {
      formValues = {};
      fileObjects = {};
      _pages = [];
      _currentPage = 0;
      document.getElementById('thankYouState').style.display = 'none';
      renderForm(formConfig);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    /* ════════════════════════════════════════════════════════════════
       ERROR STATE
    ════════════════════════════════════════════════════════════════ */
    function showError(type, title, sub, badge) {
      document.getElementById('loadingState').style.display = 'none';
      document.getElementById('formState').style.display = 'none';
      document.getElementById('errorState').style.display = '';

      const icons = {
        'not-found': `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`,
        'closed': `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>`,
        'full': `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></svg>`,
      };

      document.getElementById('errIcon').className = `gsfv-error-icon ${type}`;
      document.getElementById('errIcon').innerHTML = icons[type] || icons['not-found'];
      document.getElementById('errTitle').textContent = title;
      document.getElementById('errSub').textContent = sub;

      const badgeEl = document.getElementById('errBadge');
      if (badge) {
        badgeEl.innerHTML = `<div class="gsfv-error-badge ${type}">● ${badge}</div>`;
        badgeEl.style.display = '';
      } else {
        badgeEl.style.display = 'none';
      }
    }

    /* ════════════════════════════════════════════════════════════════
       TOAST (minimal, self-contained)
    ════════════════════════════════════════════════════════════════ */
    function showToast(msg, type = 'error') {
      const existing = document.getElementById('gsfv-toast');
      if (existing) existing.remove();
      const colors = {
        error: { bg: 'rgba(244,63,94,0.12)', border: 'rgba(244,63,94,0.3)', icon: '#f43f5e', sym: '✕' },
        success: { bg: 'rgba(16,185,129,0.12)', border: 'rgba(16,185,129,0.3)', icon: '#10b981', sym: '✓' },
        warn: { bg: 'rgba(245,158,11,0.12)', border: 'rgba(245,158,11,0.3)', icon: '#f59e0b', sym: '⚠' },
      };
      const c = colors[type] || colors.error;
      const el = document.createElement('div');
      el.id = 'gsfv-toast';
      el.style.cssText = `
    position:fixed;bottom:24px;right:20px;z-index:9999;
    background:${c.bg};border:1px solid ${c.border};
    backdrop-filter:blur(20px);color:#dde6f5;
    font-size:14px;font-weight:500;padding:12px 18px;
    border-radius:11px;display:flex;align-items:center;gap:10px;
    box-shadow:0 8px 32px rgba(0,0,0,0.4);
    font-family:'Plus Jakarta Sans',sans-serif;max-width:320px;
    animation:toastIn 0.3s ease;
  `;
      el.innerHTML = `
    <style>@keyframes toastIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}</style>
    <span style="color:${c.icon};font-size:15px">${c.sym}</span>
    <span>${msg}</span>`;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 4000);
    }

    /* ════════════════════════════════════════════════════════════════
       BATCH 5 — CONDITIONAL LOGIC EVALUATION
    ════════════════════════════════════════════════════════════════ */

    /**
     * Run after every field value change.
     * Checks every field's conditions and shows/hides accordingly.
     * Hidden fields have their values cleared so they don't submit.
     */
    function evaluateConditions() {
      const fields = formConfig?.config?.fields || [];
      fields.forEach(f => {
        if (f.type === 'section_break') return;
        if (!f.conditions || f.conditions.length === 0) return; // always visible

        const wrap = document.getElementById('fw-' + f.id);
        if (!wrap) return;

        const visible = isFieldVisible(f);
        const wasHidden = wrap.classList.contains('cond-hidden');

        if (visible && wasHidden) {
          // Reveal field
          wrap.classList.remove('cond-hidden');
          wrap.style.maxHeight = wrap.scrollHeight + 300 + 'px'; // generous for any field type
        } else if (!visible && !wasHidden) {
          // Hide field + clear its value
          wrap.style.maxHeight = wrap.scrollHeight + 'px'; // set explicit before animating to 0
          requestAnimationFrame(() => {
            wrap.classList.add('cond-hidden');
          });
          clearFieldValue(f);
        }
      });
    }

    /** Returns true if the field should be shown based on its conditions */
    function isFieldVisible(field) {
      if (!field.conditions || field.conditions.length === 0) return true;
      const logic = field.conditionLogic || 'all';
      const results = field.conditions.map(c => evalCondition(c));
      return logic === 'any' ? results.some(Boolean) : results.every(Boolean);
    }

    /** Evaluates a single condition rule */
    function evalCondition(cond) {
      const raw = formValues[cond.fieldId];
      const condVal = String(cond.value || '').toLowerCase().trim();
      const operator = cond.operator || 'equals';

      // Normalise value for comparison
      const valStr = Array.isArray(raw) ? raw.join(',').toLowerCase() : String(raw || '').toLowerCase().trim();
      const valArr = Array.isArray(raw) ? raw.map(v => v.toLowerCase()) : [valStr];
      const isEmpty = Array.isArray(raw) ? raw.length === 0 : valStr === '';

      switch (operator) {
        case 'equals':
          return valArr.includes(condVal) || valStr === condVal;

        case 'not_equals':
          return !valArr.includes(condVal) && valStr !== condVal;

        case 'contains':
          return valArr.some(v => v.includes(condVal)) || valStr.includes(condVal);

        case 'not_contains':
          return !valArr.some(v => v.includes(condVal)) && !valStr.includes(condVal);

        case 'is_filled':
          return !isEmpty;

        case 'is_empty':
          return isEmpty;

        default:
          return true; // unknown operator → always show
      }
    }

    /** Clears a field's value and resets its visual UI state */
    function clearFieldValue(field) {
      const fid = field.id;

      // Clear from formValues
      if (Array.isArray(formValues[fid])) formValues[fid] = [];
      else formValues[fid] = '';

      // Reset visual state based on type
      switch (field.type) {
        case 'text': case 'email': case 'phone': case 'number':
        case 'date': case 'time': case 'textarea': {
          const el = document.getElementById('fi-' + fid);
          if (el) el.value = '';
          break;
        }
        case 'dropdown': {
          const el = document.getElementById('fi-' + fid);
          if (el) el.selectedIndex = 0;
          break;
        }
        case 'radio': case 'checkbox': {
          const container = document.getElementById('fi-' + fid);
          if (container) container.querySelectorAll('.gsfv-option-label').forEach(el => el.classList.remove('selected'));
          break;
        }
        case 'linear_scale': {
          const container = document.getElementById('fi-' + fid);
          if (container) container.querySelectorAll('.gsfv-star-btn, .gsfv-num-btn').forEach(el => el.classList.remove('active'));
          break;
        }
        case 'file_upload': {
          const prev = document.getElementById('fp-' + fid);
          if (prev) prev.style.display = 'none';
          break;
        }
      }
      clearErr(fid);
    }

    /* ── Helpers ─────────────────────────────────────────────────────── */
    function esc(s) {
      return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }
    function escAttr(s) {
      return String(s || '').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    /* ── Dynamic font loader ─────────────────────────────────────────── */
    function loadCustomFonts(th) {
      const preloaded = ['Plus Jakarta Sans', 'Syne'];
      const toLoad = [];
      [th.headingFont, th.bodyFont].forEach(f => {
        if (f && !preloaded.includes(f) && !toLoad.includes(f)) toLoad.push(f);
      });
      if (toLoad.length) {
        const families = toLoad.map(f => `family=${encodeURIComponent(f)}:wght@400;500;600;700;800`).join('&');
        const link = document.createElement('link');
        link.rel = 'stylesheet';
        link.href = `https://fonts.googleapis.com/css2?${families}&display=swap`;
        document.head.appendChild(link);
      }
      if (th.headingFont) document.documentElement.style.setProperty('--font-display', `'${th.headingFont}', sans-serif`);
      if (th.bodyFont) document.documentElement.style.setProperty('--font', `'${th.bodyFont}', sans-serif`);
    }

    /* ── Apply full theme to CSS vars ─────────────────────────────────── */
    function applyFormTheme(th) {
      const root = document.documentElement;
      if (th.cardColor) root.style.setProperty('--card-bg', th.cardColor);
      if (th.pageColor) root.style.setProperty('--bg', th.pageColor);
      if (th.headerFontSize) root.style.setProperty('--header-size', th.headerFontSize + 'px');
      if (th.bodyFontSize) root.style.setProperty('--body-size', th.bodyFontSize + 'px');
      if (th.headerFontColor) root.style.setProperty('--header-color', th.headerFontColor);
      if (th.bodyFontColor) root.style.setProperty('--body-color', th.bodyFontColor);
    }

    /* ════════════════════════════════════════════════════════════════
       ENTRY PASS MODAL
    ════════════════════════════════════════════════════════════════ */
    let _passData = null;

    function showPassModal(pass) {
      _passData = pass;
      document.getElementById('passModal').classList.add('open');
      renderPassCanvas(pass);
    }

    function closePassModal() {
      document.getElementById('passModal').classList.remove('open');
    }

    function renderPassCanvas(pass) {
      const canvas = document.getElementById('passCanvas');
      const ctx = canvas.getContext('2d');
      const W = 900, H = 380;
      canvas.width = W; canvas.height = H;

      const cfg = pass.config || {};
      const bannerColor = cfg.bannerColor || '#1a1a2e';
      const textColor = cfg.textColor || '#ffffff';

      // Background
      ctx.fillStyle = bannerColor;
      ctx.fillRect(0, 0, W, H);

      // Load QR image
      const qrImg = new Image();
      qrImg.onload = () => {
        // Left: white QR box
        const qrPad = 20;
        const qrSize = H - qrPad * 2;
        const qrX = qrPad;
        const qrY = qrPad;
        ctx.fillStyle = '#ffffff';
        roundRect(ctx, qrX, qrY, qrSize, qrSize, 12);
        ctx.fill();
        ctx.drawImage(qrImg, qrX + 8, qrY + 8, qrSize - 16, qrSize - 16);

        // "Scan to verify" text below QR
        ctx.fillStyle = 'rgba(255,255,255,0.55)';
        ctx.font = '12px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('Scan to verify', qrX + qrSize / 2, qrY + qrSize + 18);

        // Vertical divider
        ctx.strokeStyle = 'rgba(255,255,255,0.25)';
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(320, 30); ctx.lineTo(320, H - 30); ctx.stroke();

        // Right section
        const rx = 344, ry = 36, rw = W - rx - 20;
        ctx.textAlign = 'left';

        let cy = ry;

        // Logo (optional)
        if (cfg.logoUrl) {
          const logoImg = new Image();
          logoImg.crossOrigin = 'anonymous';
          logoImg.onload = () => {
            const lh = Math.min(50, logoImg.naturalHeight || 50);
            const lw = lh * (logoImg.naturalWidth / (logoImg.naturalHeight || 1));
            ctx.drawImage(logoImg, W - lw - 20, ry, lw, lh);
          };
          logoImg.src = cfg.logoUrl;
        }

        // Event name
        ctx.fillStyle = textColor;
        ctx.font = 'bold 26px sans-serif';
        cy += 6;
        wrapText(ctx, cfg.eventName || 'Event', rx, cy, rw, 32);
        cy += 38;

        // Attendee name
        ctx.font = '19px sans-serif';
        ctx.fillStyle = textColor;
        wrapText(ctx, pass.attendeeName || '—', rx, cy, rw, 26);
        cy += 32;

        // Venue / Date / Time
        ctx.font = '14px sans-serif';
        ctx.fillStyle = 'rgba(255,255,255,0.75)';
        if (cfg.venue) { ctx.fillText('📍 ' + cfg.venue, rx, cy); cy += 24; }
        if (cfg.date) { ctx.fillText('📅 ' + cfg.date, rx, cy); cy += 24; }
        if (cfg.time) { ctx.fillText('🕐 ' + cfg.time, rx, cy); cy += 24; }

        // Divider
        cy += 6;
        ctx.strokeStyle = 'rgba(255,255,255,0.20)';
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(rx, cy); ctx.lineTo(W - 20, cy); ctx.stroke();
        cy += 14;

        // Rules
        const rules = (cfg.rules || []).slice(0, 3);
        if (rules.length) {
          ctx.fillStyle = 'rgba(255,255,255,0.6)';
          ctx.font = 'bold 12px sans-serif';
          ctx.fillText('ENTRY RULES', rx, cy); cy += 17;
          ctx.font = '12px sans-serif';
          rules.forEach(r => {
            ctx.fillText('• ' + r, rx, cy); cy += 17;
          });
        }
      };
      qrImg.src = pass.qrDataUrl;
    }

    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function wrapText(ctx, text, x, y, maxW, lineH) {
      const words = String(text || '').split(' ');
      let line = '';
      for (const word of words) {
        const test = line ? line + ' ' + word : word;
        if (ctx.measureText(test).width > maxW && line) {
          ctx.fillText(line, x, y); y += lineH; line = word;
        } else {
          line = test;
        }
      }
      if (line) ctx.fillText(line, x, y);
    }

    function downloadPass() {
      const canvas = document.getElementById('passCanvas');
      canvas.toBlob(blob => {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `entry-pass-${(_passData?.submissionId || 'pass').slice(0, 8)}.png`;
        a.click();
        URL.revokeObjectURL(a.href);
      }, 'image/png');
    }
  </script>
