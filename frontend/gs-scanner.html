<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Scanner — GalSol</title>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #04080f;
      --surface: #0c1425;
      --surface-2: #111827;
      --border: rgba(255,255,255,0.08);
      --text: #eef4ff;
      --text-2: #8ba4c0;
      --text-3: #465e78;
      --accent: #00d4ff;
      --accent-dim: rgba(0,212,255,0.09);
      --accent-glow: rgba(0,212,255,0.22);
      --green: #10b981;
      --green-dim: rgba(16,185,129,0.11);
      --green-glow: rgba(16,185,129,0.28);
      --red: #f43f5e;
      --red-dim: rgba(244,63,94,0.11);
      --gold: #f59e0b;
      --gold-dim: rgba(245,158,11,0.11);
      --font: 'Plus Jakarta Sans', system-ui, sans-serif;
      --ease: cubic-bezier(0.16,1,0.3,1);
    }

    body.light {
      --bg: #f0f4fb;
      --surface: #ffffff;
      --surface-2: #f8fafc;
      --border: rgba(0,0,0,0.07);
      --text: #0f172a;
      --text-2: #475569;
      --text-3: #94a3b8;
      --accent-dim: rgba(0,180,220,0.07);
      --accent-glow: rgba(0,180,220,0.18);
      --green-dim: rgba(16,185,129,0.09);
      --red-dim: rgba(244,63,94,0.09);
      --gold-dim: rgba(245,158,11,0.09);
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      transition: background 0.3s, color 0.3s;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      pointer-events: none; z-index: 0;
      background:
        radial-gradient(ellipse 70% 55% at 10% 0%, rgba(0,212,255,0.06) 0%, transparent 55%),
        radial-gradient(ellipse 55% 55% at 92% 100%, rgba(124,58,237,0.07) 0%, transparent 55%);
      transition: opacity 0.3s;
    }

    body.light::before { opacity: 0.3; }

    /* ── Screens ───────────────────────────────────────────────── */
    .screen {
      display: none;
      position: relative; z-index: 1;
      height: 100dvh; height: 100vh;
      overflow: hidden;
    }

    .screen.active {
      display: flex;
      flex-direction: column;
    }

    /* ── Floating theme toggle (login & pass screens) ─────────── */
    .theme-fab {
      position: fixed;
      top: 16px; right: 16px; z-index: 999;
      width: 40px; height: 40px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-2);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 16px rgba(0,0,0,0.25);
      transition: color 0.2s, border-color 0.2s, background 0.3s, box-shadow 0.2s;
    }

    .theme-fab:hover {
      color: var(--accent);
      border-color: rgba(0,212,255,0.35);
      box-shadow: 0 4px 20px var(--accent-glow);
    }

    /* ══════════════════════════════════════════════════════════════
       LOGIN SCREEN
    ══════════════════════════════════════════════════════════════ */
    #screenLogin {
      align-items: center;
      justify-content: center;
      padding: 24px 20px;
    }

    .login-card {
      width: 100%; max-width: 380px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 36px 28px 32px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.32);
      animation: cardIn 0.5s var(--ease) both;
    }

    @keyframes cardIn {
      from { opacity:0; transform: translateY(20px) scale(0.97); }
      to   { opacity:1; transform: translateY(0)  scale(1); }
    }

    .login-icon-wrap {
      width: 62px; height: 62px;
      border-radius: 18px;
      background: var(--accent-dim);
      border: 1px solid rgba(0,212,255,0.15);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px;
      color: var(--accent);
    }

    .login-title {
      font-size: 23px; font-weight: 800;
      color: var(--text); text-align: center; margin-bottom: 6px;
    }

    .login-sub {
      font-size: 13.5px; color: var(--text-2);
      text-align: center; margin-bottom: 28px; line-height: 1.65;
    }

    .field-group { margin-bottom: 16px; }

    .field-label {
      display: block;
      font-size: 11.5px; font-weight: 700;
      color: var(--text-3); margin-bottom: 7px;
      text-transform: uppercase; letter-spacing: 0.6px;
    }

    .field-input {
      width: 100%;
      padding: 13px 16px;
      border-radius: 12px; font-size: 15px;
      background: var(--surface-2);
      border: 1.5px solid var(--border);
      color: var(--text); font-family: var(--font);
      outline: none;
      transition: border-color 0.18s, box-shadow 0.18s, background 0.3s;
    }

    .field-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }

    .field-input::placeholder { color: var(--text-3); }

    .login-btn {
      width: 100%; padding: 14px;
      border-radius: 13px; border: none; margin-top: 6px;
      background: linear-gradient(135deg, #00c4ef 0%, #7c3aed 100%);
      color: #fff; font-size: 15px; font-weight: 700;
      font-family: var(--font); cursor: pointer;
      box-shadow: 0 6px 28px rgba(0,196,239,0.2);
      transition: box-shadow 0.2s, transform 0.15s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }

    .login-btn:hover { box-shadow: 0 8px 36px rgba(0,196,239,0.35); transform: translateY(-1px); }
    .login-btn:active { transform: translateY(0); }
    .login-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .login-err {
      font-size: 13px; color: var(--red);
      margin-top: 14px; text-align: center;
      background: var(--red-dim); border-radius: 10px;
      padding: 10px 14px;
      border: 1px solid rgba(244,63,94,0.16);
      display: none;
      animation: errIn 0.2s var(--ease);
    }

    @keyframes errIn {
      from { opacity:0; transform: translateY(-6px); }
      to   { opacity:1; transform: translateY(0); }
    }

    .login-footer {
      text-align: center;
      font-size: 12px; color: var(--text-3);
      margin-top: 20px;
    }

    /* ══════════════════════════════════════════════════════════════
       SCANNER SCREEN
    ══════════════════════════════════════════════════════════════ */
    #screenScanner { overflow: hidden; }

    /* — Top bar — */
    .scanner-topbar {
      flex-shrink: 0;
      height: 58px;
      padding: 0 14px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center;
      justify-content: space-between; gap: 10px;
      position: relative; z-index: 50;
      transition: background 0.3s;
    }

    .topbar-left { display: flex; align-items: center; gap: 10px; min-width: 0; flex: 1; }

    .topbar-scan-icon {
      width: 34px; height: 34px; flex-shrink: 0;
      border-radius: 9px;
      background: var(--accent-dim);
      border: 1px solid rgba(0,212,255,0.14);
      display: flex; align-items: center; justify-content: center;
      color: var(--accent);
    }

    .topbar-text { min-width: 0; }

    .scanner-event-name {
      font-size: 13px; font-weight: 700; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      line-height: 1;
    }

    .scanner-staff-name {
      font-size: 11px; color: var(--text-3); margin-top: 3px;
    }

    .topbar-right { display: flex; align-items: center; gap: 9px; flex-shrink: 0; }

    .admit-pill {
      display: flex; align-items: center; gap: 6px;
      background: var(--green-dim);
      border: 1px solid rgba(16,185,129,0.18);
      border-radius: 20px; padding: 5px 11px 5px 8px;
    }

    .admit-pill-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
      animation: blink 2s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .admit-pill-num {
      font-size: 14px; font-weight: 800;
      color: var(--green); font-variant-numeric: tabular-nums;
    }

    .topbar-icon-btn {
      width: 34px; height: 34px; border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text-3); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: color 0.2s, border-color 0.2s, background 0.3s;
    }

    .topbar-icon-btn:hover { color: var(--accent); border-color: rgba(0,212,255,0.3); }

    /* — Scanner body — */
    .scanner-body {
      flex: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: flex-start;
      padding: 22px 16px 10px;
      gap: 14px;
      overflow: hidden;
      position: relative;
    }

    /* — Viewfinder — */
    .scanner-vf-wrap {
      position: relative;
      width: min(318px, 88vw);
      aspect-ratio: 1;
      border-radius: 20px;
      overflow: hidden;
      flex-shrink: 0;
    }

    /* Outer glow ring */
    .scanner-vf-ring {
      position: absolute; inset: -3px;
      border-radius: 23px;
      background: transparent;
      box-shadow: 0 0 0 2px rgba(0,212,255,0.45);
      animation: ringPulse 2.8s ease-in-out infinite;
      pointer-events: none; z-index: 8;
    }

    @keyframes ringPulse {
      0%, 100% { box-shadow: 0 0 0 2px rgba(0,212,255,0.35), 0 0 20px rgba(0,212,255,0.08); }
      50%       { box-shadow: 0 0 0 2px rgba(0,212,255,0.75), 0 0 32px rgba(0,212,255,0.18); }
    }

    #scannerVideo {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
    }

    #scannerCanvas { display: none; }

    /* Corner brackets */
    .vf-corners { position: absolute; inset: 0; pointer-events: none; z-index: 10; }

    .vf-c {
      position: absolute;
      width: 24px; height: 24px;
      border-color: #00d4ff; border-style: solid;
    }

    .vf-c.tl { top:12px; left:12px; border-width:2.5px 0 0 2.5px; border-radius:5px 0 0 0; }
    .vf-c.tr { top:12px; right:12px; border-width:2.5px 2.5px 0 0; border-radius:0 5px 0 0; }
    .vf-c.bl { bottom:12px; left:12px; border-width:0 0 2.5px 2.5px; border-radius:0 0 0 5px; }
    .vf-c.br { bottom:12px; right:12px; border-width:0 2.5px 2.5px 0; border-radius:0 0 5px 0; }

    /* Centre crosshair */
    .vf-crosshair {
      position: absolute; top:50%; left:50%;
      transform: translate(-50%,-50%);
      pointer-events: none; z-index: 10;
    }

    .vf-crosshair-ring {
      width: 38px; height: 38px; border-radius: 50%;
      border: 1.5px solid rgba(0,212,255,0.4);
      animation: crossPulse 2.8s ease-in-out infinite;
    }

    .vf-crosshair-dot {
      position: absolute; top:50%; left:50%;
      transform: translate(-50%,-50%);
      width: 5px; height: 5px; border-radius: 50%;
      background: rgba(0,212,255,0.55);
    }

    @keyframes crossPulse {
      0%,100% { transform: scale(1); opacity: 0.45; }
      50%      { transform: scale(1.25); opacity: 0.9; }
    }

    /* Vignette overlay inside viewfinder */
    .vf-vignette {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse 70% 70% at 50% 50%, transparent 50%, rgba(0,0,0,0.35) 100%);
      pointer-events: none; z-index: 7;
    }

    /* — Scan status row — */
    .scan-status-row {
      display: flex; align-items: center; gap: 8px;
    }

    .scan-status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--accent); flex-shrink: 0;
      box-shadow: 0 0 8px var(--accent);
      animation: blink 1.6s ease-in-out infinite;
    }

    .scan-hint {
      font-size: 13px; font-weight: 500;
      color: var(--text-2);
    }

    /* — Manual entry — */
    .manual-trigger {
      display: flex; align-items: center; gap: 7px;
      font-size: 12.5px; color: var(--text-3);
      cursor: pointer;
      padding: 8px 16px; border-radius: 22px;
      border: 1px solid var(--border);
      background: var(--surface);
      transition: color 0.2s, border-color 0.2s, background 0.3s;
    }

    .manual-trigger:hover { color: var(--accent); border-color: rgba(0,212,255,0.28); }

    .manual-wrap {
      width: 100%; max-width: 288px;
      display: none;
      animation: slideDown 0.22s var(--ease);
    }

    @keyframes slideDown {
      from { opacity:0; transform: translateY(-10px); }
      to   { opacity:1; transform: translateY(0); }
    }

    .manual-row { display: flex; gap: 8px; }

    .manual-input {
      flex: 1; padding: 11px 14px;
      border-radius: 11px; font-size: 14px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      color: var(--text); font-family: var(--font);
      outline: none; transition: border-color 0.18s, background 0.3s;
    }

    .manual-input:focus { border-color: var(--accent); }
    .manual-input::placeholder { color: var(--text-3); }

    .manual-submit {
      padding: 11px 16px; border-radius: 11px; border: none;
      background: var(--accent); color: #000;
      font-size: 13px; font-weight: 700;
      font-family: var(--font); cursor: pointer;
      display: flex; align-items: center; gap: 5px;
      transition: filter 0.15s;
    }

    .manual-submit:hover { filter: brightness(1.1); }

    /* — Camera denied — */
    .camera-denied-wrap {
      display: none; flex-direction: column;
      align-items: center; gap: 14px;
      text-align: center;
    }

    .camera-denied-icon {
      width: 60px; height: 60px; border-radius: 50%;
      background: var(--red-dim);
      border: 1px solid rgba(244,63,94,0.18);
      display: flex; align-items: center; justify-content: center;
      color: var(--red);
    }

    .camera-denied-title { font-size: 16px; font-weight: 700; color: var(--text); }
    .camera-denied-sub { font-size: 13px; color: var(--text-2); line-height: 1.6; max-width: 260px; }

    .camera-retry-btn {
      padding: 12px 28px; border-radius: 11px; border: none;
      background: var(--accent); color: #000;
      font-size: 14px; font-weight: 700;
      font-family: var(--font); cursor: pointer;
      display: flex; align-items: center; gap: 7px;
    }

    /* — Stats bar — */
    .scanner-stats {
      flex-shrink: 0;
      height: 60px;
      padding: 0 20px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex; align-items: center;
      justify-content: space-around;
      transition: background 0.3s;
    }

    .stat-item { display: flex; flex-direction: column; align-items: center; gap: 2px; }

    .stat-num {
      font-size: 20px; font-weight: 800;
      font-variant-numeric: tabular-nums; line-height: 1;
    }

    .stat-num.c-green { color: var(--green); }
    .stat-num.c-gold  { color: var(--gold); }
    .stat-num.c-text  { color: var(--text); }

    .stat-lbl {
      font-size: 10px; color: var(--text-3);
      text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600;
    }

    .stat-divider { width: 1px; height: 26px; background: var(--border); }

    /* — Result card (bottom sheet) — */
    .result-card {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
      background: var(--surface);
      border-top: 1px solid var(--border);
      border-radius: 26px 26px 0 0;
      padding: 14px 20px 38px;
      transform: translateY(110%);
      transition: transform 0.4s var(--ease), background 0.3s;
      box-shadow: 0 -28px 64px rgba(0,0,0,0.45);
    }

    .result-card.open { transform: translateY(0); }

    .rc-handle {
      width: 36px; height: 4px; border-radius: 2px;
      background: var(--border); margin: 0 auto 18px;
    }

    .rc-header { display: flex; align-items: center; gap: 13px; margin-bottom: 14px; }

    .rc-icon {
      width: 48px; height: 48px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }

    .rc-icon.valid   { background: var(--green-dim); color: var(--green); border: 1px solid rgba(16,185,129,0.2); }
    .rc-icon.admitted{ background: var(--gold-dim);  color: var(--gold);  border: 1px solid rgba(245,158,11,0.2); }
    .rc-icon.invalid { background: var(--red-dim);   color: var(--red);   border: 1px solid rgba(244,63,94,0.2); }

    .rc-title-wrap { min-width: 0; flex: 1; }

    .rc-status-label { font-size: 17px; font-weight: 800; color: var(--text); }
    .rc-name { font-size: 13px; color: var(--text-2); margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .rc-meta {
      margin-bottom: 14px;
      background: var(--surface-2); border-radius: 13px;
      border: 1px solid var(--border);
      padding: 12px 14px;
      display: flex; flex-direction: column; gap: 9px;
    }

    .rc-meta-row {
      display: flex; align-items: center; gap: 9px;
      font-size: 13px; color: var(--text-2);
    }

    .rc-meta-row svg { flex-shrink: 0; color: var(--text-3); }

    .rc-readmit-note {
      font-size: 12.5px; color: var(--gold);
      background: var(--gold-dim);
      border: 1px solid rgba(245,158,11,0.16);
      border-radius: 10px; padding: 9px 13px;
      margin-bottom: 14px;
      display: flex; align-items: center; gap: 8px;
    }

    .rc-btns { display: flex; gap: 10px; }

    .rc-btn {
      flex: 1; padding: 14px; border-radius: 13px; border: none;
      cursor: pointer; font-size: 15px; font-weight: 700;
      font-family: var(--font); min-height: 50px;
      transition: filter 0.15s, transform 0.12s;
      display: flex; align-items: center; justify-content: center; gap: 7px;
    }

    .rc-btn-admit {
      background: var(--green); color: #fff;
      box-shadow: 0 4px 20px var(--green-glow);
    }

    .rc-btn-admit:hover { filter: brightness(1.1); transform: translateY(-1px); }
    .rc-btn-admit:active { transform: translateY(0); }
    .rc-btn-admit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .rc-btn-secondary {
      background: var(--surface-2);
      border: 1.5px solid var(--border);
      color: var(--text-2);
    }

    /* — Admit flash — */
    .admit-flash {
      position: fixed; inset: 0; z-index: 500;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 4px;
      background: rgba(16,185,129,0.07);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      pointer-events: none;
      opacity: 0; transition: opacity 0.25s;
    }

    .admit-flash.show { opacity: 1; }

    .admit-flash-circle {
      width: 90px; height: 90px; border-radius: 50%;
      background: var(--green-dim);
      border: 2px solid var(--green);
      display: flex; align-items: center; justify-content: center;
      color: var(--green); margin-bottom: 14px;
      box-shadow: 0 0 48px rgba(16,185,129,0.32);
    }

    .admit-flash.show .admit-flash-circle {
      animation: popIn 0.35s var(--ease) both;
    }

    @keyframes popIn {
      from { transform: scale(0.4); opacity:0; }
      to   { transform: scale(1);   opacity:1; }
    }

    .admit-flash-title { font-size: 24px; font-weight: 800; color: var(--green); }
    .admit-flash-name  { font-size: 14px; color: var(--text-2); margin-top: 2px; }

    /* ══════════════════════════════════════════════════════════════
       PASS VIEW SCREEN
    ══════════════════════════════════════════════════════════════ */
    #screenPass {
      align-items: center;
      overflow-y: auto;
      padding: 56px 16px 64px;
    }

    .pass-container { width: 100%; max-width: 520px; }

    .pass-badge {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 5px 14px; border-radius: 99px;
      font-size: 12px; font-weight: 700;
      margin-bottom: 18px; letter-spacing: 0.3px;
    }

    .pass-badge.valid   { background: var(--green-dim); color: var(--green); border: 1px solid rgba(16,185,129,0.22); }
    .pass-badge.admitted{ background: var(--gold-dim);  color: var(--gold);  border: 1px solid rgba(245,158,11,0.22); }
    .pass-badge.invalid { background: var(--red-dim);   color: var(--red);   border: 1px solid rgba(244,63,94,0.22); }

    .pass-badge-dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }

    .pass-canvas-wrap { display: flex; justify-content: center; margin-bottom: 20px; }
    .pass-canvas-wrap canvas { border-radius: 14px; max-width: 100%; box-shadow: 0 16px 60px rgba(0,0,0,0.45); }

    .pass-dl-btn {
      width: 100%; padding: 14px; border-radius: 13px; border: none;
      background: linear-gradient(135deg, #00c4ef, #7c3aed);
      color: #fff; font-size: 15px; font-weight: 700;
      font-family: var(--font); cursor: pointer;
      box-shadow: 0 6px 28px rgba(0,196,239,0.2);
      transition: box-shadow 0.2s, transform 0.15s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }

    .pass-dl-btn:hover { box-shadow: 0 10px 36px rgba(0,196,239,0.35); transform: translateY(-1px); }

    .scanner-footer {
      padding: 16px; text-align: center;
      font-size: 12px; color: var(--text-3);
      margin-top: auto;
    }
  </style>
</head>
<body>

  <!-- Floating theme toggle (visible on login + pass screens) -->
  <button class="theme-fab" id="globalThemeBtn" onclick="toggleTheme()" title="Toggle light / dark mode" aria-label="Toggle theme">
    <svg id="fabIconMoon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
    </svg>
    <svg id="fabIconSun" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
      <circle cx="12" cy="12" r="5"/>
      <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
      <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
      <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
      <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
    </svg>
  </button>

  <!-- ══════════════════════════════════════════════════════════════
       PASS VIEW SCREEN (attendee with ?token=)
  ══════════════════════════════════════════════════════════════ -->
  <div class="screen" id="screenPass">
    <div class="pass-container">
      <div id="passBadge" class="pass-badge valid">
        <div class="pass-badge-dot"></div>
        <span id="passBadgeText">Valid Pass</span>
      </div>
      <div class="pass-canvas-wrap">
        <canvas id="passViewCanvas" width="900" height="380" style="width:100%;height:auto"></canvas>
      </div>
      <button class="pass-dl-btn" onclick="downloadPassView()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        Download Pass
      </button>
    </div>
    <footer class="scanner-footer">Powered by <a href="/index.html" style="color:var(--text-2);font-weight:600">GalSol</a></footer>
  </div>

  <!-- ══════════════════════════════════════════════════════════════
       STAFF LOGIN SCREEN
  ══════════════════════════════════════════════════════════════ -->
  <div class="screen" id="screenLogin">
    <div class="login-card">

      <div class="login-icon-wrap">
        <!-- QR / scan icon -->
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/>
          <path d="M14 14h3v3m0 4h4V17m-4 0h4"/>
        </svg>
      </div>

      <div class="login-title">Staff Scanner</div>
      <div class="login-sub">Enter your event code to access the attendance scanner.</div>

      <div class="field-group">
        <label class="field-label">Staff Code</label>
        <input class="field-input" id="loginCode" type="text" maxlength="8"
          placeholder="e.g. GS7K2M"
          style="text-transform:uppercase;letter-spacing:3px;font-weight:700;font-size:20px;text-align:center"
          oninput="this.value=this.value.toUpperCase()"
          onkeydown="if(event.key==='Enter')doLogin()" />
      </div>

      <div class="field-group">
        <label class="field-label">Your Name</label>
        <input class="field-input" id="loginName" type="text"
          placeholder="e.g. Alex (Gate 1)"
          onkeydown="if(event.key==='Enter')doLogin()" />
      </div>

      <button class="login-btn" id="loginBtn" onclick="doLogin()">
        Connect
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
        </svg>
      </button>
      <div class="login-err" id="loginErr"></div>
    </div>
    <div class="login-footer">GalSol Scanner</div>
  </div>

  <!-- ══════════════════════════════════════════════════════════════
       SCANNER SCREEN
  ══════════════════════════════════════════════════════════════ -->
  <div class="screen" id="screenScanner">

    <!-- Top bar -->
    <div class="scanner-topbar">
      <div class="topbar-left">
        <div class="topbar-scan-icon">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
          </svg>
        </div>
        <div class="topbar-text">
          <div class="scanner-event-name" id="scanEventName">Loading…</div>
          <div class="scanner-staff-name" id="scanStaffName"></div>
        </div>
      </div>
      <div class="topbar-right">
        <div class="admit-pill" title="Admitted today">
          <div class="admit-pill-dot"></div>
          <div class="admit-pill-num" id="scanAdmitCount">0</div>
        </div>
        <button class="topbar-icon-btn" onclick="toggleTheme()" title="Toggle theme" aria-label="Toggle theme">
          <svg id="tbIconMoon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
          <svg id="tbIconSun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Scanner body -->
    <div class="scanner-body">

      <!-- Camera denied state -->
      <div class="camera-denied-wrap" id="cameraDenied">
        <div class="camera-denied-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
            <line x1="1" y1="1" x2="23" y2="23"/>
          </svg>
        </div>
        <div class="camera-denied-title">Camera Access Required</div>
        <div class="camera-denied-sub">Allow camera access in your browser settings to scan QR codes.</div>
        <button class="camera-retry-btn" onclick="startCamera()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
          </svg>
          Try Again
        </button>
      </div>

      <!-- Viewfinder -->
      <div class="scanner-vf-wrap" id="vfWrap">
        <div class="scanner-vf-ring"></div>
        <video id="scannerVideo" autoplay playsinline muted></video>
        <canvas id="scannerCanvas"></canvas>
        <div class="vf-vignette"></div>
        <div class="vf-corners">
          <div class="vf-c tl"></div>
          <div class="vf-c tr"></div>
          <div class="vf-c bl"></div>
          <div class="vf-c br"></div>
          <div class="vf-crosshair">
            <div class="vf-crosshair-ring"></div>
            <div class="vf-crosshair-dot"></div>
          </div>
        </div>
      </div>

      <!-- Status row -->
      <div class="scan-status-row">
        <div class="scan-status-dot" id="scanDot"></div>
        <div class="scan-hint" id="scanHint">Point camera at attendee's QR pass</div>
      </div>

      <!-- Manual entry trigger -->
      <button class="manual-trigger" onclick="toggleManual()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="3" width="20" height="14" rx="2.5"/>
          <line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>
        </svg>
        Enter code manually
      </button>

      <div class="manual-wrap" id="manualWrap">
        <div class="manual-row">
          <input class="manual-input" id="manualToken"
            placeholder="Paste or type pass token"
            onkeydown="if(event.key==='Enter')manualScan()" />
          <button class="manual-submit" onclick="manualScan()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="9 11 12 14 22 4"/>
              <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
            </svg>
            Verify
          </button>
        </div>
      </div>

    </div><!-- /scanner-body -->

    <!-- Result card (bottom sheet) -->
    <div class="result-card" id="resultCard">
      <div class="rc-handle"></div>
      <div class="rc-header">
        <div class="rc-icon valid" id="rcIcon"></div>
        <div class="rc-title-wrap">
          <div class="rc-status-label" id="resultLabel"></div>
          <div class="rc-name" id="resultName"></div>
        </div>
      </div>
      <div class="rc-meta" id="rcMeta"></div>
      <div class="rc-readmit-note" id="rcAdmitNote" style="display:none"></div>
      <div class="rc-btns" id="resultBtns"></div>
    </div>

    <!-- Admit flash overlay -->
    <div class="admit-flash" id="admitFlash">
      <div class="admit-flash-circle">
        <svg width="42" height="42" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>
      <div class="admit-flash-title">Admitted!</div>
      <div class="admit-flash-name" id="admitFlashName"></div>
    </div>

    <!-- Stats bar -->
    <div class="scanner-stats">
      <div class="stat-item">
        <div class="stat-num c-green" id="statAdmitted">0</div>
        <div class="stat-lbl">Admitted</div>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-item">
        <div class="stat-num c-text" id="statTotal">0</div>
        <div class="stat-lbl">Total</div>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-item">
        <div class="stat-num c-gold" id="statPending">0</div>
        <div class="stat-lbl">Pending</div>
      </div>
    </div>

  </div><!-- /screenScanner -->

  <script>
    const BACKEND = 'https://certiflow-backend-73xk.onrender.com';

    /* ── Theme ─────────────────────────────────────────────────────── */
    let _theme = localStorage.getItem('gs_scanner_theme') || 'dark';

    function applyTheme() {
      document.body.classList.toggle('light', _theme === 'light');
      // Floating FAB icons
      document.getElementById('fabIconMoon').style.display = _theme === 'dark'  ? '' : 'none';
      document.getElementById('fabIconSun').style.display  = _theme === 'light' ? '' : 'none';
      // Topbar icons
      document.getElementById('tbIconMoon').style.display = _theme === 'dark'  ? '' : 'none';
      document.getElementById('tbIconSun').style.display  = _theme === 'light' ? '' : 'none';
    }

    function toggleTheme() {
      _theme = _theme === 'dark' ? 'light' : 'dark';
      localStorage.setItem('gs_scanner_theme', _theme);
      applyTheme();
    }

    applyTheme();

    /* ── Boot ──────────────────────────────────────────────────────── */
    const _params   = new URLSearchParams(window.location.search);
    const _token    = _params.get('token');
    const _isScan   = _params.get('scan') === '1';
    const _formSlug = _params.get('form') || '';

    let _staffCode  = '';
    let _staffName  = '';
    let _statsData  = { total: 0, admitted: 0 };
    let _scanning   = false;
    let _stream     = null;
    let _rafId      = null;
    let _currentPass = null;
    let _passViewData = null;

    (async function boot() {
      if (_token) {
        showScreen('screenPass');
        await loadPassView(_token);
      } else {
        showScreen('screenLogin');
      }
    })();

    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      const el = document.getElementById(id);
      if (el) el.classList.add('active');
      // Only show floating FAB on login and pass screens
      const fabVisible = (id === 'screenLogin' || id === 'screenPass');
      document.getElementById('globalThemeBtn').style.display = fabVisible ? '' : 'none';
    }

    /* ── Pass View (attendee mode) ─────────────────────────────────── */
    async function loadPassView(token) {
      try {
        const res  = await fetch(`${BACKEND}/api/attendance/verify-token?token=${encodeURIComponent(token)}`);
        const data = await res.json();
        if (!res.ok || !data.ok) throw new Error(data.error || 'Invalid pass');

        _passViewData = data.pass;
        const badge   = document.getElementById('passBadge');
        const badgeTx = document.getElementById('passBadgeText');

        if (data.pass.status === 'admitted') {
          badge.className = 'pass-badge admitted';
          badgeTx.textContent = 'Already Admitted';
        } else {
          badge.className = 'pass-badge valid';
          badgeTx.textContent = 'Valid Pass';
        }
        renderPassViewCanvas(data.pass);
      } catch (e) {
        document.getElementById('passBadge').className = 'pass-badge invalid';
        document.getElementById('passBadgeText').textContent = 'Invalid Pass';
      }
    }

    function renderPassViewCanvas(pass) {
      const canvas = document.getElementById('passViewCanvas');
      const ctx    = canvas.getContext('2d');
      const W = 900, H = 380;
      canvas.width = W; canvas.height = H;
      drawPassOnCanvas(ctx, pass, W, H);
    }

    function downloadPassView() {
      const canvas = document.getElementById('passViewCanvas');
      canvas.toBlob(blob => {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `entry-pass-${(_passViewData?.submissionId || 'pass').slice(0, 8)}.png`;
        a.click();
        URL.revokeObjectURL(a.href);
      }, 'image/png');
    }

    /* ── Staff Login ───────────────────────────────────────────────── */
    async function doLogin() {
      const code = document.getElementById('loginCode').value.trim().toUpperCase();
      const name = document.getElementById('loginName').value.trim();
      const btn  = document.getElementById('loginBtn');
      const err  = document.getElementById('loginErr');

      if (!code || !_formSlug) { showLoginErr('Please enter your staff code.'); return; }

      btn.disabled = true;
      btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="animation:spin 0.8s linear infinite"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg> Connecting…`;
      err.style.display = 'none';

      try {
        const res  = await fetch(`${BACKEND}/api/attendance/stats/${encodeURIComponent(_formSlug)}?staffCode=${encodeURIComponent(code)}`);
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Invalid staff code');

        _staffCode = code;
        _staffName = name || 'Staff';
        _statsData = { total: data.total, admitted: data.admitted };

        document.getElementById('scanEventName').textContent = data.eventName || 'Event Scanner';
        document.getElementById('scanStaffName').textContent = _staffName;
        document.getElementById('scanAdmitCount').textContent = data.admitted;
        updateStatsBar();

        showScreen('screenScanner');
        startCamera();
      } catch (e) {
        showLoginErr(e.message || 'Invalid staff code. Check with your event organizer.');
      } finally {
        btn.disabled = false;
        btn.innerHTML = `Connect <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>`;
      }
    }

    function showLoginErr(msg) {
      const err = document.getElementById('loginErr');
      err.textContent = msg; err.style.display = '';
    }

    /* ── Camera / QR scan ─────────────────────────────────────────── */
    async function startCamera() {
      document.getElementById('cameraDenied').style.display = 'none';
      document.getElementById('vfWrap').style.display = '';
      setScanHint('Point camera at attendee\'s QR pass');

      try {
        _stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { ideal: 'environment' }, width: { ideal: 640 }, height: { ideal: 640 } }
        });
        const video = document.getElementById('scannerVideo');
        video.srcObject = _stream;
        video.play();
        video.addEventListener('loadedmetadata', () => { _scanning = true; scanLoop(); });
      } catch (e) {
        document.getElementById('cameraDenied').style.display = 'flex';
        document.getElementById('vfWrap').style.display = 'none';
      }
    }

    function stopCamera() {
      _scanning = false;
      if (_rafId) cancelAnimationFrame(_rafId);
      if (_stream) { _stream.getTracks().forEach(t => t.stop()); _stream = null; }
    }

    function scanLoop() {
      if (!_scanning) return;
      const video  = document.getElementById('scannerVideo');
      const canvas = document.getElementById('scannerCanvas');
      if (video.readyState === video.HAVE_ENOUGH_DATA) {
        canvas.width  = video.videoWidth;
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0);
        const img  = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const code = jsQR(img.data, img.width, img.height, { inversionAttempts: 'dontInvert' });
        if (code?.data) {
          _scanning = false;
          if (navigator.vibrate) navigator.vibrate([60, 30, 60]);
          processQRCode(code.data);
          return;
        }
      }
      _rafId = requestAnimationFrame(scanLoop);
    }

    function processQRCode(data) {
      let token = data;
      try {
        // Try as a full absolute URL first
        const url = new URL(data);
        token = url.searchParams.get('token') || data;
      } catch {
        // Not a valid absolute URL (e.g. relative path or misconfigured FRONTEND_URL)
        // Try to extract ?token= from the raw string
        const m = data.match(/[?&]token=([^&\s]+)/);
        if (m) token = decodeURIComponent(m[1]);
      }
      verifyPass(token.trim());
    }

    /* ── Verify + result card ──────────────────────────────────────── */
    async function verifyPass(token) {
      setScanHint('Verifying…');
      try {
        const res  = await fetch(`${BACKEND}/api/attendance/verify-token?token=${encodeURIComponent(token)}`);
        const data = await res.json();
        if (!res.ok || !data.ok) {
          showResult({ type: 'invalid', token, pass: null });
        } else {
          showResult({ type: data.pass.status === 'admitted' ? 'admitted' : 'valid', token, pass: data.pass });
        }
      } catch (e) {
        showResult({ type: 'invalid', token, pass: null });
      }
    }

    const ICONS = {
      check: `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`,
      warn:  `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`,
      x:     `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`,
      map:   `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>`,
      cal:   `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>`,
      clock: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`,
      close: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`,
    };

    function showResult({ type, token, pass }) {
      _currentPass = { type, token, pass };

      const rcIcon  = document.getElementById('rcIcon');
      const label   = document.getElementById('resultLabel');
      const name    = document.getElementById('resultName');
      const meta    = document.getElementById('rcMeta');
      const admNote = document.getElementById('rcAdmitNote');
      const btns    = document.getElementById('resultBtns');

      rcIcon.className  = 'rc-icon ' + type;
      admNote.style.display = 'none';

      const cfg = pass?.config || {};
      let metaHTML = '';
      if (cfg.eventName) metaHTML += `<div class="rc-meta-row">${ICONS.map}<span>${escHtml(cfg.eventName)}</span></div>`;
      if (cfg.date)      metaHTML += `<div class="rc-meta-row">${ICONS.cal}<span>${escHtml(cfg.date)}</span></div>`;
      if (cfg.time)      metaHTML += `<div class="rc-meta-row">${ICONS.clock}<span>${escHtml(cfg.time)}</span></div>`;
      if (!metaHTML)     metaHTML  = `<div class="rc-meta-row" style="color:var(--text-3);font-style:italic">No event details</div>`;
      meta.innerHTML = metaHTML;

      if (type === 'valid') {
        rcIcon.innerHTML    = ICONS.check;
        label.textContent   = 'Valid Pass';
        name.textContent    = pass?.attendeeName || 'Attendee';
        btns.innerHTML = `
          <button class="rc-btn rc-btn-secondary" onclick="dismissResult()">${ICONS.close} Reject</button>
          <button class="rc-btn rc-btn-admit" id="admitBtn" onclick="admitPass()">${ICONS.check} Admit</button>`;

      } else if (type === 'admitted') {
        rcIcon.innerHTML  = ICONS.warn;
        label.textContent = 'Already Admitted';
        name.textContent  = pass?.attendeeName || 'Attendee';
        if (pass?.checkedInAt) {
          admNote.style.display = 'flex';
          admNote.innerHTML = `${ICONS.clock} Admitted at ${new Date(pass.checkedInAt).toLocaleTimeString('en-IN', { hour:'2-digit', minute:'2-digit', hour12:true })}`;
        }
        btns.innerHTML = `<button class="rc-btn rc-btn-secondary" style="flex:1" onclick="dismissResult()">Close</button>`;

      } else {
        rcIcon.innerHTML  = ICONS.x;
        label.textContent = 'Invalid Pass';
        name.textContent  = 'Pass not recognised';
        meta.innerHTML    = `<div class="rc-meta-row" style="color:var(--text-3)">This QR code is not linked to any valid registration.</div>`;
        btns.innerHTML = `<button class="rc-btn rc-btn-secondary" style="flex:1" onclick="dismissResult()">Dismiss</button>`;
      }

      document.getElementById('resultCard').classList.add('open');
    }

    function dismissResult() {
      _currentPass = null;
      document.getElementById('resultCard').classList.remove('open');
      setScanHint('Point camera at attendee\'s QR pass');
      setTimeout(() => { _scanning = true; scanLoop(); }, 350);
    }

    async function admitPass() {
      if (!_currentPass?.token) return;
      const btn = document.getElementById('admitBtn');
      if (btn) { btn.disabled = true; btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="animation:spin 0.8s linear infinite"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg> Admitting…`; }

      try {
        const res  = await fetch(`${BACKEND}/api/attendance/admit`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token: _currentPass.token, staffCode: _staffCode, staffName: _staffName }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Admit failed');

        _statsData.admitted++;
        updateStatsBar();
        document.getElementById('scanAdmitCount').textContent = _statsData.admitted;
        document.getElementById('resultCard').classList.remove('open');
        showAdmitFlash(_currentPass.pass?.attendeeName || '');
        setTimeout(dismissResult, 2200);
      } catch (e) {
        if (btn) { btn.disabled = false; btn.innerHTML = `${ICONS.check} Admit`; }
        if (e.message === 'Already admitted') {
          showResult({ type: 'admitted', token: _currentPass.token, pass: _currentPass.pass });
        }
      }
    }

    function showAdmitFlash(name) {
      document.getElementById('admitFlashName').textContent = name;
      const el = document.getElementById('admitFlash');
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 2000);
    }

    function updateStatsBar() {
      document.getElementById('statAdmitted').textContent = _statsData.admitted;
      document.getElementById('statTotal').textContent    = _statsData.total;
      document.getElementById('statPending').textContent  = Math.max(0, _statsData.total - _statsData.admitted);
    }

    function setScanHint(txt) {
      document.getElementById('scanHint').textContent = txt;
    }

    /* ── Manual token entry ─────────────────────────────────────────── */
    function toggleManual() {
      const wrap = document.getElementById('manualWrap');
      const open = wrap.style.display === 'block';
      wrap.style.display = open ? 'none' : 'block';
      if (!open) document.getElementById('manualToken').focus();
    }

    function manualScan() {
      const t = document.getElementById('manualToken').value.trim();
      if (!t) return;
      document.getElementById('manualToken').value = '';
      toggleManual();
      verifyPass(t);
    }

    /* ── Canvas pass rendering ──────────────────────────────────────── */
    function drawPassOnCanvas(ctx, pass, W, H) {
      const cfg = pass.config || {};
      const bannerColor = cfg.bannerColor || '#1a1a2e';
      const textColor   = cfg.textColor   || '#ffffff';

      ctx.fillStyle = bannerColor;
      ctx.fillRect(0, 0, W, H);

      const qrImg = new Image();
      qrImg.onload = () => {
        const qrPad  = 20;
        const qrSize = H - qrPad * 2;
        ctx.fillStyle = '#ffffff';
        rrect(ctx, qrPad, qrPad, qrSize, qrSize, 12);
        ctx.fill();
        ctx.drawImage(qrImg, qrPad + 8, qrPad + 8, qrSize - 16, qrSize - 16);

        ctx.strokeStyle = 'rgba(255,255,255,0.18)'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(320, 30); ctx.lineTo(320, H - 30); ctx.stroke();

        const rx = 344, ry = 36, rw = W - rx - 20;
        ctx.textAlign = 'left';
        let cy = ry;

        if (cfg.logoUrl) {
          const logo = new Image(); logo.crossOrigin = 'anonymous';
          logo.onload = () => {
            const lh = Math.min(50, logo.naturalHeight || 50);
            const lw = lh * ((logo.naturalWidth || 1) / (logo.naturalHeight || 1));
            ctx.drawImage(logo, W - lw - 20, ry, lw, lh);
          };
          logo.src = cfg.logoUrl;
        }

        ctx.fillStyle = textColor;
        ctx.font = 'bold 26px "Plus Jakarta Sans",sans-serif';
        wrapTxt(ctx, cfg.eventName || 'Event', rx, cy, rw, 32);
        cy += 38;

        ctx.font = '19px "Plus Jakarta Sans",sans-serif';
        wrapTxt(ctx, pass.attendeeName || '—', rx, cy, rw, 26);
        cy += 32;

        ctx.font = '14px "Plus Jakarta Sans",sans-serif';
        ctx.fillStyle = 'rgba(255,255,255,0.72)';
        if (cfg.venue) { ctx.fillText(cfg.venue, rx, cy); cy += 24; }
        if (cfg.date)  { ctx.fillText(cfg.date,  rx, cy); cy += 24; }
        if (cfg.time)  { ctx.fillText(cfg.time,  rx, cy); cy += 24; }

        cy += 6;
        ctx.strokeStyle = 'rgba(255,255,255,0.18)'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(rx, cy); ctx.lineTo(W - 20, cy); ctx.stroke();
        cy += 14;

        const rules = (cfg.rules || []).slice(0, 3);
        if (rules.length) {
          ctx.fillStyle = 'rgba(255,255,255,0.55)';
          ctx.font = 'bold 12px "Plus Jakarta Sans",sans-serif';
          ctx.fillText('ENTRY RULES', rx, cy); cy += 17;
          ctx.font = '12px "Plus Jakarta Sans",sans-serif';
          rules.forEach(r => { ctx.fillText('• ' + r, rx, cy); cy += 17; });
        }
      };

      if (pass.qrDataUrl) {
        qrImg.src = pass.qrDataUrl;
      } else {
        ctx.fillStyle = 'rgba(255,255,255,0.12)';
        ctx.fillRect(20, 20, H - 40, H - 40);
      }
    }

    function rrect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);    ctx.quadraticCurveTo(x + w, y,     x + w, y + r);
      ctx.lineTo(x + w, y + h - r); ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);     ctx.quadraticCurveTo(x,     y + h, x,     y + h - r);
      ctx.lineTo(x, y + r);         ctx.quadraticCurveTo(x,     y,     x + r, y);
      ctx.closePath();
    }

    function wrapTxt(ctx, text, x, y, maxW, lineH) {
      const words = String(text || '').split(' ');
      let line = '';
      for (const w of words) {
        const t = line ? line + ' ' + w : w;
        if (ctx.measureText(t).width > maxW && line) { ctx.fillText(line, x, y); y += lineH; line = w; }
        else { line = t; }
      }
      if (line) ctx.fillText(line, x, y);
    }

    function escHtml(s) {
      return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    /* spin keyframe for loading states */
    const _style = document.createElement('style');
    _style.textContent = `@keyframes spin { from { transform:rotate(0deg); } to { transform:rotate(360deg); } }`;
    document.head.appendChild(_style);
  </script>
</body>
</html>
