/* ════════════════════════════════════════════════════════════════
   CONDITION LOGIC EDITOR
════════════════════════════════════════════════════════════════ */
function renderConditionsEditor(field, allFields) {
  const idx        = allFields.findIndex(f => f.id === field.id);
  const prevFields = allFields.slice(0, idx).filter(f => f.type !== 'section_break');
  if (!prevFields.length) return `
    <div class="hxfb-cond-section">
      <div class="hxfb-cond-section-label">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
        Conditional Logic
      </div>
      <div class="hxfb-cond-always">Add fields above this one to enable show/hide conditions.</div>
    </div>`;

  const conditions = field.conditions || [];
  const logic      = field.conditionLogic || 'all';
  return `
    <div class="hxfb-cond-section">
      <div class="hxfb-cond-section-label">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
        Conditional Logic
        ${conditions.length > 0 ? `<span style="background:rgba(245,158,11,0.15);color:#f59e0b;border-radius:4px;padding:1px 6px;font-size:10px">${conditions.length}</span>` : ''}
      </div>
      ${conditions.length === 0
        ? `<div class="hxfb-cond-always">Always visible — no conditions set.</div>`
        : `<div id="condlist-${field.id}">
            ${conditions.map(c => renderCondRow(c, field.id, prevFields)).join('')}
          </div>
          ${conditions.length > 1 ? `<div class="hxfb-cond-logic-row">Show when
            <select class="hxfb-select" onchange="updateCondLogic('${field.id}',this.value)">
              <option value="all" ${logic==='all'?'selected':''}>ALL</option>
              <option value="any" ${logic==='any'?'selected':''}>ANY</option>
            </select> conditions match</div>` : ''}`}
      <button class="hxfb-add-option-btn" onclick="addCondition('${field.id}')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:12px;height:12px"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add condition
      </button>
    </div>`;
}

function renderCondRow(cond, fieldId, prevFields) {
  const ops = [
    { v:'equals', l:'equals' }, { v:'not_equals', l:'does not equal' },
    { v:'contains', l:'contains' }, { v:'not_contains', l:'does not contain' },
    { v:'is_filled', l:'is filled' }, { v:'is_empty', l:'is empty' },
  ];
  const needsVal = !['is_filled','is_empty'].includes(cond.operator||'equals');
  const srcField = prevFields.find(f => f.id === cond.fieldId);
  const srcOpts  = srcField && ['radio','dropdown','checkbox'].includes(srcField.type) ? srcField.options||[] : [];
  return `
    <div class="hxfb-cond-row" id="condrow-${cond.id}">
      <select class="hxfb-select" onchange="updateCond('${fieldId}','${cond.id}','fieldId',this.value)">
        ${prevFields.map(f => `<option value="${f.id}" ${f.id===cond.fieldId?'selected':''}>${escHtml(f.label||'Untitled')}</option>`).join('')}
      </select>
      <select class="hxfb-select" onchange="updateCond('${fieldId}','${cond.id}','operator',this.value)">
        ${ops.map(o => `<option value="${o.v}" ${o.v===(cond.operator||'equals')?'selected':''}>${o.l}</option>`).join('')}
      </select>
      ${needsVal
        ? srcOpts.length
          ? `<select class="hxfb-select" onchange="updateCond('${fieldId}','${cond.id}','value',this.value)">
               <option value="">— pick —</option>
               ${srcOpts.map(o => `<option value="${escAttr(o)}" ${o===cond.value?'selected':''}>${escHtml(o)}</option>`).join('')}
             </select>`
          : `<input class="hxfb-input" value="${escAttr(cond.value||'')}" placeholder="value"
                    oninput="updateCondValue('${fieldId}','${cond.id}',this.value)"/>`
        : `<div style="flex:1"></div>`}
      <button class="hxfb-option-del" onclick="removeCond('${fieldId}','${cond.id}')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>`;
}

function addCondition(fieldId) {
  const field      = _S.config.fields.find(f => f.id === fieldId);
  if (!field) return;
  const idx        = _S.config.fields.findIndex(f => f.id === fieldId);
  const prevFields = _S.config.fields.slice(0, idx).filter(f => f.type !== 'section_break');
  if (!prevFields.length) return;
  const newCond = { id:'c_'+Date.now().toString(36)+Math.random().toString(36).slice(2,5), fieldId:prevFields[0].id, operator:'equals', value:'' };
  _S.updateField(fieldId, { conditions: [...(field.conditions||[]), newCond] });
  setSaveStatus('unsaved');
  renderRightPanel();
}
function removeCond(fieldId, condId) {
  const field = _S.config.fields.find(f => f.id === fieldId);
  if (!field) return;
  _S.updateField(fieldId, { conditions: (field.conditions||[]).filter(c => c.id !== condId) });
  setSaveStatus('unsaved');
  renderRightPanel();
}
function updateCond(fieldId, condId, key, value) {
  const field = _S.config.fields.find(f => f.id === fieldId);
  if (!field) return;
  _S.updateField(fieldId, { conditions: (field.conditions||[]).map(c => c.id===condId ? {...c,[key]:value} : c) });
  setSaveStatus('unsaved');
  renderRightPanel();
}
function updateCondValue(fieldId, condId, value) {
  const field = _S.config.fields.find(f => f.id === fieldId);
  if (!field) return;
  _S.updateField(fieldId, { conditions: (field.conditions||[]).map(c => c.id===condId ? {...c,value} : c) });
  setSaveStatus('unsaved');
}
function updateCondLogic(fieldId, logic) {
  _S.updateField(fieldId, { conditionLogic: logic });
  setSaveStatus('unsaved');
}

/* ════════════════════════════════════════════════════════════════
   CENTER — Interactive Preview with Pages
════════════════════════════════════════════════════════════════ */
function buildPvPages() {
  const fields = _S.config?.fields || [];
  _pv.pages = [];
  let page = { title: null, desc: null, fields: [] };
  fields.forEach(f => {
    if (f.type === 'section_break') {
      _pv.pages.push(page);
      page = { title: f.label || '', desc: f.description || '', fields: [] };
    } else {
      page.fields.push(f);
    }
  });
  _pv.pages.push(page);
  if (_pv.pages.length > 1) _pv.pages = _pv.pages.filter(p => p.fields.length > 0);
  if (_pv.page >= _pv.pages.length) _pv.page = 0;
}

function renderPreview() {
  buildPvPages();
  pvShowPage(_pv.page, false);
}

function pvShowPage(n, animate = true) {
  _pv.page = Math.max(0, Math.min(n, _pv.pages.length - 1));
  const page    = _pv.pages[_pv.page] || { fields: [] };
  const total   = _pv.pages.length;
  const isFirst = _pv.page === 0;
  const isLast  = _pv.page === total - 1;
  const s       = _S.config?.settings || {};
  const th      = _S.config?.theme    || {};
  const accent  = ACCENT[th.color] || ACCENT.cyan;
  const accSol  = ACCENT_SOLID[th.color] || '#00d4ff';

  document.getElementById('pvAccent').style.background = accent;

  const pgInfo = document.getElementById('pvPageInfo');
  pgInfo.textContent = total > 1 ? `Page ${_pv.page + 1} of ${total}` : '';

  let html = '';

  // Progress bar (multi-page only)
  if (total > 1) {
    const pct = Math.round(((_pv.page+1)/total)*100);
    html += `
      <div class="hxfb-pv-prog">
        <div class="hxfb-pv-prog-meta"><span>Step ${_pv.page+1} of ${total}</span><span>${pct}%</span></div>
        <div class="hxfb-pv-prog-track"><div class="hxfb-pv-prog-fill" style="width:${pct}%;background:${accent}"></div></div>
      </div>`;
  }

  // Header
  if (isFirst) {
    html += `<div class="hxfb-pv-title">${escHtml(s.title || _S.name || 'Untitled Form')}</div>`;
    if (s.description) html += `<div class="hxfb-pv-desc">${escHtml(s.description)}</div>`;
  } else if (page.title) {
    html += `<div class="hxfb-pv-page-title">${escHtml(page.title)}</div>`;
    if (page.desc) html += `<div class="hxfb-pv-page-desc">${escHtml(page.desc)}</div>`;
  }

  // Fields
  if (!page.fields.length) {
    html += `<div class="hxfb-pv-empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/></svg>No fields on this page yet</div>`;
  } else {
    html += page.fields.map(f => pvRenderField(f, accSol)).join('');
  }

  // Nav
  const submitLabel = isLast ? (s.submitLabel || 'Submit') : 'Next →';
  const backVisible = !isFirst;
  html += `<div class="hxfb-pv-nav">
    ${backVisible ? `<button class="hxfb-pv-back" onclick="pvShowPage(${_pv.page-1})">← Back</button>` : ''}
    <button class="hxfb-pv-submit" style="background:${accent}"
            onclick="${isLast ? 'pvFakeSubmit()' : `pvShowPage(${_pv.page+1})`}">
      ${isLast
        ? `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:14px;height:14px;margin-right:5px"><polyline points="20 6 9 17 4 12"/></svg>`
        : ''}${escHtml(submitLabel)}
    </button>
  </div>`;

  const body = document.getElementById('pvBody');
  body.innerHTML = html;
  if (animate) { body.style.opacity = '0'; requestAnimationFrame(() => { body.style.transition = 'opacity 0.22s'; body.style.opacity = '1'; }); }
  pvEvalConditions();
}

function pvRenderField(f, accSol) {
  const req = f.required ? `<span class="hxfb-pv-req">*</span>` : '';
  const fid = 'pv_' + f.id;
  let body  = '';

  switch (f.type) {
    case 'text':
      body = `<input class="hxfb-pv-input" id="${fid}" type="text" placeholder="${escAttr(f.placeholder||'')}" oninput="pvSetVal('${f.id}',this.value)"/>`;
      break;
    case 'email':
      body = `<input class="hxfb-pv-input" id="${fid}" type="email" placeholder="${escAttr(f.placeholder||'you@example.com')}" oninput="pvSetVal('${f.id}',this.value)"/>`;
      break;
    case 'phone':
      body = `<input class="hxfb-pv-input" id="${fid}" type="tel" placeholder="${escAttr(f.placeholder||'+91 98765 43210')}" oninput="pvSetVal('${f.id}',this.value)"/>`;
      break;
    case 'number':
      body = `<input class="hxfb-pv-input" id="${fid}" type="number" placeholder="${escAttr(f.placeholder||'0')}" oninput="pvSetVal('${f.id}',this.value)"/>`;
      break;
    case 'textarea':
      body = `<textarea class="hxfb-pv-textarea" id="${fid}" placeholder="${escAttr(f.placeholder||'')}" oninput="pvSetVal('${f.id}',this.value)"></textarea>`;
      break;
    case 'date':
      body = `<input class="hxfb-pv-input" id="${fid}" type="date" onchange="pvSetVal('${f.id}',this.value)"/>`;
      break;
    case 'time':
      body = `<input class="hxfb-pv-input" id="${fid}" type="time" onchange="pvSetVal('${f.id}',this.value)"/>`;
      break;
    case 'dropdown':
      const dOpts = (f.options||[]).map(o => `<option value="${escAttr(o)}">${escHtml(o)}</option>`).join('');
      body = `<select class="hxfb-pv-select" id="${fid}" onchange="pvSetVal('${f.id}',this.value)"><option value="">— Select —</option>${dOpts}</select>`;
      break;
    case 'radio':
      body = (f.options||[]).map((o,i) => {
        const isSel = (_pv.selOpts[f.id] === i);
        return `<div class="hxfb-pv-option${isSel?' sel':''}" onclick="pvPickRadio('${f.id}',${i},${(f.options||[]).length},this)">
          <div class="hxfb-pv-dot" style="${isSel?`background:${accSol};border-color:${accSol}`:''}"></div>
          <span>${escHtml(o)}</span>
        </div>`;
      }).join('');
      break;
    case 'checkbox':
      const cbSel = _pv.selOpts[f.id] || {};
      body = (f.options||[]).map((o,i) => {
        const isSel = !!cbSel[i];
        return `<div class="hxfb-pv-option${isSel?' sel':''}" onclick="pvPickCheck('${f.id}',${i},this)">
          <div class="hxfb-pv-box" style="${isSel?`background:${accSol};border-color:${accSol}`:''}"></div>
          <span>${escHtml(o)}</span>
        </div>`;
      }).join('');
      break;
    case 'linear_scale':
      const max  = f.max || 5;
      const styl = f.style || 'stars';
      const curS = _pv.vals[f.id] || 0;
      if (styl === 'stars') {
        body = `<div class="hxfb-pv-stars" id="${fid}">
          ${Array.from({length:max},(_,i) =>
            `<span class="hxfb-pv-star${i<curS?' on':''}" onclick="pvPickStar('${f.id}',${i+1},${max})">★</span>`
          ).join('')}
        </div>
        <div class="hxfb-pv-scale-labels"><span>${escHtml(f.minLabel||'Poor')}</span><span>${escHtml(f.maxLabel||'Excellent')}</span></div>`;
      } else {
        body = `<div class="hxfb-pv-numscale" id="${fid}">
          ${Array.from({length:max},(_,i) =>
            `<div class="hxfb-pv-numbox${curS===i+1?' on':''}" onclick="pvPickNum('${f.id}',${i+1},${max})">${i+1}</div>`
          ).join('')}
        </div>
        <div class="hxfb-pv-scale-labels"><span>${escHtml(f.minLabel||'Poor')}</span><span>${escHtml(f.maxLabel||'Excellent')}</span></div>`;
      }
      break;
    case 'file_upload':
      body = `<div class="hxfb-pv-upload">📎 Click to upload ${f.accept&&f.accept!=='*'?`(${f.accept})`:''}<div style="font-size:11px;margin-top:3px">Max ${f.maxMB||10} MB</div></div>`;
      break;
    default:
      body = `<input class="hxfb-pv-input" id="${fid}" type="text" placeholder="${escAttr(f.placeholder||'')}"/>`;
  }

  return `<div class="hxfb-pv-field" id="pvf-${f.id}"><div class="hxfb-pv-label">${escHtml(f.label||'Untitled')} ${req}</div>${body}</div>`;
}

/* ── Preview interaction handlers ──────────────────────────────── */
function pvSetVal(fid, val) {
  _pv.vals[fid] = val;
  pvEvalConditions();
}
function pvPickRadio(fid, idx, total, el) {
  _pv.selOpts[fid] = idx;
  const opts = _S.config.fields.find(f => f.id === fid)?.options || [];
  _pv.vals[fid] = opts[idx] || '';
  // Visual update without full re-render
  const parent = el.closest('.hxfb-pv-field');
  if (parent) parent.querySelectorAll('.hxfb-pv-option').forEach((o,i) => o.classList.toggle('sel', i===idx));
  pvEvalConditions();
}
function pvPickCheck(fid, idx, el) {
  if (!_pv.selOpts[fid]) _pv.selOpts[fid] = {};
  _pv.selOpts[fid][idx] = !_pv.selOpts[fid][idx];
  el.classList.toggle('sel', !!_pv.selOpts[fid][idx]);
  const opts = _S.config.fields.find(f => f.id === fid)?.options || [];
  _pv.vals[fid] = Object.entries(_pv.selOpts[fid]).filter(([,v])=>v).map(([k])=>opts[+k]).filter(Boolean);
  pvEvalConditions();
}
function pvPickStar(fid, val, max) {
  _pv.vals[fid] = val;
  const container = document.getElementById('pv_' + fid);
  if (container) container.querySelectorAll('.hxfb-pv-star').forEach((s,i) => s.classList.toggle('on', i<val));
}
function pvPickNum(fid, val, max) {
  _pv.vals[fid] = val;
  const container = document.getElementById('pv_' + fid);
  if (container) container.querySelectorAll('.hxfb-pv-numbox').forEach((b,i) => b.classList.toggle('on', i+1===val));
}
function pvFakeSubmit() {
  const body = document.getElementById('pvBody');
  body.innerHTML = `
    <div style="display:flex;flex-direction:column;align-items:center;padding:32px 16px;text-align:center">
      <div style="width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#10b981,#06b6d4);display:flex;align-items:center;justify-content:center;margin-bottom:16px;box-shadow:0 0 28px rgba(16,185,129,0.3)">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <div style="font-family:var(--font-display);font-size:18px;font-weight:700;color:var(--text);margin-bottom:8px">Preview Complete</div>
      <div style="font-size:13px;color:var(--text-2);margin-bottom:18px">${escHtml(_S.config?.settings?.successMessage||'Thank you for your response!')}</div>
      <button style="padding:8px 18px;border-radius:8px;background:var(--glass);border:1px solid var(--glass-border-2);color:var(--text-2);font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font)" onclick="pvReset()">Reset Preview</button>
    </div>`;
}
function pvReset() {
  _pv.vals = {}; _pv.selOpts = {}; _pv.page = 0;
  renderPreview();
}

/* ── Condition evaluation for preview ────────────────────────── */
function pvEvalConditions() {
  const allFields = _S.config?.fields || [];
  const page = _pv.pages[_pv.page] || { fields: [] };
  page.fields.forEach(f => {
    if (!f.conditions?.length) return;
    const wrap = document.getElementById('pvf-' + f.id);
    if (!wrap) return;
    const visible = pvIsVisible(f);
    wrap.style.display = visible ? '' : 'none';
  });
}
function pvIsVisible(field) {
  if (!field.conditions?.length) return true;
  const logic = field.conditionLogic || 'all';
  const results = field.conditions.map(c => pvEvalCond(c));
  return logic === 'any' ? results.some(Boolean) : results.every(Boolean);
}
function pvEvalCond(c) {
  const raw   = _pv.vals[c.fieldId];
  const condV = String(c.value||'').toLowerCase().trim();
  const op    = c.operator || 'equals';
  const valS  = Array.isArray(raw) ? raw.join(',').toLowerCase() : String(raw||'').toLowerCase().trim();
  const valA  = Array.isArray(raw) ? raw.map(v=>v.toLowerCase()) : [valS];
  const empty = Array.isArray(raw) ? raw.length===0 : valS==='';
  switch(op) {
    case 'equals':      return valA.includes(condV) || valS===condV;
    case 'not_equals':  return !valA.includes(condV) && valS!==condV;
    case 'contains':    return valS.includes(condV);
    case 'not_contains':return !valS.includes(condV);
    case 'is_filled':   return !empty;
    case 'is_empty':    return empty;
    default:            return true;
  }
}

/* ════════════════════════════════════════════════════════════════
   PUBLISH & MODALS
════════════════════════════════════════════════════════════════ */
async function doPublish() {
  const btn = document.getElementById('publishBtn');
  if (!_S.config.fields.length && _S.status !== 'published') {
    toast('Add at least one field before publishing.', 'warn');
    return;
  }
  if (_S.status === 'closed') {
    btn.disabled = true; btn.textContent = 'Reopening…';
    try { await _S.reopen(); updateTopBar(); toast('Form is live again!', 'success'); }
    catch(e) { toast(e.message, 'error'); }
    btn.disabled = false; return;
  }
  btn.disabled = true;
  btn.textContent = _S.status === 'published' ? 'Saving…' : 'Publishing…';
  try {
    setSaveStatus('saving');
    const result = await _S.publish();
    setSaveStatus('saved');
    updateTopBar();
    if (_S.status === 'published') {
      publishedUrl = result.publicUrl || `${window.location.origin}/hx-form-view.html?f=${_S.slug}`;
      document.getElementById('publishedUrlEl').textContent = publishedUrl;
      document.getElementById('publishModal').classList.add('open');
    } else {
      toast('Saved!', 'success');
    }
  } catch(e) {
    setSaveStatus('unsaved');
    toast(e.message || 'Publish failed', 'error');
  } finally {
    btn.disabled = false;
    updateTopBar();
  }
}
function closePublishModal() { document.getElementById('publishModal').classList.remove('open'); }
function openPublishedForm() { if (publishedUrl) window.open(publishedUrl,'_blank'); closePublishModal(); }
function copyPublishedUrl() {
  if (!publishedUrl) return;
  navigator.clipboard.writeText(publishedUrl).then(() => {
    const btn = document.getElementById('copyUrlBtn');
    btn.textContent = 'Copied!'; btn.style.color = 'var(--green)';
    setTimeout(() => { btn.textContent = 'Copy'; btn.style.color = ''; }, 2000);
  });
}

/* ── Leave warning ───────────────────────────────────────────────── */
function confirmLeave(e) {
  if (!_S._backendDirty) { window.location.href = leaveTarget; return; }
  e.preventDefault();
  document.getElementById('leaveModal').classList.add('open');
}
function closeLeaveModal() { document.getElementById('leaveModal').classList.remove('open'); }
function leaveNow() { closeLeaveModal(); window.location.href = leaveTarget; }
async function saveAndLeave() {
  const btn = document.querySelector('#leaveModal .btn-primary');
  btn.textContent = 'Saving…'; btn.disabled = true;
  setSaveStatus('saving');
  await _S.saveToBackendNow();
  setSaveStatus('saved');
  window.location.href = leaveTarget;
}
window.addEventListener('beforeunload', e => { if (_S?._backendDirty) { e.preventDefault(); e.returnValue=''; } });

/* ── Helpers ─────────────────────────────────────────────────────── */
function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escAttr(s) { return String(s||'').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
lucide.createIcons();
</script>
