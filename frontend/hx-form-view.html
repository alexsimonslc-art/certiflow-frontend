<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loading… — GS Forms</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Syne:wght@700;800&display=swap"
    rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    /* ════════════════════════════════════════════════════════════════
     GS Forms — Public View  (self-contained, no dashboard deps)
  ════════════════════════════════════════════════════════════════ */
    :root {
      --bg: #04080f;
      --surface: rgba(10, 18, 35, 0.80);
      --glass: rgba(255, 255, 255, 0.04);
      --glass-b: rgba(255, 255, 255, 0.09);
      --glass-b2: rgba(255, 255, 255, 0.14);
      --text: #eef4ff;
      --text-2: #98b0cc;
      --text-3: #546a85;
      --red: #f43f5e;
      --red-dim: rgba(244, 63, 94, 0.12);
      --font: 'Plus Jakarta Sans', sans-serif;
      --font-display: 'Syne', sans-serif;
      --accent: #00d4ff;
      --accent-dim: rgba(0, 212, 255, 0.10);
      --accent-grad: linear-gradient(135deg, #00d4ff, #7c3aed);
      --ease: cubic-bezier(0.16, 1, 0.3, 1);
      --radius: 11px;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* Background glow */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background:
        radial-gradient(ellipse 65% 50% at 15% 0%, rgba(0, 212, 255, 0.07) 0%, transparent 55%),
        radial-gradient(ellipse 50% 55% at 88% 90%, rgba(124, 58, 237, 0.09) 0%, transparent 55%);
    }

    /* ── Accent bar at top ──────────────────────────────────────── */
    .gsfv-accent-bar {
      height: 4px;
      width: 100%;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 100;
      background: var(--accent-grad);
      transition: background 0.4s;
    }

    /* ── Page wrap ──────────────────────────────────────────────── */
    .gsfv-page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 56px 16px 80px;
    }

    .gsfv-container {
      width: 100%;
      max-width: 580px;
    }

    /* ── Loading skeleton ───────────────────────────────────────── */
    .gsfv-skeleton {
      animation: skPulse 1.4s ease infinite;
    }

    @keyframes skPulse {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: 0.4
      }
    }

    .gsfv-sk-line {
      height: 14px;
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.08);
      margin-bottom: 12px;
    }

    .gsfv-sk-box {
      height: 48px;
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.06);
      margin-bottom: 18px;
    }

    /* ── Error / Closed state ───────────────────────────────────── */
    .gsfv-error-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 48px 16px;
    }

    .gsfv-error-icon {
      width: 72px;
      height: 72px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 22px;
    }

    .gsfv-error-icon svg {
      width: 32px;
      height: 32px;
    }

    .gsfv-error-icon.not-found {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-3);
    }

    .gsfv-error-icon.closed {
      background: rgba(244, 63, 94, 0.10);
      color: var(--red);
    }

    .gsfv-error-icon.full {
      background: rgba(245, 158, 11, 0.10);
      color: #f59e0b;
    }

    .gsfv-error-title {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 10px;
    }

    .gsfv-error-sub {
      font-size: 14.5px;
      color: var(--text-2);
      line-height: 1.6;
      max-width: 360px;
    }

    .gsfv-error-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 99px;
      margin-bottom: 16px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.3px;
    }

    .gsfv-error-badge.closed {
      background: var(--red-dim);
      color: var(--red);
      border: 1px solid rgba(244, 63, 94, 0.2);
    }

    .gsfv-error-badge.full {
      background: rgba(245, 158, 11, 0.1);
      color: #f59e0b;
      border: 1px solid rgba(245, 158, 11, 0.2);
    }

    /* ── Form header ────────────────────────────────────────────── */
    .gsfv-header {
      margin-bottom: 32px;
    }

    .gsfv-org-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-3);
      margin-bottom: 14px;
      letter-spacing: 0.3px;
      text-transform: uppercase;
    }

    .gsfv-org-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
    }

    .gsfv-title {
      font-family: var(--font-display);
      font-size: clamp(22px, 5vw, 30px);
      font-weight: 800;
      color: var(--text);
      line-height: 1.25;
      letter-spacing: -0.5px;
      margin-bottom: 12px;
    }

    .gsfv-desc {
      font-size: 15px;
      color: var(--text-2);
      line-height: 1.65;
    }

    /* ── Field wrapper ──────────────────────────────────────────── */
    .gsfv-field {
      margin-bottom: 22px;
      animation: fieldIn 0.3s var(--ease) both;
    }

    @keyframes fieldIn {
      from {
        opacity: 0;
        transform: translateY(8px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    .gsfv-label {
      display: flex;
      align-items: baseline;
      gap: 5px;
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 9px;
      line-height: 1.4;
    }

    .gsfv-req {
      color: var(--red);
      font-size: 13px;
      flex-shrink: 0;
    }

    .gsfv-hint {
      font-size: 12.5px;
      color: var(--text-3);
      margin-top: -5px;
      margin-bottom: 9px;
    }

    /* Base input */
    .gsfv-input,
    .gsfv-textarea,
    .gsfv-select {
      width: 100%;
      padding: 12px 14px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--glass-b);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 15px;
      font-family: var(--font);
      outline: none;
      transition: border-color 0.18s, box-shadow 0.18s;
      -webkit-appearance: none;
    }

    .gsfv-input:focus,
    .gsfv-textarea:focus,
    .gsfv-select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px var(--accent-dim);
    }

    .gsfv-input::placeholder,
    .gsfv-textarea::placeholder {
      color: var(--text-3);
    }

    .gsfv-textarea {
      resize: vertical;
      min-height: 100px;
      line-height: 1.6;
    }

    .gsfv-select {
      cursor: pointer;
      background-image: url("data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 width=%2714%22 height=%2214%22 viewBox=%270 0 24 24%27 fill=%27none%27 stroke=%27%235a7394%27 stroke-width=%272%27%3E%3Cpolyline points=%276 9 12 15 18 9%27/%3E%3C/svg%3E");
      background-repeat: no-repeat;
      background-position: right 13px center;
      padding-right: 40px;
    }

    .gsfv-select option {
      background: #0d1728;
      color: var(--text);
    }

    /* Field error state */
    .gsfv-field.has-error .gsfv-input,
    .gsfv-field.has-error .gsfv-textarea,
    .gsfv-field.has-error .gsfv-select {
      border-color: rgba(244, 63, 94, 0.6);
      box-shadow: 0 0 0 4px rgba(244, 63, 94, 0.08);
    }

    .gsfv-error-msg {
      display: none;
      font-size: 12.5px;
      color: var(--red);
      margin-top: 6px;
      font-weight: 500;
    }

    .gsfv-field.has-error .gsfv-error-msg {
      display: block;
    }

    /* ── Radio / Checkbox cards ─────────────────────────────────── */
    .gsfv-options {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .gsfv-option-label {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-radius: var(--radius);
      border: 1px solid var(--glass-b);
      cursor: pointer;
      transition: border-color 0.18s, background 0.18s;
      font-size: 14.5px;
      color: var(--text-2);
      user-select: none;
    }

    .gsfv-option-label:hover {
      border-color: var(--glass-b2);
      color: var(--text);
      background: rgba(255, 255, 255, 0.025);
    }

    .gsfv-option-label input {
      display: none;
    }

    .gsfv-option-indicator {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.2);
      flex-shrink: 0;
      transition: all 0.18s;
      position: relative;
    }

    .gsfv-option-indicator.box {
      border-radius: 5px;
    }

    /* Selected state — driven by JS class */
    .gsfv-option-label.selected {
      border-color: var(--accent);
      background: var(--accent-dim);
      color: var(--text);
    }

    .gsfv-option-label.selected .gsfv-option-indicator {
      border-color: var(--accent);
      background: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }

    .gsfv-option-label.selected .gsfv-option-indicator::after {
      content: '✓';
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      color: #000;
    }

    .gsfv-field.has-error .gsfv-options .gsfv-option-label {
      border-color: rgba(244, 63, 94, 0.3);
    }

    /* ── Linear scale — Stars ───────────────────────────────────── */
    .gsfv-stars {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .gsfv-star-btn {
      font-size: 28px;
      background: none;
      border: none;
      cursor: pointer;
      transition: transform 0.12s;
      color: rgba(255, 255, 255, 0.15);
      line-height: 1;
      padding: 2px;
    }

    .gsfv-star-btn:hover {
      transform: scale(1.15);
    }

    .gsfv-star-btn.active {
      color: var(--accent);
    }

    .gsfv-scale-labels {
      display: flex;
      justify-content: space-between;
      font-size: 11.5px;
      color: var(--text-3);
      margin-top: 6px;
    }

    /* ── Linear scale — Numbers ─────────────────────────────────── */
    .gsfv-num-scale {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .gsfv-num-btn {
      width: 38px;
      height: 38px;
      border-radius: 9px;
      border: 1px solid var(--glass-b);
      background: transparent;
      font-size: 13.5px;
      font-weight: 600;
      color: var(--text-3);
      cursor: pointer;
      transition: all 0.15s;
      font-family: var(--font);
    }

    .gsfv-num-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-dim);
    }

    .gsfv-num-btn.active {
      background: var(--accent);
      color: #000;
      border-color: var(--accent);
      box-shadow: 0 0 12px var(--accent-dim);
    }

    /* ── File upload ────────────────────────────────────────────── */
    .gsfv-upload-zone {
      border: 2px dashed var(--glass-b);
      border-radius: var(--radius);
      padding: 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.18s, background 0.18s;
      position: relative;
    }

    .gsfv-upload-zone:hover,
    .gsfv-upload-zone.drag-over {
      border-color: var(--accent);
      background: var(--accent-dim);
    }

    .gsfv-upload-zone input[type="file"] {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      cursor: pointer;
    }

    .gsfv-upload-icon {
      font-size: 28px;
      margin-bottom: 8px;
    }

    .gsfv-upload-text {
      font-size: 14px;
      color: var(--text-2);
    }

    .gsfv-upload-text strong {
      color: var(--accent);
    }

    .gsfv-upload-sub {
      font-size: 12px;
      color: var(--text-3);
      margin-top: 4px;
    }

    .gsfv-upload-preview {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 13px;
      border-radius: 9px;
      margin-top: 10px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--glass-b);
      font-size: 13px;
      color: var(--text-2);
    }

    .gsfv-upload-preview svg {
      width: 15px;
      height: 15px;
      color: var(--accent);
      flex-shrink: 0;
    }

    /* ── Section break ──────────────────────────────────────────── */
    .gsfv-section-break {
      padding: 10px 0 6px;
      margin-bottom: 24px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
    }

    .gsfv-section-title {
      font-family: var(--font-display);
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 5px;
    }

    .gsfv-section-desc {
      font-size: 14px;
      color: var(--text-2);
      line-height: 1.55;
    }

    /* ── Submit button ──────────────────────────────────────────── */
    .gsfv-submit {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: var(--accent-grad);
      color: #fff;
      font-size: 15.5px;
      font-weight: 700;
      font-family: var(--font);
      cursor: pointer;
      box-shadow: 0 6px 28px rgba(0, 212, 255, 0.22);
      transition: box-shadow 0.2s, transform 0.15s, opacity 0.2s;
      margin-top: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .gsfv-submit:hover {
      box-shadow: 0 10px 36px rgba(0, 212, 255, 0.35);
      transform: translateY(-1px);
    }

    .gsfv-submit:active {
      transform: translateY(0);
    }

    .gsfv-submit:disabled {
      opacity: 0.65;
      cursor: not-allowed;
      transform: none;
    }

    .gsfv-submit svg {
      width: 16px;
      height: 16px;
    }

    @keyframes btnSpin {
      to {
        transform: rotate(360deg);
      }
    }

    .gsfv-submit.loading::before {
      content: '';
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, 0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: btnSpin 0.7s linear infinite;
    }

    /* ── Thank you state ────────────────────────────────────────── */
    .gsfv-ty-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 24px 16px;
      animation: tyIn 0.5s var(--ease) both;
    }

    @keyframes tyIn {
      from {
        opacity: 0;
        transform: scale(0.95)
      }

      to {
        opacity: 1;
        transform: scale(1)
      }
    }

    .gsfv-ty-ring {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: linear-gradient(135deg, #10b981, #06b6d4);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 22px;
      box-shadow: 0 0 48px rgba(16, 185, 129, 0.3);
      animation: popIn 0.55s var(--ease) both;
    }

    @keyframes popIn {
      0% {
        transform: scale(0.4);
        opacity: 0
      }

      70% {
        transform: scale(1.1)
      }

      100% {
        transform: scale(1);
        opacity: 1
      }
    }

    .gsfv-ty-ring svg {
      width: 32px;
      height: 32px;
      color: #fff;
    }

    .gsfv-ty-title {
      font-family: var(--font-display);
      font-size: 24px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 10px;
    }

    .gsfv-ty-msg {
      font-size: 15px;
      color: var(--text-2);
      line-height: 1.6;
      max-width: 380px;
      margin-bottom: 28px;
    }

    .gsfv-ty-another {
      padding: 11px 24px;
      border-radius: 10px;
      background: var(--glass);
      border: 1px solid var(--glass-b2);
      color: var(--text-2);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: var(--font);
      transition: all 0.18s;
    }

    .gsfv-ty-another:hover {
      color: var(--text);
      background: rgba(255, 255, 255, 0.07);
    }

    /* ── Footer ─────────────────────────────────────────────────── */
    .gsfv-footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 16px 16px 32px;
      font-size: 12.5px;
      color: var(--text-3);
    }

    .gsfv-footer a {
      color: var(--text-2);
      text-decoration: none;
      font-weight: 600;
    }

    .gsfv-footer a:hover {
      color: var(--text);
    }

    /* ── Conditional field show/hide ───────────────────────────── */
    .gsfv-field {
      transition: opacity 0.28s ease, max-height 0.32s ease, margin-bottom 0.28s ease;
      overflow: hidden;
    }

    .gsfv-field.cond-hidden {
      max-height: 0 !important;
      opacity: 0 !important;
      margin-bottom: 0 !important;
      pointer-events: none;
    }


    /* ── Multi-page progress bar ────────────────────────────────── */
    .gsfv-progress-wrap {
      margin-bottom: 24px;
      display: none;
    }

    .gsfv-progress-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12.5px;
      color: var(--text-3);
      margin-bottom: 8px;
      font-weight: 500;
    }

    .gsfv-progress-meta strong {
      color: var(--text-2);
    }

    .gsfv-progress-track {
      height: 5px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 99px;
      overflow: hidden;
    }

    .gsfv-progress-fill {
      height: 100%;
      border-radius: 99px;
      background: var(--accent-grad);
      transition: width 0.45s var(--ease);
    }

    /* ── Page section title (for page 2+) ───────────────────────── */
    .gsfv-page-hdr {
      margin-bottom: 26px;
      display: none;
    }

    .gsfv-page-hdr-title {
      font-family: var(--font-display);
      font-size: clamp(18px, 4vw, 24px);
      font-weight: 700;
      color: var(--text);
      margin-bottom: 7px;
      line-height: 1.3;
    }

    .gsfv-page-hdr-desc {
      font-size: 14.5px;
      color: var(--text-2);
      line-height: 1.6;
    }

    /* ── Nav row: Back + Next/Submit ────────────────────────────── */
    .gsfv-nav-row {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-top: 12px;
    }

    .gsfv-back-btn {
      padding: 13px 20px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.12);
      color: var(--text-2);
      cursor: pointer;
      font-family: var(--font);
      transition: all 0.18s;
      display: none;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .gsfv-back-btn:hover {
      color: var(--text);
      border-color: rgba(255, 255, 255, 0.22);
    }

    .gsfv-back-btn svg {
      width: 15px;
      height: 15px;
    }

    /* submit button gets flex:1 when back is visible */
    .gsfv-nav-row .gsfv-submit {
      margin-top: 0;
      flex: 1;
    }

    /* Page-in animation */
    .gsfv-page-enter {
      animation: pageIn 0.3s var(--ease) both;
    }

    @keyframes pageIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ── Responsive ─────────────────────────────────────────────── */
    @media (max-width: 600px) {
      .gsfv-page {
        padding: 44px 12px 64px;
      }

      .gsfv-title {
        font-size: 22px;
      }

      .gsfv-num-btn {
        width: 34px;
        height: 34px;
      }
    }

    /* ── Pass Modal ──────────────────────────────────────────────── */
    .gsfv-pass-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.82);
      backdrop-filter: blur(18px);
      z-index: 9000;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .gsfv-pass-overlay.open {
      display: flex;
    }

    .gsfv-pass-modal {
      background: #07111f;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 20px;
      padding: 24px;
      max-width: 520px;
      width: 100%;

<body>

  <!-- Accent bar -->
  <div class="gsfv-accent-bar" id="accentBar"></div>

  <!-- ── Loading State ──────────────────────────────────────────── -->
  <div class="gsfv-page" id="loadingState">

      <div id="formCoverImage"
        style="display:none;width:100%;height:160px;border-radius:16px;background-size:cover;background-position:center;background-repeat:no-repeat;margin-bottom:22px">

      <!-- Form title header (page 1 only) -->
      <div class="gsfv-header" id="formMainHeader">

            <polyline points="15 18 9 12 15 6" />

          Back
        </button>

          <span id="submitLabel">Next</span>

    </div>

  <!-- ── Thank You State ────────────────────────────────────────── -->
  <div class="gsfv-page" id="thankYouState" style="display:none">
    <div class="gsfv-container">
      <div class="gsfv-ty-wrap">
        <div class="gsfv-ty-ring">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <polyline points="20 6 9 17 4 12" />
          </svg>

  <!-- ── Footer ─────────────────────────────────────────────────── -->

  </footer>

  <!-- ── Entry Pass Modal ──────────────────────────────────────── -->
  <div class="gsfv-pass-overlay" id="passModal">
    <div class="gsfv-pass-modal">
      <div class="gsfv-pass-modal-hdr">

        <button class="gsfv-pass-modal-close" onclick="closePassModal()">✕</button>
      </div>
      <div class="gsfv-pass-canvas-wrap">

      </div>
      <div class="gsfv-pass-actions">
        <button class="gsfv-pass-btn gsfv-pass-btn-dl" onclick="downloadPass()">⬇ Download Pass</button>
        <button class="gsfv-pass-btn gsfv-pass-btn-close" onclick="closePassModal()">Close</button>
      </div>
    </div>
  </div>

  <script>
    /* ════════════════════════════════════════════════════════════════
       GS Form View — Public renderer + submit logic
    
       Data flow:
       1. Read slug from ?f=slug
       2. Fetch form config from Supabase directly (no backend cold start)
       3. Render all fields
       4. Silently ping backend to wake it up
       5. User fills form → submit → POST to backend
       6. Show thank-you state
    ════════════════════════════════════════════════════════════════ */

    const SUPABASE_URL = 'https://lbvcrhequonhggsguqqz.supabase.co';   // ← your project URL
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxidmNyaGVxdW9uaGdnc2d1cXF6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2MjAxNTgsImV4cCI6MjA5MDE5NjE1OH0.cSL32z9OS94E-UUghgwqeck9czs1IqO9o-yek5TeF9w';             // ← replace
    const BACKEND = 'https://certiflow-backend-73xk.onrender.com';

    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

    /* ── Accent colour map ─────────────────────────────────────────── */
    const ACCENTS = {
      cyan: { solid: '#00d4ff', grad: 'linear-gradient(135deg,#00d4ff,#7c3aed)', dim: 'rgba(0,212,255,0.10)' },
      purple: { solid: '#a78bfa', grad: 'linear-gradient(135deg,#7c3aed,#a855f7)', dim: 'rgba(124,58,237,0.10)' },
      green: { solid: '#10b981', grad: 'linear-gradient(135deg,#10b981,#06b6d4)', dim: 'rgba(16,185,129,0.10)' },
      gold: { solid: '#f59e0b', grad: 'linear-gradient(135deg,#f59e0b,#ef4444)', dim: 'rgba(245,158,11,0.10)' },
      pink: { solid: '#ec4899', grad: 'linear-gradient(135deg,#ec4899,#8b5cf6)', dim: 'rgba(236,72,153,0.10)' },
    };

    /* ── Runtime state ─────────────────────────────────────────────── */
    let formConfig = null;    // full config from Supabase
    let formSlug = '';
    let formValues = {};      // { fieldId: value }
    let fileObjects = {};      // { fieldId: File } — for upload fields
    let accent = ACCENTS.cyan;


    /* ════════════════════════════════════════════════════════════════
      MULTI-PAGE ENGINE
    ════════════════════════════════════════════════════════════════ */
    let _pages = [];   // [{ title, desc, fields[] }]
    let _currentPage = 0;

    /** Split fields into pages at section_break boundaries */
    function buildPages() {
      const fields = formConfig?.config?.fields || [];
      _pages = [];
      let page = { title: null, desc: null, fields: [] };

      fields.forEach(f => {
        if (f.type === 'section_break') {
          _pages.push(page);
          page = { title: f.label || '', desc: f.description || '', fields: [] };
        } else {
          page.fields.push(f);
        }
      });
      _pages.push(page);

      // Drop empty pages (e.g. two consecutive page breaks)
      if (_pages.length > 1) {
        _pages = _pages.filter(p => p.fields.length > 0);
      }
      _currentPage = 0;
    }

    /** Render a specific page */
    function showPage(n) {
      _currentPage = n;
      const page = _pages[n];
      const total = _pages.length;
      const isFirst = n === 0;
      const isLast = n === total - 1;
      const s = formConfig?.config?.settings || {};

      // Progress bar
      const progressWrap = document.getElementById('progressWrap');
      if (total > 1) {
        progressWrap.style.display = '';
        const pct = Math.round(((n + 1) / total) * 100);
        document.getElementById('progressFill').style.width = pct + '%';
        document.getElementById('pgNum').textContent = n + 1;
        document.getElementById('pgTotal').textContent = total;
        document.getElementById('pgPct').textContent = pct + '%';
      } else {
        progressWrap.style.display = 'none';
      }

      // Page 1: show form header; Page 2+: show section title
      document.getElementById('formMainHeader').style.display = isFirst ? '' : 'none';
      const pageHdr = document.getElementById('pageHdr');
      if (!isFirst && page.title) {
        pageHdr.style.display = '';
        document.getElementById('pageHdrTitle').textContent = page.title;
        const descEl = document.getElementById('pageHdrDesc');
        if (page.desc) { descEl.textContent = page.desc; descEl.style.display = ''; }
        else descEl.style.display = 'none';
      } else {
        pageHdr.style.display = 'none';
      }

      // Render fields with animation
      const container = document.getElementById('fieldsContainer');
      container.innerHTML = page.fields.map(f => renderField(f)).join('');
      container.classList.remove('gsfv-page-enter');
      void container.offsetWidth; // reflow
      container.classList.add('gsfv-page-enter');
      wireFields(page.fields);
      evaluateConditions();

      // Back button
      const backBtn = document.getElementById('backBtn');
      backBtn.style.display = isFirst ? 'none' : 'flex';

      // Submit/Next button label + action
      const labelEl = document.getElementById('submitLabel');
      const btn = document.getElementById('submitBtn');
      const passLabel = (isLast && s.passEnabled) ? '🎫 ' + (s.submitLabel || 'Submit & Get Pass') : null;
      labelEl.textContent = passLabel || (isLast ? (s.submitLabel || 'Submit') : 'Next →');
      btn.onclick = isLast ? handleSubmit : nextPage;
      // Style change: next vs submit
      btn.style.background = isLast ? 'var(--accent-grad)' : 'var(--accent-grad)';

      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function nextPage() {
      if (!validate()) return;
      if (_currentPage < _pages.length - 1) showPage(_currentPage + 1);
    }

    function prevPage() {
      if (_currentPage > 0) showPage(_currentPage - 1);
    }

    /* ════════════════════════════════════════════════════════════════
       BOOT
    ════════════════════════════════════════════════════════════════ */
    (async function boot() {
      // 1. Extract slug
      formSlug = new URLSearchParams(window.location.search).get('f') || '';
      if (!formSlug) { return showError('not-found', 'No form specified', 'Add ?f=your-form-slug to the URL.'); }

      // 2. Wake the backend silently while user reads the form
      fetch(BACKEND + '/api/ping').catch(() => { });

      // 3. Load form config from Supabase (instant — always on)
      try {
        const { data, error } = await sb
          .from('gs_forms')
          .select('id, name, slug, status, config, submission_count')
          .eq('slug', formSlug)
          .in('status', ['published', 'closed'])
          .single();

        if (error || !data) {
          // 4. Fallback: try backend (in case Supabase hiccup)
          const res = await fetch(`${BACKEND}/api/gsforms/view/${encodeURIComponent(formSlug)}`);
          if (!res.ok) throw new Error('not-found');
          const json = await res.json();
          renderForm(json.form);
        } else {
          renderForm(data);
        }
      } catch (e) {
        showError('not-found', 'Form not found', 'This form doesn\'t exist or the link may be incorrect.');
      }
    })();

    /* ════════════════════════════════════════════════════════════════
       RENDER FORM
    ════════════════════════════════════════════════════════════════ */
    function renderForm(form) {
      formConfig = form;
      const cfg = form.config || {};
      const s = cfg.settings || {};
      const th = cfg.theme || {};
      const fields = cfg.fields || [];

      // Set accent from theme
      accent = ACCENTS[th.color] || ACCENTS.cyan;
      applyAccent(accent);

      // Closed state
      if (form.status === 'closed') {
        return showError('closed',
          'Form closed',
          'This form is no longer accepting responses.',
          'Closed'
        );
      }

      // Max submissions check
      if (s.maxSubmissions && form.submission_count >= s.maxSubmissions) {
        return showError('full',
          'Responses full',
          'This form has reached its maximum number of responses.',
          'Full'
        );
      }

      // Close date check — if closeDate has passed, treat as closed
      if (s.closeDate) {
        const cd = new Date(s.closeDate);
        // Set to end of that day
        cd.setHours(23, 59, 59, 999);
        if (cd < new Date()) {
          return showError('closed',
            'Form closed',
            'This form stopped accepting responses on ' +
            cd.toLocaleDateString('en-IN', { day: 'numeric', month: 'long', year: 'numeric' }) + '.',
            'Closed'
          );
        }
      }

      // Page title + meta
      const title = s.title || form.name || 'Form';
      document.title = `${title} — GS Forms`;

      // Light mode
      if (th.lightMode) document.body.classList.add('gsfv-light');

      // Dynamic font loading (based on user's font selection)
      loadCustomFonts(th);

      // Cover image
      if (s.coverImage) {
        const coverEl = document.getElementById('formCoverImage');
        coverEl.style.backgroundImage = `url(${JSON.stringify(s.coverImage)})`;
        coverEl.style.display = '';
      }

      // Header (page 1)
      document.getElementById('formTitle').textContent = title;
      const descEl = document.getElementById('formDesc');
      if (s.description) { descEl.innerHTML = s.description; descEl.style.display = ''; }

      // Allow multiple → show "submit another" after
      if (s.allowMultiple) document.getElementById('tyAnotherBtn').style.display = '';

      // Build pages from section_breaks + show page 1
      buildPages();
      showPage(0);

      // Show form
      document.getElementById('loadingState').style.display = 'none';
      document.getElementById('formState').style.display = '';
    }

    /* ── Apply accent to CSS vars ──────────────────────────────────── */
    function applyAccent(a) {
      const root = document.documentElement;
      root.style.setProperty('--accent', a.solid);
      root.style.setProperty('--accent-dim', a.dim);
      root.style.setProperty('--accent-grad', a.grad);
      document.getElementById('accentBar').style.background = a.grad;
      document.getElementById('orgDot').style.background = a.solid;
    }

    /* ════════════════════════════════════════════════════════════════
       FIELD RENDERING
    ════════════════════════════════════════════════════════════════ */
    function renderField(f) {

      // Section break — no label wrapper
      if (f.type === 'section_break') {
        return `
      <div class="gsfv-section-break">
        ${f.label ? `<div class="gsfv-section-title">${esc(f.label)}</div>` : ''}
        ${f.description ? `<div class="gsfv-section-desc">${esc(f.description)}</div>` : ''}
      </div>`;
      }

      const req = f.required ? `<span class="gsfv-req">*</span>` : '';
      const errMsg = `<div class="gsfv-error-msg" id="err-${f.id}">This field is required.</div>`;
      let input = '';

      switch (f.type) {

        case 'text':
          input = `<input class="gsfv-input" id="fi-${f.id}" type="text"
                      placeholder="${escAttr(f.placeholder || '')}"
                      oninput="fv['${f.id}']=this.value;clearErr('${f.id}')"/>`;
          break;

        case 'email':
          input = `<input class="gsfv-input" id="fi-${f.id}" type="email"
                      placeholder="${escAttr(f.placeholder || 'you@example.com')}"
                      oninput="fv['${f.id}']=this.value;clearErr('${f.id}')"/>`;
          break;

        case 'phone':
          input = `<input class="gsfv-input" id="fi-${f.id}" type="tel"
                      placeholder="${escAttr(f.placeholder || '+91 98765 43210')}"
                      oninput="fv['${f.id}']=this.value;clearErr('${f.id}')"/>`;
          break;

        case 'number':
          input = `<input class="gsfv-input" id="fi-${f.id}" type="number"
                      placeholder="${escAttr(f.placeholder || '0')}"
                      ${f.validation?.min != null ? `min="${f.validation.min}"` : ''}
                      ${f.validation?.max != null ? `max="${f.validation.max}"` : ''}
                      oninput="fv['${f.id}']=this.value;clearErr('${f.id}')"/>`;
          break;

        case 'textarea':
          input = `<textarea class="gsfv-textarea" id="fi-${f.id}"
                         placeholder="${escAttr(f.placeholder || '')}"
                         oninput="fv['${f.id}']=this.value;clearErr('${f.id}')"></textarea>`;
          break;

        case 'date':
          input = `<input class="gsfv-input" id="fi-${f.id}" type="date"
                      onchange="fv['${f.id}']=this.value;clearErr('${f.id}')"/>`;
          break;

        case 'time':
          input = `<input class="gsfv-input" id="fi-${f.id}" type="time"
                      onchange="fv['${f.id}']=this.value;clearErr('${f.id}')"/>`;
          break;

        case 'dropdown':
          const opts = (f.options || []).map(o => `<option value="${escAttr(o)}">${esc(o)}</option>`).join('');
          input = `<select class="gsfv-select" id="fi-${f.id}"
                       onchange="fv['${f.id}']=this.value;clearErr('${f.id}')">
                 <option value="">— Select —</option>
                 ${opts}
               </select>`;
          break;

        case 'radio':
          input = `<div class="gsfv-options" id="fi-${f.id}">
        ${(f.options || []).map((o, i) => `
          <label class="gsfv-option-label" onclick="pickRadio('${f.id}',${i},${(f.options || []).length})">
            <div class="gsfv-option-indicator"></div>
            <span>${esc(o)}</span>
          </label>`).join('')}
      </div>`;
          break;

        case 'checkbox':
          input = `<div class="gsfv-options" id="fi-${f.id}">
        ${(f.options || []).map((o, i) => `
          <label class="gsfv-option-label" onclick="pickCheckbox('${f.id}',${i})">
            <div class="gsfv-option-indicator box"></div>
            <span>${esc(o)}</span>
          </label>`).join('')}
      </div>`;
          // Init checkbox value as empty array
          formValues[f.id] = [];
          break;

        case 'linear_scale':
          const max = f.max || 5;
          if ((f.style || 'stars') === 'stars') {
            input = `
          <div class="gsfv-stars" id="fi-${f.id}">
            ${Array.from({ length: max }, (_, i) =>
              `<button type="button" class="gsfv-star-btn" data-val="${i + 1}" onclick="pickStar('${f.id}',${i + 1},${max})">★</button>`
            ).join('')}
          </div>
          <div class="gsfv-scale-labels">
            <span>${esc(f.minLabel || 'Poor')}</span>
            <span>${esc(f.maxLabel || 'Excellent')}</span>
          </div>`;
          } else {
            input = `
          <div class="gsfv-num-scale" id="fi-${f.id}">
            ${Array.from({ length: max }, (_, i) =>
              `<button type="button" class="gsfv-num-btn" data-val="${i + 1}" onclick="pickNum('${f.id}',${i + 1},${max})">${i + 1}</button>`
            ).join('')}
          </div>
          <div class="gsfv-scale-labels" style="max-width:${max * 44}px">
            <span>${esc(f.minLabel || 'Poor')}</span>
            <span>${esc(f.maxLabel || 'Excellent')}</span>
          </div>`;
          }
          break;

        case 'file_upload':
          const accept = f.accept && f.accept !== '*' ? f.accept : '';
          input = `
        <div class="gsfv-upload-zone" id="fi-${f.id}"
             ondragover="this.classList.add('drag-over')"
             ondragleave="this.classList.remove('drag-over')"
             ondrop="handleDrop('${f.id}',event)">
          <input type="file" ${accept ? `accept="${escAttr(accept)}"` : ''}
                 onchange="handleFileChange('${f.id}',this)"/>
          <div class="gsfv-upload-icon">📎</div>
          <div class="gsfv-upload-text"><strong>Click to upload</strong> or drag & drop</div>
          <div class="gsfv-upload-sub">${accept || 'Any file'} · Max ${f.maxMB || 10} MB</div>
        </div>
        <div class="gsfv-upload-preview" id="fp-${f.id}" style="display:none">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          <span id="fn-${f.id}">No file</span>
        </div>`;
          break;

        default:
          input = `<input class="gsfv-input" id="fi-${f.id}" type="text"
                      placeholder="${escAttr(f.placeholder || '')}"
                      oninput="fv['${f.id}']=this.value;clearErr('${f.id}')"/>`;
      }

      return `
    <div class="gsfv-field" id="fw-${f.id}" data-field-id="${f.id}">
      <div class="gsfv-field-card">
        <div class="gsfv-label">${esc(f.label || 'Field')} ${req}</div>
        ${input}
        ${errMsg}
      </div>
    </div>`;
    }

    /* ── Wire up field events post-render ──────────────────────────── */
    function wireFields(fields) {
      // Initialize formValues
      fields.forEach(f => {
        if (f.type === 'checkbox' && !(f.id in formValues)) formValues[f.id] = [];
        else if (!(f.id in formValues)) formValues[f.id] = '';
      });
      // Set initial max-height on all fields so cond-hidden animation works
      requestAnimationFrame(() => {
        fields.forEach(f => {
          if (f.type === 'section_break') return;
          const wrap = document.getElementById('fw-' + f.id);
          if (wrap) wrap.style.maxHeight = wrap.scrollHeight + 300 + 'px';
        });
        evaluateConditions(); // apply any conditions based on initial (empty) values
      });
    }

    /* ════════════════════════════════════════════════════════════════
       INTERACTIVE FIELD HANDLERS
    ════════════════════════════════════════════════════════════════ */

    const fv = new Proxy(formValues, {
      set(target, key, value) {
        target[key] = value;
        evaluateConditions(); // re-evaluate show/hide after every text field change
        return true;
      }
    });
    function pickRadio(fieldId, idx, total) {
      formValues[fieldId] = (formConfig.config.fields.find(f => f.id === fieldId)?.options || [])[idx] || '';
      clearErr(fieldId);
      const container = document.getElementById('fi-' + fieldId);
      if (!container) return;
      container.querySelectorAll('.gsfv-option-label').forEach((el, i) => {
        el.classList.toggle('selected', i === idx);
      });
      evaluateConditions();
    }

    function pickCheckbox(fieldId, idx) {
      const field = formConfig.config.fields.find(f => f.id === fieldId);
      const val = (field?.options || [])[idx] || '';
      if (!Array.isArray(formValues[fieldId])) formValues[fieldId] = [];
      const arr = formValues[fieldId];
      const pos = arr.indexOf(val);
      if (pos > -1) arr.splice(pos, 1);
      else arr.push(val);
      clearErr(fieldId);
      const container = document.getElementById('fi-' + fieldId);
      if (!container) return;
      container.querySelectorAll('.gsfv-option-label').forEach((el, i) => {
        const optVal = (field?.options || [])[i] || '';
        el.classList.toggle('selected', arr.includes(optVal));
      });
      evaluateConditions();
    }

    function pickStar(fieldId, val, max) {
      formValues[fieldId] = val;
      clearErr(fieldId);
      const container = document.getElementById('fi-' + fieldId);
      if (!container) return;
      container.querySelectorAll('.gsfv-star-btn').forEach(btn => {
        btn.classList.toggle('active', +btn.dataset.val <= val);
      });
      evaluateConditions();
    }

    function pickNum(fieldId, val, max) {
      formValues[fieldId] = val;
      clearErr(fieldId);
      const container = document.getElementById('fi-' + fieldId);
      if (!container) return;
      container.querySelectorAll('.gsfv-num-btn').forEach(btn => {
        btn.classList.toggle('active', +btn.dataset.val === val);
      });
      evaluateConditions();
    }

    function handleFileChange(fieldId, input) {
      const file = input.files?.[0];
      if (!file) return;
      const field = formConfig.config.fields.find(f => f.id === fieldId);
      const maxMB = (field?.maxMB || 10) * 1024 * 1024;
      if (file.size > maxMB) {
        showFieldError(fieldId, `File too large. Max ${field?.maxMB || 10} MB.`);
        input.value = '';
        return;
      }
      fileObjects[fieldId] = file;
      formValues[fieldId] = file.name;
      clearErr(fieldId);
      const prev = document.getElementById('fp-' + fieldId);
      const name = document.getElementById('fn-' + fieldId);
      if (prev) prev.style.display = '';
      if (name) name.textContent = `${file.name} (${(file.size / 1024 / 1024).toFixed(1)} MB)`;
    }

    function handleDrop(fieldId, e) {
      e.preventDefault();
      document.getElementById('fi-' + fieldId)?.classList.remove('drag-over');
      const file = e.dataTransfer.files?.[0];
      if (!file) return;
      // Reuse upload logic with a fake input-like object
      handleFileChange(fieldId, { files: [file] });
    }

    /* ════════════════════════════════════════════════════════════════
       VALIDATION
    ════════════════════════════════════════════════════════════════ */
    function validate() {
      // Only validate fields on the CURRENT page
      const page = _pages[_currentPage] || { fields: [] };
      const fields = page.fields;
      let valid = true;
      let firstErrId = null;

      fields.forEach(f => {
        if (f.type === 'section_break') return;
        if (!isFieldVisible(f)) return;
        clearErr(f.id);

        const val = formValues[f.id];
        const isEmpty = Array.isArray(val) ? val.length === 0 : !String(val || '').trim();

        if (f.required && isEmpty) {
          showFieldError(f.id, 'This field is required.');
          if (!firstErrId) firstErrId = f.id;
          valid = false;
          return;
        }

        if (!isEmpty) {
          // Email format
          if (f.type === 'email' && val && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val)) {
            showFieldError(f.id, 'Please enter a valid email address.');
            if (!firstErrId) firstErrId = f.id;
            valid = false;
            return;
          }
          // Number range
          if (f.type === 'number' && val !== '') {
            const n = +val;
            if (f.validation?.min != null && n < f.validation.min) {
              showFieldError(f.id, `Minimum value is ${f.validation.min}.`);
              if (!firstErrId) firstErrId = f.id;
              valid = false;
              return;
            }
            if (f.validation?.max != null && n > f.validation.max) {
              showFieldError(f.id, `Maximum value is ${f.validation.max}.`);
              if (!firstErrId) firstErrId = f.id;
              valid = false;
              return;
            }
          }
        }
      });

      if (firstErrId) {
        const el = document.getElementById('fw-' + firstErrId);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }

      return valid;
    }

    function showFieldError(fieldId, msg) {
      const wrap = document.getElementById('fw-' + fieldId);
      const err = document.getElementById('err-' + fieldId);
      if (wrap) wrap.classList.add('has-error');
      if (err) err.textContent = msg;
    }

    function clearErr(fieldId) {
      const wrap = document.getElementById('fw-' + fieldId);
      const err = document.getElementById('err-' + fieldId);
      if (wrap) wrap.classList.remove('has-error');
      if (err) err.textContent = 'This field is required.';
    }

    /* ── Option Caps: fetch live counts and disable full options ── */
    async function applyOptionCaps(slug) {
      try {
        const res = await fetch(`${GSF_PUBLIC}/public/caps?slug=${encodeURIComponent(slug)}`);
        if (!res.ok) return;
        const { optionCounts, fields } = await res.json();
        (fields || []).forEach(field => {
          if (!['radio', 'dropdown'].includes(field.type)) return;
          const caps = field.optionCaps || [];
          if (!caps.some(c => c)) return;
          const counts = optionCounts?.[field.id] || {};
          (field.options || []).forEach((opt, i) => {
            const cap = caps[i]; if (!cap) return;
            const taken = counts[opt] || 0;
            if (taken >= cap) {
              // radio / checkbox option wrappers
              document.querySelectorAll(`[data-option-val="${CSS.escape(opt)}"]`).forEach(el => {
                el.style.opacity = '0.4'; el.style.pointerEvents = 'none';
                const badge = document.createElement('span');
                badge.style.cssText = 'font-size:10px;margin-left:8px;color:var(--red);font-weight:700';
                badge.textContent = 'FULL';
                el.appendChild(badge);
              });
              // dropdown <option>
              document.querySelectorAll(`option[value="${opt}"]`).forEach(el => {
                el.disabled = true; el.textContent += ' (Full)';
              });
            }
          });
        });
      } catch { /* non-critical */ }
    }
    /* ════════════════════════════════════════════════════════════════
       SUBMIT
    ════════════════════════════════════════════════════════════════ */
    async function handleSubmit() {
      if (!validate()) return;

      const btn = document.getElementById('submitBtn');
      const labelEl = document.getElementById('submitLabel');
      btn.disabled = true;
      btn.classList.add('loading');
      labelEl.textContent = '';

      // Build submission payload
      const payload = { data: {} };
      const fields = formConfig?.config?.fields || [];
      fields.forEach(f => {
        if (f.type === 'section_break') return;
        if (!isFieldVisible(f)) return;
        if (f.type === 'file_upload') {
          // In Batch 4 we'll send the actual file to Drive.
          // For now, record the filename only so Sheet gets populated.
          payload.data[f.id] = formValues[f.id] || '';
        } else {
          payload.data[f.id] = formValues[f.id] ?? '';
        }
      });

      // Add field labels as metadata so Sheet headers are readable
      payload.fieldMeta = {};
      fields.forEach(f => {
        if (f.type !== 'section_break') {
          payload.fieldMeta[f.id] = f.label || f.id;
        }
      });

      try {
        const res = await fetch(`${BACKEND}/api/gsforms/submit/${encodeURIComponent(formSlug)}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          // Handle "form closed" mid-session
          if (res.status === 403) {
            showError('closed', 'Form closed', err.error || 'This form is no longer accepting responses.', 'Closed');
            return;
          }
          // Handle duplicate email
          if (res.status === 409 && err.alreadyRegistered) {
            btn.disabled = false;
            btn.classList.remove('loading');
            labelEl.textContent = formConfig?.config?.settings?.submitLabel || 'Submit';
            document.getElementById('formState').style.display = 'none';
            showError('closed', 'Already Registered', err.error, 'Registered');
            return;
          }
          // Handle option-full (cap reached) — show toast, keep form open
          if (res.status === 409 && err.optionFull) {
            showToast(err.error || 'That option is full.', 'warn');
            btn.disabled = false;
            btn.classList.remove('loading');
            labelEl.textContent = formConfig?.config?.settings?.submitLabel || 'Submit';
            return;
          }
          throw new Error(err.error || 'Submission failed');
        }

        const data = await res.json();

        // Show entry pass modal if backend returned one
        if (data.pass?.enabled) {
          showThankYou(data.message || formConfig?.config?.settings?.successMessage || 'Thank you for your response!');
          showPassModal(data.pass);
        } else {
          showThankYou(data.message || formConfig?.config?.settings?.successMessage || 'Thank you for your response!');
          // Redirect if configured
          const redirectUrl = formConfig?.config?.settings?.redirectUrl;
          if (redirectUrl) {
            setTimeout(() => { window.location.href = redirectUrl; }, 2500);
          }
        }

      } catch (e) {
        btn.disabled = false;
        btn.classList.remove('loading');
        labelEl.textContent = formConfig?.config?.settings?.submitLabel || 'Submit';
        showToast(e.message || 'Something went wrong. Please try again.', 'error');
      }
    }

    /* ── Show thank you ─────────────────────────────────────────────── */
    function showThankYou(message) {
      // Mark as submitted for this browser session (duplicate guard)
      sessionStorage.setItem('gsf_submitted_' + formSlug, '1');
      document.getElementById('formState').style.display = 'none';
      document.getElementById('thankYouState').style.display = '';
      document.getElementById('tyMessage').textContent = message;
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
    /* ── Reset for "submit another" ────────────────────────────────── */
    function resetForm() {
      formValues = {};
      fileObjects = {};
      _pages = [];
      _currentPage = 0;
      document.getElementById('thankYouState').style.display = 'none';
      renderForm(formConfig);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    /* ════════════════════════════════════════════════════════════════
       ERROR STATE
    ════════════════════════════════════════════════════════════════ */
    function showError(type, title, sub, badge) {
      document.getElementById('loadingState').style.display = 'none';
      document.getElementById('formState').style.display = 'none';
      document.getElementById('errorState').style.display = '';

      const icons = {
        'not-found': `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`,
        'closed': `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>`,
        'full': `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></svg>`,
      };

      document.getElementById('errIcon').className = `gsfv-error-icon ${type}`;
      document.getElementById('errIcon').innerHTML = icons[type] || icons['not-found'];
      document.getElementById('errTitle').textContent = title;

      const badgeEl = document.getElementById('errBadge');

        badgeEl.innerHTML = `<div class="gsfv-error-badge ${type}">● ${badge}</div>`;
        badgeEl.style.display = '';

        badgeEl.style.display = 'none';

    /* ════════════════════════════════════════════════════════════════
       TOAST (minimal, self-contained)
    ════════════════════════════════════════════════════════════════ */
    function showToast(msg, type = 'error') {
      const existing = document.getElementById('gsfv-toast');
      if (existing) existing.remove();
      const colors = {
        error: { bg: 'rgba(244,63,94,0.12)', border: 'rgba(244,63,94,0.3)', icon: '#f43f5e', sym: '✕' },
        success: { bg: 'rgba(16,185,129,0.12)', border: 'rgba(16,185,129,0.3)', icon: '#10b981', sym: '✓' },
        warn: { bg: 'rgba(245,158,11,0.12)', border: 'rgba(245,158,11,0.3)', icon: '#f59e0b', sym: '⚠' },
      };
      const c = colors[type] || colors.error;
      const el = document.createElement('div');
      el.id = 'gsfv-toast';
      el.style.cssText = `
    position:fixed;bottom:24px;right:20px;z-index:9999;
    background:${c.bg};border:1px solid ${c.border};
    backdrop-filter:blur(20px);color:#dde6f5;
    font-size:14px;font-weight:500;padding:12px 18px;
    border-radius:11px;display:flex;align-items:center;gap:10px;
    box-shadow:0 8px 32px rgba(0,0,0,0.4);
    font-family:'Plus Jakarta Sans',sans-serif;max-width:320px;
    animation:toastIn 0.3s ease;
  `;
      el.innerHTML = `
    <style>@keyframes toastIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}</style>
    <span style="color:${c.icon};font-size:15px">${c.sym}</span>
    <span>${msg}</span>`;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 4000);
    }

    /* ════════════════════════════════════════════════════════════════
       BATCH 5 — CONDITIONAL LOGIC EVALUATION
    ════════════════════════════════════════════════════════════════ */

    /**
     * Run after every field value change.
     * Checks every field's conditions and shows/hides accordingly.
     * Hidden fields have their values cleared so they don't submit.
     */
    function evaluateConditions() {
      const fields = formConfig?.config?.fields || [];
      fields.forEach(f => {
        if (f.type === 'section_break') return;
        if (!f.conditions || f.conditions.length === 0) return; // always visible

        const wrap = document.getElementById('fw-' + f.id);
        if (!wrap) return;

        const visible = isFieldVisible(f);
        const wasHidden = wrap.classList.contains('cond-hidden');

        if (visible && wasHidden) {
          // Reveal field
          wrap.classList.remove('cond-hidden');
          wrap.style.maxHeight = wrap.scrollHeight + 300 + 'px'; // generous for any field type
        } else if (!visible && !wasHidden) {
          // Hide field + clear its value
          wrap.style.maxHeight = wrap.scrollHeight + 'px'; // set explicit before animating to 0
          requestAnimationFrame(() => {
            wrap.classList.add('cond-hidden');
          });
          clearFieldValue(f);
        }
      });
    }

    /** Returns true if the field should be shown based on its conditions */
    function isFieldVisible(field) {
      if (!field.conditions || field.conditions.length === 0) return true;
      const logic = field.conditionLogic || 'all';
      const results = field.conditions.map(c => evalCondition(c));
      return logic === 'any' ? results.some(Boolean) : results.every(Boolean);
    }

    /** Evaluates a single condition rule */
    function evalCondition(cond) {
      const raw = formValues[cond.fieldId];
      const condVal = String(cond.value || '').toLowerCase().trim();
      const operator = cond.operator || 'equals';

      // Normalise value for comparison
      const valStr = Array.isArray(raw) ? raw.join(',').toLowerCase() : String(raw || '').toLowerCase().trim();
      const valArr = Array.isArray(raw) ? raw.map(v => v.toLowerCase()) : [valStr];
      const isEmpty = Array.isArray(raw) ? raw.length === 0 : valStr === '';

      switch (operator) {
        case 'equals':
          return valArr.includes(condVal) || valStr === condVal;

        case 'not_equals':
          return !valArr.includes(condVal) && valStr !== condVal;

        case 'contains':
          return valArr.some(v => v.includes(condVal)) || valStr.includes(condVal);

        case 'not_contains':
          return !valArr.some(v => v.includes(condVal)) && !valStr.includes(condVal);

        case 'is_filled':
          return !isEmpty;

        case 'is_empty':
          return isEmpty;

        default:
          return true; // unknown operator → always show
      }
    }

    /** Clears a field's value and resets its visual UI state */
    function clearFieldValue(field) {
      const fid = field.id;

      // Clear from formValues
      if (Array.isArray(formValues[fid])) formValues[fid] = [];
      else formValues[fid] = '';

      // Reset visual state based on type
      switch (field.type) {
        case 'text': case 'email': case 'phone': case 'number':
        case 'date': case 'time': case 'textarea': {
          const el = document.getElementById('fi-' + fid);
          if (el) el.value = '';
          break;
        }
        case 'dropdown': {
          const el = document.getElementById('fi-' + fid);
          if (el) el.selectedIndex = 0;
          break;
        }
        case 'radio': case 'checkbox': {
          const container = document.getElementById('fi-' + fid);
          if (container) container.querySelectorAll('.gsfv-option-label').forEach(el => el.classList.remove('selected'));
          break;
        }
        case 'linear_scale': {
          const container = document.getElementById('fi-' + fid);
          if (container) container.querySelectorAll('.gsfv-star-btn, .gsfv-num-btn').forEach(el => el.classList.remove('active'));
          break;
        }
        case 'file_upload': {
          const prev = document.getElementById('fp-' + fid);
          if (prev) prev.style.display = 'none';
          break;
        }
      }
      clearErr(fid);
    }

    /* ── Helpers ─────────────────────────────────────────────────────── */
    function esc(s) {
      return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }
    function escAttr(s) {
      return String(s || '').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    /* ── Dynamic font loader ─────────────────────────────────────────── */
    function loadCustomFonts(th) {
      const preloaded = ['Plus Jakarta Sans', 'Syne'];
      const toLoad = [];
      [th.headingFont, th.bodyFont].forEach(f => {
        if (f && !preloaded.includes(f) && !toLoad.includes(f)) toLoad.push(f);
      });
      if (toLoad.length) {
        const families = toLoad.map(f => `family=${encodeURIComponent(f)}:wght@400;500;600;700;800`).join('&');
        const link = document.createElement('link');
        link.rel = 'stylesheet';
        link.href = `https://fonts.googleapis.com/css2?${families}&display=swap`;
        document.head.appendChild(link);
      }
      if (th.headingFont) document.documentElement.style.setProperty('--font-display', `'${th.headingFont}', sans-serif`);
      if (th.bodyFont) document.documentElement.style.setProperty('--font', `'${th.bodyFont}', sans-serif`);
    }

    /* ════════════════════════════════════════════════════════════════
       ENTRY PASS MODAL
    ════════════════════════════════════════════════════════════════ */
    let _passData = null;

    function showPassModal(pass) {
      _passData = pass;
      document.getElementById('passModal').classList.add('open');
      renderPassCanvas(pass);
    }

    function closePassModal() {
      document.getElementById('passModal').classList.remove('open');
    }

    function renderPassCanvas(pass) {
      const canvas = document.getElementById('passCanvas');
      const ctx = canvas.getContext('2d');
      const W = 900, H = 380;
      canvas.width = W; canvas.height = H;

      const cfg = pass.config || {};
      const bannerColor = cfg.bannerColor || '#1a1a2e';
      const textColor = cfg.textColor || '#ffffff';

      // Background
      ctx.fillStyle = bannerColor;
      ctx.fillRect(0, 0, W, H);

      // Load QR image
      const qrImg = new Image();
      qrImg.onload = () => {
        // Left: white QR box
        const qrPad = 20;
        const qrSize = H - qrPad * 2;
        const qrX = qrPad;
        const qrY = qrPad;
        ctx.fillStyle = '#ffffff';
        roundRect(ctx, qrX, qrY, qrSize, qrSize, 12);
        ctx.fill();
        ctx.drawImage(qrImg, qrX + 8, qrY + 8, qrSize - 16, qrSize - 16);

        // "Scan to verify" text below QR
        ctx.fillStyle = 'rgba(255,255,255,0.55)';
        ctx.font = '12px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('Scan to verify', qrX + qrSize / 2, qrY + qrSize + 18);

        // Vertical divider
        ctx.strokeStyle = 'rgba(255,255,255,0.25)';
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(320, 30); ctx.lineTo(320, H - 30); ctx.stroke();

        // Right section
        const rx = 344, ry = 36, rw = W - rx - 20;
        ctx.textAlign = 'left';

        let cy = ry;

        // Logo (optional)
        if (cfg.logoUrl) {
          const logoImg = new Image();
          logoImg.crossOrigin = 'anonymous';
          logoImg.onload = () => {
            const lh = Math.min(50, logoImg.naturalHeight || 50);
            const lw = lh * (logoImg.naturalWidth / (logoImg.naturalHeight || 1));
            ctx.drawImage(logoImg, W - lw - 20, ry, lw, lh);
          };
          logoImg.src = cfg.logoUrl;
        }

        // Event name
        ctx.fillStyle = textColor;
        ctx.font = 'bold 26px sans-serif';
        cy += 6;
        wrapText(ctx, cfg.eventName || 'Event', rx, cy, rw, 32);
        cy += 38;

        // Attendee name
        ctx.font = '19px sans-serif';
        ctx.fillStyle = textColor;
        wrapText(ctx, pass.attendeeName || '—', rx, cy, rw, 26);
        cy += 32;

        // Venue / Date / Time
        ctx.font = '14px sans-serif';
        ctx.fillStyle = 'rgba(255,255,255,0.75)';
        if (cfg.venue) { ctx.fillText('📍 ' + cfg.venue, rx, cy); cy += 24; }
        if (cfg.date) { ctx.fillText('📅 ' + cfg.date, rx, cy); cy += 24; }
        if (cfg.time) { ctx.fillText('🕐 ' + cfg.time, rx, cy); cy += 24; }

        // Divider
        cy += 6;
        ctx.strokeStyle = 'rgba(255,255,255,0.20)';
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(rx, cy); ctx.lineTo(W - 20, cy); ctx.stroke();
        cy += 14;

        // Rules
        const rules = (cfg.rules || []).slice(0, 3);
        if (rules.length) {
          ctx.fillStyle = 'rgba(255,255,255,0.6)';
          ctx.font = 'bold 12px sans-serif';
          ctx.fillText('ENTRY RULES', rx, cy); cy += 17;
          ctx.font = '12px sans-serif';
          rules.forEach(r => {
            ctx.fillText('• ' + r, rx, cy); cy += 17;
          });
        }
      };
      qrImg.src = pass.qrDataUrl;
    }

    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function wrapText(ctx, text, x, y, maxW, lineH) {
      const words = String(text || '').split(' ');
      let line = '';
      for (const word of words) {
        const test = line ? line + ' ' + word : word;
        if (ctx.measureText(test).width > maxW && line) {
          ctx.fillText(line, x, y); y += lineH; line = word;
        } else {
          line = test;
        }
      }
      if (line) ctx.fillText(line, x, y);
    }

    function downloadPass() {
      const canvas = document.getElementById('passCanvas');
      canvas.toBlob(blob => {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `entry-pass-${(_passData?.submissionId || 'pass').slice(0, 8)}.png`;
        a.click();
        URL.revokeObjectURL(a.href);
      }, 'image/png');
    }
  </script>
